var PAGES = {"ai-and-machine-learning":"# AI and Machine Learning\n\n# AI and Machine Learning Module\n\nThis module provides the core AI and Machine Learning capabilities for the Rust Scraper project, focusing on semantic understanding and processing of web content. It enables features such as semantic chunking, text embedding generation, and relevance-based filtering, forming the foundation for advanced RAG (Retrieval-Augmented Generation) pipelines.\n\n## Core Components\n\nThe AI module is composed of several interconnected components, each responsible for a specific aspect of the ML pipeline:\n\n### 1. `CacheConfig` and `ModelCache`\n\n- **Purpose**: Manages the local cache for AI models and related assets.\n- **Functionality**:\n    - Defines cache directory conventions (XDG compliant).\n    - Controls cache validation (SHA256), lifecycle (TTL), and offline mode.\n    - Provides methods to ensure cache directory existence, check for cached models, validate integrity, and clear the cache.\n- **Integration**: Used by `ModelDownloader` and `SemanticCleanerImpl` to manage model storage.\n\n### 2. `ModelDownloader`\n\n- **Purpose**: Handles the automatic download of AI models from HuggingFace Hub.\n- **Functionality**:\n    - Downloads specified models and files from a given repository.\n    - Supports progress tracking via callbacks.\n    - Performs SHA256 validation to ensure download integrity.\n    - Includes basic retry logic for network failures.\n- **Integration**: Used by `SemanticCleanerImpl` during initialization if `auto_download` is enabled and the model is not found in the cache.\n\n### 3. `InferenceEngine`\n\n- **Purpose**: Executes ONNX models for generating text embeddings.\n- **Functionality**:\n    - Loads ONNX models using the `tract-onnx` crate.\n    - Provides a thread-safe, `Arc`-wrapped inference session for concurrent use.\n    - Runs inference asynchronously using `tokio::task::spawn_blocking` to avoid blocking the async runtime.\n    - Accepts `ModelInput` (token IDs, attention mask, token type IDs) and returns a fixed-size embedding vector (384 dimensions for `all-MiniLM-L6-v2`).\n- **Integration**: The core component for generating embeddings, used by `SemanticCleanerImpl`.\n\n### 4. `MiniLmTokenizer`\n\n- **Purpose**: Tokenizes text into a format suitable for the `all-MiniLM-L6-v2` ONNX model.\n- **Functionality**:\n    - Implements WordPiece tokenization (BERT-style).\n    - Handles special tokens ([CLS], [SEP], [PAD]).\n    - Truncates and pads sequences to a maximum length (`DEFAULT_MAX_LENGTH`).\n    - Returns `ModelInput` structs, which are directly usable by `InferenceEngine`.\n- **Integration**: Used by `SemanticCleanerImpl` to convert text chunks into token IDs before inference.\n\n### 5. `HtmlChunker`\n\n- **Purpose**: Splits raw HTML content into semantically meaningful text chunks.\n- **Functionality**:\n    - Employs a two-pass approach: structural boundaries (paragraphs) followed by embedding-based refinement (though the current implementation focuses on structural splitting).\n    - Strips HTML tags.\n    - Splits text into paragraphs and then sentences.\n    - Merges small chunks and splits large chunks based on configurable size limits (`min_chunk_size`, `max_chunk_size`).\n- **Integration**: The first step in the `SemanticCleanerImpl` pipeline, preparing text for tokenization.\n\n### 6. `SentenceSplitter`\n\n- **Purpose**: Performs Unicode-aware sentence segmentation.\n- **Functionality**:\n    - Uses the `unicode-segmentation` crate to accurately identify sentence boundaries.\n    - Handles various punctuation and edge cases.\n    - Provides methods for splitting, trimming, and counting sentences.\n- **Integration**: Used internally by `HtmlChunker` for sentence-level splitting.\n\n### 7. `EmbeddingOps`\n\n- **Purpose**: Provides high-performance, SIMD-accelerated operations for vector embeddings.\n- **Functionality**:\n    - `cosine_similarity`: Computes cosine similarity efficiently using AVX2 SIMD instructions via the `wide` crate. This is crucial for comparing embeddings.\n    - `normalize`: Normalizes vectors to unit length.\n    - `mean_pool`: Implements mean pooling with attention masking, a standard technique for sentence-transformers models.\n    - `l2_normalize_safe`: A safe version of normalization that avoids panics on zero-magnitude vectors.\n- **Integration**: Used by `RelevanceScorer` for similarity calculations and by `InferenceEngine` for post-processing embeddings.\n\n### 8. `RelevanceScorer`\n\n- **Purpose**: Filters and ranks text chunks based on their semantic relevance to a reference embedding.\n- **Functionality**:\n    - Uses `cosine_similarity` (from `EmbeddingOps`) to score chunks against a reference vector.\n    - Allows setting a `threshold` to filter out irrelevant chunks.\n    - Supports storing a reference embedding internally.\n    - Provides methods to filter chunks, filter chunks while preserving embeddings, and find top-k relevant chunks.\n- **Integration**: The final filtering stage in the `SemanticCleanerImpl` pipeline.\n\n### 9. `ChunkId`\n\n- **Purpose**: Provides a type-safe identifier for content chunks.\n- **Functionality**:\n    - A newtype wrapper around `u64` to prevent accidental mixing of chunk IDs with other numerical types.\n    - Implements `Display` for human-readable IDs (e.g., \"chunk-42\").\n- **Integration**: Used within `DocumentChunk` and potentially other parts of the system that need to reference specific chunks.\n\n### 10. `SemanticCleanerImpl` (and `ModelConfig`)\n\n- **Purpose**: Orchestrates the entire RAG pipeline for semantic cleaning and filtering.\n- **Functionality**:\n    - Implements the `SemanticCleaner` trait.\n    - Integrates all other components: `HtmlChunker`, `MiniLmTokenizer`, `InferenceEngine`, `RelevanceScorer`.\n    - Manages model loading, configuration, and concurrent execution.\n    - Handles potential errors throughout the pipeline.\n    - Uses `ModelConfig` for customizable pipeline behavior (model repo, cache, max tokens, relevance threshold).\n- **Integration**: The main entry point for semantic processing, used by higher-level application logic (e.g., `export_flow.rs`).\n\n## Architecture Overview\n\nThe AI module follows a pipeline approach for semantic processing:\n\n```mermaid\ngraph TD\n    A[HTML Input] --> B_HtmlChunker[\"B(HtmlChunker)\"];\n    B --> C_SentenceSplitter[\"C(SentenceSplitter)\"];\n    C --> D_MiniLmTokenizer[\"D(MiniLmTokenizer)\"];\n    D --> E{ModelInput};\n    E --> F_InferenceEngine[\"F(InferenceEngine)\"];\n    F --> G[Raw Embeddings];\n    G --> H_RelevanceScorer[\"H(RelevanceScorer)\"];\n    H --> I[Filtered DocumentChunks];\n\n    subgraph Model Management\n        J[CacheConfig] --> K_ModelCache[\"K(ModelCache)\"];\n        L[ModelDownloader] --> K;\n        K --> F;\n        K --> D;\n    end\n\n    subgraph Embedding Operations\n        M_EmbeddingOps[\"M(EmbeddingOps)\"] --> H;\n        M --> F;\n    end\n\n    style F fill:#f9f,stroke:#333,stroke-width:2px\n    style H fill:#ccf,stroke:#333,stroke-width:2px\n    style B fill:#cfc,stroke:#333,stroke-width:2px\n    style D fill:#cfc,stroke:#333,stroke-width:2px\n```\n\n**Execution Flow:**\n\n1.  **Chunking**: Raw HTML is passed to `HtmlChunker`, which strips tags and splits the content into semantic `DocumentChunk`s.\n2.  **Tokenization**: Each `DocumentChunk`'s text is tokenized by `MiniLmTokenizer` into `ModelInput` (token IDs, attention mask, token type IDs).\n3.  **Embedding Generation**: `InferenceEngine` takes the `ModelInput`s and, using the loaded ONNX model, generates embedding vectors for each chunk. This is done concurrently for efficiency.\n4.  **Relevance Scoring & Filtering**: `RelevanceScorer` compares the generated embeddings against a reference (or uses a stored reference) using `EmbeddingOps::cosine_similarity`. Chunks are filtered based on a configurable relevance threshold.\n5.  **Output**: The final output is a `Vec<DocumentChunk>`, containing only the semantically relevant chunks, with their embeddings preserved.\n\n## Key Design Decisions & Rust Skills Applied\n\n*   **`async`/`await` and `tokio`**: The module extensively uses asynchronous operations for I/O (model loading, file access) and concurrency (`spawn_blocking`, `try_join_all`).\n*   **`Arc` for Sharing**: `InferenceEngine`'s session is wrapped in `Arc` to allow thread-safe sharing across multiple concurrent inference requests without expensive cloning.\n*   **SIMD Acceleration (`wide` crate)**: `EmbeddingOps` leverages `wide::f32x8` for significant performance gains in vector operations like cosine similarity, especially on CPUs with AVX2 support.\n*   **Builder Pattern (`api-builder-pattern`)**: `ModelConfig` uses a builder pattern for flexible and readable configuration.\n*   **Type Safety (`type-newtype-ids`)**: `ChunkId` provides compile-time safety for chunk identifiers.\n*   **Memory Management (`mem-with-capacity`, `mem-reuse-collections`, `mem-smallvec`)**: Various techniques are employed to optimize memory allocation and reuse, reducing overhead, particularly in tokenization and chunking.\n*   **Error Handling (`err-thiserror-lib`, `err-context-chain`)**: Custom `SemanticError` enum and `.context()` calls provide clear and chainable error reporting.\n*   **Concurrency Control (`tokio::sync::Semaphore`)**: `SemanticCleanerImpl` uses a semaphore to limit the number of concurrent blocking inference tasks, preventing resource exhaustion on systems with fewer CPU cores.\n*   **Model Management**: Follows XDG conventions for cache directories and uses SHA256 for integrity checks.\n\n## Integration with the Codebase\n\n*   **`src/domain/semantic_cleaner.rs`**: Defines the `SemanticCleaner` trait, which `SemanticCleanerImpl` implements.\n*   **`src/error.rs`**: Defines the `SemanticError` enum used throughout the module for error propagation.\n*   **`src/infrastructure/ai/`**: All core AI components reside within this module.\n*   **`src/cli/export_flow.rs`**: The `run_ai_export` function demonstrates how to instantiate and use `SemanticCleanerImpl` for processing scraped content.\n*   **`src/application/crawler_service.rs`**: May indirectly use AI features for semantic analysis of discovered content.","benchmarking":"# Benchmarking\n\n# Benchmarking Module\n\nThe Benchmarking module provides performance tests for critical components of the `rust-scraper` library. It utilizes the `criterion` crate to measure execution time and throughput for various operations.\n\n## Purpose\n\nThe primary goal of this module is to:\n\n*   **Measure performance:** Quantify the speed and efficiency of specific functions and modules.\n*   **Identify regressions:** Detect performance degradations introduced by code changes.\n*   **Optimize critical paths:** Provide data to guide optimization efforts for performance-sensitive areas.\n*   **Validate feature performance:** Ensure that features, especially those with significant computational overhead (like AI embeddings), meet performance expectations.\n\n## Key Components\n\nThe benchmarking module consists of several distinct benchmark files, each focusing on a specific area:\n\n### `benches/cosine_similarity.rs`\n\nThis benchmark measures the performance of the `cosine_similarity` function, which is part of the AI embedding operations.\n\n*   **Feature Gating:** This benchmark is conditionally compiled using the `ai` feature flag (`#[cfg(feature = \"ai\")]`). If the `ai` feature is not enabled, a placeholder `main` function is compiled, informing the user that benchmarks require this feature.\n*   **Functionality:**\n    *   It defines a fixed-size vector (`dims = 384`) for input embeddings.\n    *   Deterministic `f32` vectors `a` and `b` are generated using `sin` and `cos` functions to ensure consistent test data.\n    *   The `criterion::benchmark_group` is named \"cosine\\_similarity\".\n    *   `Throughput::Elements(1)` is set, indicating that each iteration processes one pair of vectors.\n    *   The `bench_function` named \"simd\\_384d\" executes the `cosine_similarity` function repeatedly.\n    *   `black_box` is used to prevent the compiler from optimizing away the function calls or their arguments.\n*   **Dependencies:** Relies on `rust_scraper::infrastructure::ai::embedding_ops::cosine_similarity`.\n\n### `benches/waf_detection.rs`\n\nThis benchmark assesses the performance of the `WafInspector::verify_integrity` function, which is responsible for detecting Web Application Firewall (WAF) signatures within HTTP response bodies.\n\n*   **Functionality:**\n    *   A helper function `generate_html_body` creates a large HTML string (approximately 500KB) that mimics a typical web page.\n    *   This generated body includes several common WAF signature strings interspersed within the HTML content to simulate realistic detection scenarios.\n    *   The `criterion::benchmark_group` is named \"waf\\_detection\".\n    *   `Throughput::Bytes(body.len() as u64)` is configured, meaning the benchmark measures performance per byte processed.\n    *   The `bench_function` named \"verify\\_integrity\\_500kb\" calls `WafInspector::verify_integrity` with an empty `HeaderMap` and the generated HTML body.\n    *   `black_box` is employed to ensure the integrity of the benchmarked code.\n*   **Dependencies:** Relies on `rust_scraper::infrastructure::http::waf_engine::WafInspector` and `wreq::header::HeaderMap`.\n\n## How to Run Benchmarks\n\nTo run the benchmarks, you need to have the `criterion` crate as a dev-dependency.\n\n1.  **Build with necessary features:**\n    *   For AI-related benchmarks: `cargo bench --features ai`\n    *   For WAF detection benchmarks: `cargo bench` (this benchmark does not have feature gates)\n\n2.  **Execution:** The `cargo bench` command will compile and run the benchmarks. Criterion will output detailed performance statistics, including mean execution time, standard deviation, and throughput. It also generates an HTML report in the `target/criterion/report` directory for interactive analysis.\n\n## Module Structure and Dependencies\n\nThe benchmarking module is located in the `benches/` directory. Each `.rs` file within this directory represents a separate benchmark suite.\n\n```mermaid\ngraph TD\n    A[cargo bench] --> B{Criterion Runner};\n    B --> C1[cosine_similarity.rs];\n    C1 -- Requires --> D1[rust_scraper::infrastructure::ai::embedding_ops::cosine_similarity];\n    B --> C2[waf_detection.rs];\n    C2 -- Calls --> D2[rust_scraper::infrastructure::http::waf_engine::WafInspector::verify_integrity];\n    D2 -- Uses --> E[wreq::header::HeaderMap];\n    C2 -- Uses --> F[generate_html_body];\n```\n\nThis diagram illustrates the basic flow: `cargo bench` invokes the Criterion runner, which then executes the individual benchmark files. These files, in turn, call specific functions from the `rust-scraper` library's infrastructure layer. The `cosine_similarity` benchmark is conditionally compiled based on the `ai` feature.","build-and-scripting":"# Build and Scripting\n\n# Build and Scripting\n\nThis module is the repository’s build- and workflow-support layer. It does not implement scraping logic itself; instead, it defines how the project is compiled, verified, formatted, tested, audited, and supported in day-to-day development and CI.\n\nIt spans several top-level files and scripts:\n\n- `Cargo.toml` for package metadata, dependencies, feature flags, and cargo profiles\n- `build.rs` for build-time metadata generation\n- `bacon.toml` for editor/watch-driven development jobs\n- `justfile` for repeatable local and CI tasks\n- `deny.toml` for dependency and license policy\n- `rustfmt.toml` for formatting policy\n- `scripts/coverage.sh` for coverage generation\n- `scripts/dev.sh` for watch-based development\n- `scripts/gen_context.fish` for generating the agent context map\n- `opencode.json` for local MCP tool wiring\n\n## Responsibilities\n\nThe build and scripting layer is responsible for:\n\n- declaring the crate’s compilation and feature topology\n- enabling reproducible builds and optimized release artifacts\n- generating build metadata at compile time\n- standardizing developer workflows for format, lint, test, audit, and coverage\n- enforcing dependency and license constraints\n- integrating project tooling such as `bacon`, `just`, `cargo-deny`, `cargo-nextest`, and coverage tools\n- generating auxiliary files used by agents and editor tooling\n\n## Package metadata and crate configuration\n\nThe `Cargo.toml` file is the authoritative source for crate identity and build configuration.\n\n### Package identity\n\nThe crate is published as:\n\n- `name = \"rust_scraper\"`\n- `version = \"1.1.0\"`\n- `edition = \"2021\"`\n- `rust-version = \"1.88\"`\n\nIt is positioned as a production-ready web scraper with Clean Architecture, TUI selector support, and sitemap support.\n\n### Feature flags\n\nThe crate defines several feature groups:\n\n- `images` and `documents` enable optional MIME detection via `mimetype-detector`\n- `full` enables both `images` and `documents`\n- `ai` gates the semantic-cleaning stack, including:\n  - `tokenizers`\n  - `async-trait`\n  - `unicode-segmentation`\n  - `smallvec`\n  - `wide`\n  - `tract-onnx`\n  - `hf-hub`\n- `console` enables `console-subscriber` for tokio-console integration\n\nThese features are used to keep the default build light while allowing opt-in functionality for richer processing or observability.\n\n### Dependency layout\n\nThe dependency list reflects the project’s architecture and runtime needs:\n\n- CLI and configuration:\n  - `clap`\n  - `toml`\n  - `inquire`\n  - `clap_complete`\n- Networking and HTTP:\n  - `wreq`\n  - `wreq-util`\n  - `redis`\n- Async runtime and concurrency:\n  - `tokio`\n  - `futures`\n  - `dashmap`\n  - `governor`\n  - `num_cpus`\n- Parsing and transformation:\n  - `scraper`\n  - `lol_html`\n  - `legible`\n  - `htmd`\n  - `pulldown-cmark`\n  - `regex`\n  - `quick-xml`\n- Serialization and metadata:\n  - `serde`\n  - `serde_json`\n  - `serde_yaml`\n  - `chrono`\n  - `uuid`\n  - `url`\n- Observability:\n  - `tracing`\n  - `tracing-subscriber`\n  - `tracing-appender`\n  - `opentelemetry`\n  - `tracing-opentelemetry`\n  - `console-subscriber` behind the `console` feature\n- Security and portability:\n  - `rustls-webpki`\n  - `time`\n  - `secrecy`\n  - `static_assertions`\n- Build-time metadata:\n  - `built` in `[build-dependencies]`\n\nSeveral comments in `Cargo.toml` document deliberate version pinning to avoid dependency conflicts, especially around transitive crates such as `dashmap`, `quick-xml`, and `hf-hub`.\n\n### Cargo profiles\n\nThe build profiles are tuned for the project’s development and release workflow:\n\n- `profile.dev`\n  - `opt-level = 0`\n  - `debug = true`\n  - dependency packages under `profile.dev.package.\"*\"` use `opt-level = 3`\n- `profile.release`\n  - `opt-level = 3`\n  - `lto = \"fat\"`\n  - `codegen-units = 1`\n  - `panic = \"abort\"`\n  - `strip = true`\n- `profile.bench`\n  - inherits from release\n  - keeps debug info\n  - does not strip symbols\n\nThis gives fast edit/compile iteration in development while still optimizing dependency code, and produces compact, high-performance release binaries.\n\n## Build script: `build.rs`\n\nThe build script is intentionally small and focused.\n\n### What it does\n\n`build.rs` performs two actions:\n\n1. emits `cargo:rerun-if-changed=build.rs`\n2. calls `built::write_built_file()`\n\nThe second step generates build-time metadata that can be embedded into the crate, typically for version strings or diagnostics.\n\n### Behavior and implications\n\nBecause the script only depends on `build.rs` itself, Cargo will rerun it when the build script changes. The actual metadata generation is delegated to the `built` crate, which collects information such as:\n\n- package version\n- git metadata\n- build timestamp\n- compiler/build environment details, depending on crate configuration\n\nThis keeps build logic out of the main codebase while still making build metadata available to the application.\n\n## Development automation: `bacon.toml`\n\n`bacon.toml` configures a tight feedback loop for interactive development.\n\n### Default job\n\n- `default_job = \"clippy\"`\n\nStarting the watcher runs Clippy first, which makes lint feedback the primary development signal.\n\n### Key bindings\n\nUseful shortcuts are defined for terminal-driven workflow:\n\n- `c` → `job:clippy`\n- `t` → `job:nextest`\n- `n` → `job:nextest`\n- `d` → `job:doc`\n- `r` → `job:run`\n\n### Jobs\n\nThe defined jobs map to common Cargo tasks:\n\n- `clippy`\n- `nextest`\n- `test`\n- `doc`\n- `doc-open`\n- `run`\n- `check`\n- `check-all`\n\nThe `run` job is marked `background = true`, which is useful for keeping the application running while still allowing bacon to monitor output and errors.\n\n### Summary mode\n\n`summary = true` reduces terminal I/O, which is especially useful on slower disks or in highly iterative workflows.\n\n## Task automation: `justfile`\n\nThe `justfile` is the main developer-facing task runner for the repository. It complements `bacon` by covering both local and CI-oriented workflows.\n\n## Verification tasks\n\n### `check`\n\nRuns:\n\n- `cargo fmt --check`\n- `cargo clippy --all-targets --all-features -- -D warnings ...`\n\nThis is the main formatting-and-lint gate. It also adds many Clippy allowance flags to match the codebase’s current refactoring posture.\n\n### `check-fast`\n\nRuns:\n\n- `cargo check`\n\nThis is the lightweight compile-only gate.\n\n## Testing tasks\n\n### `test-dev`\n\nRuns targeted tests with `cargo nextest run` using the `dev` profile and limited parallelism.\n\n### `test`\n\nRuns the full suite with `cargo nextest run` using the `agent` profile and `$(nproc)` test threads.\n\n### `test-filter <filter>`\n\nRuns a filtered subset of tests with an `-E` expression. This is useful when a change is localized.\n\n### `test-ai`\n\nRuns tests with `--features ai`, which exercises the semantic-cleaning feature stack.\n\n## Audit and maintenance tasks\n\n### `audit`\n\nRuns:\n\n- `cargo audit`\n- `cargo deny check`\n- `cargo machete`\n\nThis is the dependency health gate.\n\n### `fix-typos`\n\nRuns `typos -w` to auto-fix spelling issues.\n\n## Coverage task\n\n### `cov`\n\nRuns:\n\n- `cargo llvm-cov --html --output-dir coverage-llvm`\n\nThis generates HTML coverage output through LLVM-based coverage tooling.\n\n## Build task\n\n### `build-release`\n\nRuns:\n\n- `cargo build --release`\n\nThis is the standard release artifact build.\n\n## Setup task\n\n### `setup`\n\nVerifies that common tooling is installed:\n\n- `cargo-nextest`\n- `just`\n- `cargo-machete`\n- `cargo-audit`\n- `cargo-deny`\n- `typos`\n- `sccache`\n- `mold`\n\nThis is useful for onboarding and for CI/workstation readiness checks.\n\n## Watch and CI workflows\n\nThe `justfile` defines two important workflow layers:\n\n- watch-mode helpers:\n  - `watch-dev`\n  - `test-dev-with-impact`\n- CI gates:\n  - `test-ci`\n  - `test-ci-quick`\n\n`test-ci` is the strict pre-commit/pre-PR gate. It runs:\n\n1. `cargo fmt --all -- --check`\n2. strict Clippy\n3. `gitnexus analyze`\n4. `cargo nextest run --profile ci --test-threads 2 --no-fail-fast`\n\n`test-ci-quick` skips formatting but still runs Clippy, GitNexus analysis, and the CI test profile.\n\n## Dependency policy: `deny.toml`\n\n`deny.toml` establishes the project’s supply-chain policy.\n\n### Advisories\n\nThe `[advisories]` section explicitly ignores a small set of known advisories, including transitive issues without safe upgrades and an optional `console-subscriber`-related advisory.\n\n### License allowlist\n\nThe `[licenses]` section permits a controlled set of licenses, including:\n\n- MIT\n- Apache-2.0\n- BSD variants\n- ISC\n- Unicode licenses\n- MPL-2.0\n- OpenSSL\n- Zlib\n- LGPL-3.0\n\nThe comment beside LGPL-3.0 notes that it is present through `wreq-util`.\n\n### Bans and sources\n\n- `multiple-versions = \"warn\"` allows the build to proceed while surfacing duplication warnings\n- unknown registries and git sources are warned about rather than hard-failed\n\nThis is a practical balance between strictness and the realities of transitive dependency graphs.\n\n## Formatting policy: `rustfmt.toml`\n\nThe formatting configuration is straightforward and stable-only:\n\n- `max_width = 100`\n- `tab_spaces = 4`\n- `hard_tabs = false`\n- `reorder_imports = true`\n- `use_field_init_shorthand = true`\n- `match_block_trailing_comma = true`\n\nThese settings make formatting deterministic and keep diffs readable.\n\n## Coverage script: `scripts/coverage.sh`\n\nThis shell script wraps LLVM coverage generation.\n\n### Flow\n\n1. verify `cargo-llvm-cov` is installed\n2. run `cargo llvm-cov --html --output-dir coverage-llvm --lcov`\n3. print the output location\n4. print a summary via `cargo llvm-cov --summary-only`\n\n### Notes\n\n- It exits on the first error due to `set -e`\n- It is optimized for fast coverage generation compared to heavier tooling\n- It emits HTML output under `coverage-llvm/`\n\n## Development watch script: `scripts/dev.sh`\n\nThis script is a lightweight manual alternative to `bacon`.\n\n### Flow\n\n1. verify `cargo-nextest` and `cargo-watch` are installed\n2. start `cargo watch`\n3. on changes, run Clippy and `cargo nextest run --test-threads 2`\n\n### Intended use\n\nThis is useful for shell-based development sessions where a simple, explicit watch loop is preferred over terminal UI tooling.\n\n## Agent context generation: `scripts/gen_context.fish`\n\nThis Fish script generates `.github/context_map.json`, which appears to be used by AI/agent tooling to understand repository structure.\n\n### Output format\n\nThe generated JSON includes:\n\n- project name\n- UTC timestamp\n- architecture label\n- the architectural layers:\n  - `Domain`\n  - `Application`\n  - `Infrastructure`\n  - `Adapters`\n- entry points:\n  - `src/lib.rs`\n  - `src/main.rs`\n- critical paths for the architecture\n\n### Behavior\n\nThe script writes the file directly, then marks it executable with `chmod +x`.\n\n### Practical purpose\n\nThis is not part of the runtime application. It supports external tooling that needs a compact map of the repository’s structure and entry points.\n\n## MCP configuration: `opencode.json`\n\n`opencode.json` registers local MCP servers for agent tooling.\n\n### Registered tools\n\n- `gitnexus`\n  - launched via `gitnexus mcp`\n- `rust_scraper`\n  - launched from `target/release/examples/mcp_server_stdio`\n\n### Purpose\n\nThis file is consumed by OpenCode-style tooling so the repository can expose local context and project-specific capabilities to an AI agent or editor integration.\n\n## How these files fit together\n\nThe build and scripting layer provides the operating envelope for the codebase:\n\n```mermaid\nflowchart TD\n    A[Cargo.toml] --> B[build.rs]\n    A --> C[Binary and library builds]\n    A --> D[Feature flags]\n    E[justfile] --> F[fmt / clippy / test / audit / coverage]\n    G[bacon.toml] --> F\n    H[deny.toml] --> I[Dependency and license policy]\n    J[rustfmt.toml] --> K[Formatting rules]\n    L[scripts/*.sh, *.fish] --> F\n    L --> M[Agent/context generation]\n    N[opencode.json] --> O[MCP tool wiring]\n```\n\n## Extending this module\n\nWhen modifying build or scripting behavior:\n\n- update `Cargo.toml` first when adding dependencies, features, or profile changes\n- keep `build.rs` minimal; move complex build logic into crates when possible\n- add new developer tasks to `justfile` when they need repeatable manual execution\n- mirror important tasks in `bacon.toml` if they should be available in watch mode\n- keep `deny.toml` in sync with dependency and license policy changes\n- update `rustfmt.toml` only for project-wide formatting choices\n- treat shell scripts as thin wrappers around Cargo and tooling commands\n\n## Contribution guidelines for build tooling\n\n- avoid introducing redundant or conflicting version pins unless necessary\n- preserve comments explaining deliberate dependency duplication or pinning\n- prefer reproducible, explicit commands over implicit environment behavior\n- keep automation scripts short, composable, and easy to audit\n- ensure new tasks fail clearly when required external tools are missing\n\n## Summary\n\nThis module is the project’s build-and-automation backbone. It does not implement scraping features, but it strongly shapes how the codebase is compiled, validated, observed, and maintained. Most changes here affect the entire repository, so updates should be made carefully and with an eye toward reproducibility, developer experience, and CI consistency.","cli-interface":"# CLI Interface\n\n# CLI Interface Module\n\nThe CLI Interface module is the primary entry point for interacting with the `rust_scraper` binary. It handles parsing command-line arguments, orchestrating the scraping workflow, and managing user feedback through logging and progress indicators.\n\n## Purpose\n\nThis module's main responsibilities are:\n\n1.  **Argument Parsing**: Define and parse all command-line arguments using `clap`. This includes configuration options, subcommands, and feature flags.\n2.  **Workflow Orchestration**: Coordinate the high-level execution flow of the scraper, including URL discovery, content scraping, and data export.\n3.  **Configuration Management**: Load default configurations from files and merge them with command-line arguments.\n4.  **User Feedback**: Provide informative output to the user through logging, progress bars, and summary reports.\n5.  **Error Handling**: Gracefully handle errors and exit with appropriate status codes using `sysexits`.\n\n## Key Components\n\n### `Args` Struct (`src/cli/args.rs`)\n\nThis struct, defined using `clap`'s derive macros, represents all possible command-line arguments. It's organized into logical sections like \"Target\", \"Output\", \"Discovery\", \"Behavior\", etc., making it easier to understand and use.\n\n*   **Target**: Specifies the starting URL and CSS selector.\n*   **Output**: Defines output directories and formats (individual file output and RAG export).\n*   **Obsidian**: Options for integrating with Obsidian, such as wiki-link conversion and asset path rewriting.\n*   **Discovery**: Controls how URLs are found, including delay, concurrency, and sitemap usage.\n*   **Behavior**: Modifies the scraping process, like enabling resume mode, downloading assets, or interactive TUI.\n*   **Display**: Controls verbosity and output formatting.\n*   **Crawler Settings**: Parameters for the web crawler, like depth and timeouts.\n*   **HTTP Client Settings**: Configuration for the underlying HTTP client, including retries and backoff.\n*   **Download Settings**: Limits for asset downloads.\n*   **AI Settings**: Feature-gated options for AI-powered content cleaning.\n*   **Sitemap Settings**: Specific configurations for sitemap processing.\n\n### `Commands` Enum (`src/cli/args.rs`)\n\nThis enum defines subcommands for the `rust_scraper` binary. Currently, it only supports `Completions` for generating shell completion scripts.\n\n### `Orchestrator` (`src/cli/orchestrator.rs`)\n\nThe `run` function within this module is the central orchestrator. It takes the parsed `Args` and orchestrates the entire scraping process:\n\n1.  **Argument Validation**: Parses the target URL and checks for basic validity.\n2.  **Configuration Building**: Creates `CrawlerConfig` and `ScraperConfig` from the `Args`.\n3.  **URL Discovery**: Calls `discover_urls` to find all relevant URLs.\n4.  **Scraping**: Invokes `scrape_urls` to fetch and process the content of discovered URLs.\n5.  **Exporting**: Uses `run_export` to handle the RAG export (standard or AI-cleaned).\n6.  **File Saving**: Calls `save_files` to save individual content files (e.g., Markdown).\n\n### `Scrape Flow` (`src/cli/scrape_flow.rs`)\n\nThis module contains the logic for the scraping phase:\n\n*   **`apply_resume_mode`**: Filters discovered URLs based on a `StateStore` if resume mode is enabled.\n*   **`scrape_urls`**: Iterates through the URLs to be scraped, creates an HTTP client, and calls the core scraping logic for each URL. It also handles progress reporting via an MPSC channel.\n\n### `Export Flow` (`src/cli/export_flow.rs`)\n\nThis module manages the export of scraped data:\n\n*   **`run_export`**: Acts as a dispatcher, calling either `run_standard_export` or `run_ai_export` based on the `--clean-ai` flag and feature availability.\n*   **`run_standard_export`**: Uses the `export_factory` to process results into the specified export format (e.g., JSONL).\n*   **`run_ai_export`**: (Feature-gated) Initializes and uses the `SemanticCleaner` to process content before exporting.\n*   **`save_files`**: Handles saving individual files in formats like Markdown or Text, with Obsidian integration.\n\n### `URL Discovery` (`src/cli/url_discovery.rs`)\n\nThis module is responsible for finding URLs:\n\n*   **`discover_urls`**: Orchestrates the URL discovery process, showing a progress spinner if not in quiet mode.\n*   **`select_urls`**: Determines which URLs will actually be scraped, based on interactive selection (TUI), quick-save mode, or headless operation.\n\n### `Configuration` (`src/cli/config.rs`)\n\n*   **`ConfigDefaults`**: Defines default configuration values that can be loaded from a TOML file.\n*   **`load`**: Reads and parses the TOML configuration file.\n*   **`is_no_color` / `should_emit_emoji`**: Helper functions to manage terminal output formatting based on the `NO_COLOR` environment variable.\n*   **`init_logging` / `init_logging_dual`**: Configures the `tracing` logging subscriber.\n\n### `Preflight` (`src/cli/preflight.rs`)\n\nThis module performs checks before the main scraping begins:\n\n*   **`apply_config_defaults`**: Merges default configurations from a TOML file into the `Args` struct, respecting CLI argument precedence.\n*   **`apply_tui_config`**: Merges configuration values obtained from an interactive TUI session.\n*   **`preflight_check`**: Performs an HTTP HEAD (or GET fallback) request to verify basic network connectivity to the target URL.\n*   **`icon`**: Helper to conditionally display emojis or ASCII characters.\n\n### `Error Handling` (`src/cli/error.rs`)\n\n*   **`CliError`**: An enum defining categorized CLI errors with user-friendly messages and suggestions.\n*   **`CliExit`**: An enum mapping errors to `sysexits` exit codes, implementing the `Termination` trait for proper program termination.\n\n### `Summary` (`src/cli/summary.rs`)\n\n*   **`ScrapeSummary`**: A struct to hold statistics about a scraping run (URLs discovered, scraped, failed, duration, etc.).\n*   **`display`**: Formats the summary for console output, with options for emoji or ASCII display.\n\n### `Completions` (`src/cli/completions.rs`)\n\n*   **`generate_completions`**: Uses `clap_complete` to generate shell completion scripts for various shells.\n\n### `Wizard` (`src/cli/wizard.rs`)\n\n*   **`TtyDetector`**: Traits and structs for detecting terminal capabilities, used for interactive prompts.\n*   **`WizardPrompt`**: Enum defining different types of interactive prompts (confirmation, text input, selection, etc.).\n\n## Execution Flow\n\nThe typical execution flow for the `rust_scraper` binary is as follows:\n\n1.  **`main` function**:\n    *   Initializes logging (`init_logging_dual`).\n    *   Parses command-line arguments using `Args::parse()`.\n    *   If the `completions` subcommand is used, calls `handle_completions`.\n    *   Loads configuration defaults (`ConfigDefaults::load`).\n    *   Applies configuration defaults (`apply_config_defaults`).\n    *   If `config_tui` is enabled, runs the TUI configuration wizard and applies its settings (`apply_tui_config`).\n    *   Performs a preflight network check (`preflight_check`).\n    *   Calls the main orchestrator `run` function.\n    *   Reports any `CliExit` status.\n\n2.  **`orchestrator::run`**:\n    *   Validates the target URL.\n    *   Builds `CrawlerConfig` and `ScraperConfig`.\n    *   Calls `discover_urls` to get a list of URLs to potentially scrape.\n    *   Calls `select_urls` to filter the discovered URLs based on interactive mode, quick-save, etc.\n    *   Calls `apply_resume_mode` to filter URLs if resume mode is active.\n    *   Calls `scrape_urls` to perform the actual web scraping.\n    *   Saves individual files using `save_files`.\n    *   Calls `run_export` to handle the RAG export.\n    *   Returns the final `CliExit` status.\n\n```mermaid\ngraph TD\n    A[main.rs] --> B_Args__parse[\"B(Args::parse)\"];\n    B --> C{Subcommand?};\n    C -- Completions --> D_handle_completions[\"D(handle_completions)\"];\n    C -- No Subcommand --> E_init_logging[\"E(init_logging)\"];\n    E --> F_ConfigDefaults__load[\"F(ConfigDefaults::load)\"];\n    F --> G_apply_config_defaults[\"G(apply_config_defaults)\"];\n    G --> H{Config TUI?};\n    H -- Yes --> I_run[\"I(run\"] config TUI);\n    I --> J_apply_tui_config[\"J(apply_tui_config)\"];\n    J --> K_preflight_check[\"K(preflight_check)\"];\n    H -- No --> K;\n    K --> L_orchestrator__run[\"L(orchestrator::run)\"];\n\n    L --> M_discover_urls[\"M(discover_urls)\"];\n    M --> N_select_urls[\"N(select_urls)\"];\n    N --> O_apply_resume_mode[\"O(apply_resume_mode)\"];\n    O --> P_scrape_urls[\"P(scrape_urls)\"];\n    P --> Q_save_files[\"Q(save_files)\"];\n    Q --> R_run_export[\"R(run_export)\"];\n    R --> S_CliExit[\"S(CliExit)\"];\n\n    D --> S;\n    L --> S;\n\n    subgraph CLI Interface\n        B; C; D; E; F; G; H; I; J; K; L; M; N; O; P; Q; R; S;\n    end\n```\n\n## Integration with Other Modules\n\n*   **`clap`**: Used extensively for argument parsing in `src/cli/args.rs`.\n*   **`tracing`**: Used for logging throughout the CLI module and integrated via `init_logging` in `src/cli/config.rs`.\n*   **`url`**: Used for parsing and manipulating URLs, especially in `orchestrator.rs` and `url_discovery.rs`.\n*   **`indicatif`**: Used for progress bars in `url_discovery.rs` and `scrape_flow.rs`.\n*   **`thiserror` / `anyhow`**: Used for defining and propagating errors in `src/cli/error.rs`.\n*   **`sysexits`**: Used via `CliExit` for standard program exit codes.\n*   **`wreq`**: Used in `preflight.rs` for network connectivity checks.\n*   **`clap_complete`**: Used in `completions.rs` for shell completion generation.\n*   **Application Layer**: The CLI module acts as a thin layer, calling functions from the `application` layer (e.g., `discover_urls_for_tui`, `scrape_single_url_for_tui`, `export_factory`) to perform the core logic.\n*   **Infrastructure Layer**: Interacts with infrastructure components like `StateStore`, `SemanticCleaner`, and HTTP clients.\n*   **Domain Layer**: Consumes and produces domain entities like `ScrapedContent`.","configuration":"# Configuration\n\n# Configuration Module\n\nCentralized application configuration and validation for the scraper/crawler stack.\n\nThis module defines the top-level `Config` type used across the application, along with a small `ConfigError` enum for validation failures. It also exposes `AiConfig` behind the `ai` feature flag.\n\nThe intent is to keep configuration as an infrastructure concern while still making it easy for application and CLI code to construct, validate, and pass around a single configuration object.\n\n## Responsibilities\n\n- Aggregate the configuration needed by the major subsystems:\n  - `ScraperConfig`\n  - `CrawlerConfig`\n  - `HttpClientConfig`\n  - `ObsidianOptions`\n  - `AiConfig` when `feature = \"ai\"`\n- Provide sensible defaults through `Config::new()` and `Default`\n- Validate cross-cutting invariants that are not owned by the individual config structs\n- Surface validation errors through `ConfigError`\n\n## Public API\n\n### `Config`\n\n```rust\npub struct Config {\n    pub scraper: ScraperConfig,\n    pub crawler: CrawlerConfig,\n    pub http: HttpClientConfig,\n    pub obsidian: ObsidianOptions,\n    #[cfg(feature = \"ai\")]\n    pub ai: AiConfig,\n}\n```\n\n`Config` is the central bundle of runtime configuration for the application.\n\nThe fields are public, so callers can construct or mutate configs directly when needed, but the intended usage is usually:\n\n1. Start from `Config::new()` or `Config::default()`\n2. Override one or more sub-configs\n3. Call `validate()`\n4. Pass the config into application wiring, services, or infrastructure\n\n### `Config::new()`\n\nCreates a configuration with default values for all enabled subsystems.\n\nKey defaults:\n\n- `scraper` uses `ScraperConfig::default()`\n- `crawler` is built with:\n  - base URL: `\"https://example.com\"`\n  - `CrawlerConfig::builder(...).build()`\n- `http` uses `HttpClientConfig::default()`\n- `obsidian` uses `ObsidianOptions::default()`\n- `ai` defaults are applied when the feature is enabled:\n  - `threshold: 0.3`\n  - `max_tokens: 512`\n  - `offline: false`\n\n`Config::default()` simply delegates to `Config::new()`.\n\n### `Config::validate()`\n\nValidates a few top-level invariants that matter to runtime behavior.\n\nChecks performed:\n\n- `scraper.scraper_concurrency > 0`\n- `crawler.max_pages > 0`\n- `http.max_retries <= 10`\n\nIf any check fails, validation stops at the first error and returns a `ConfigError`.\n\n### `ConfigError`\n\n```rust\npub enum ConfigError {\n    InvalidConcurrency,\n    InvalidMaxPages,\n    InvalidRetries,\n}\n```\n\nValidation errors are intentionally compact and targeted at the current top-level checks:\n\n- `InvalidConcurrency` — scraper concurrency is zero\n- `InvalidMaxPages` — crawler page limit is zero\n- `InvalidRetries` — HTTP retry count exceeds the allowed bound\n\nEach variant has a user-facing error message via `thiserror::Error`.\n\n## Feature-gated AI config\n\nWhen the `ai` feature is enabled, `Config` includes:\n\n```rust\npub struct AiConfig {\n    pub threshold: f32,\n    pub max_tokens: usize,\n    pub offline: bool,\n}\n```\n\nThis struct is deliberately minimal and focused on semantic filtering / offline AI behavior:\n\n- `threshold` controls relevance filtering\n- `max_tokens` caps chunk size\n- `offline` disables remote AI usage\n\nBecause it is feature-gated, any code that accesses `config.ai` must also be compiled with the `ai` feature enabled.\n\n## Validation model\n\nValidation here is intentionally shallow and structural. It does not attempt to re-validate every nested field owned by sub-configs. Instead, it enforces a few global constraints that are easy to violate when wiring the application together.\n\nThis keeps the module aligned with clean architecture boundaries:\n\n- Subsystems own their own detailed config semantics\n- `Config` enforces top-level runtime safety rules\n- CLI/preflight layers can call `validate()` before starting work\n\n### Validation flow\n\n```mermaid\nflowchart TD\n    A[Config::new / Default] --> B[Caller overrides fields]\n    B --> C[Config::validate()]\n    C --> D{scraper_concurrency == 0?}\n    D -- yes --> E[Err InvalidConcurrency]\n    D -- no --> F{crawler.max_pages == 0?}\n    F -- yes --> G[Err InvalidMaxPages]\n    F -- no --> H{http.max_retries > 10?}\n    H -- yes --> I[Err InvalidRetries]\n    H -- no --> J[Ok(())]\n```\n\n## Integration points in the codebase\n\nThis module is not isolated; it is wired into CLI, HTTP client setup, scraper flow, and MCP server initialization.\n\n### CLI / orchestration\n\nThe CLI orchestrator constructs and adjusts `Config` using the scraper-related builder methods from `ScraperConfig`:\n\n- `with_images()`\n- `with_documents()`\n- `with_output_dir(...)`\n- `with_max_pages(...)`\n- `with_scraper_concurrency(...)`\n\nThe orchestration flow also uses `ConcurrencyConfig::resolve()` and `ConcurrencyConfig::is_auto()` from `src/infrastructure/config.rs` during preflight/default application.\n\n### HTTP client\n\nHTTP client creation consumes `Config` directly:\n\n- `create_http_client` uses `Config`\n- `create_rate_limited_client` reads values via `Config`/related config accessors such as `get`\n\nThe top-level config therefore influences retries, concurrency, and client behavior downstream.\n\n### Scraper and crawler services\n\nScraper/crawler paths check whether asset downloads are enabled by calling:\n\n- `ScraperConfig::has_downloads()`\n\nThis is the main switch used by:\n\n- `download_assets_if_enabled`\n- integration-level scrape flows that decide whether to fetch images/documents\n\n### MCP server\n\nThe MCP server wiring constructs or defaults `Config` to bootstrap request handling and application behavior.\n\n## How this module relates to `infrastructure::config`\n\nDo not confuse `src/config.rs` with `src/infrastructure/config.rs`.\n\nThey solve different problems:\n\n- `src/config.rs` defines the **top-level application configuration bundle**\n- `src/infrastructure/config.rs` defines **scraper/runtime configuration primitives**, including:\n  - `ScraperConfig`\n  - `ConcurrencyConfig`\n  - `OutputFormat`\n\n`Config` depends on `ScraperConfig` from the infrastructure module, but it is not a replacement for it.\n\n## Construction patterns\n\n### Recommended: start with defaults\n\n```rust\nlet mut config = Config::new();\nconfig.scraper = config.scraper.with_images();\nconfig.scraper = config.scraper.with_output_dir(\"./output\".into());\n\nconfig.validate()?;\n```\n\n### Recommended: mutate before startup\n\nBecause fields are public, a common pattern is to create the config early, override values from CLI/env/file loading, and then validate before wiring application services.\n\n### Avoid: bypassing validation\n\nSince validation is separate from construction, callers should not assume `Config::new()` implies the runtime is safe for all inputs. Any externally sourced overrides should be validated explicitly.\n\n## Notes on invariants\n\nThe current top-level checks are conservative:\n\n- `scraper_concurrency == 0` is rejected even though `ScraperConfig::default()` uses `3`\n- `crawler.max_pages == 0` is rejected even though the default builder path likely produces a nonzero or unset value\n- `http.max_retries > 10` is rejected to prevent unbounded or excessive retry behavior\n\nIf you add new top-level fields that can invalidate runtime behavior, extend `Config::validate()` and add a matching `ConfigError` variant.\n\n## Testing implications\n\nThe tests in this area primarily live in `src/infrastructure/config.rs`, but this module’s behavior is exercised indirectly through:\n\n- application container wiring\n- HTTP client creation\n- asset download flows\n- MCP server setup\n\nWhen changing `Config` defaults or validation rules, verify the following integration points still behave as expected:\n\n- CLI startup paths\n- crawler page limits\n- HTTP retry behavior\n- asset download enablement\n- AI feature-gated code paths\n\n## Extending the module\n\nWhen adding a new configuration field:\n\n1. Add the field to `Config`\n2. Initialize it in `Config::new()`\n3. Add validation in `Config::validate()` if there is a global invariant\n4. Add a corresponding error variant in `ConfigError` when needed\n5. Update call sites that construct or destructure `Config`\n\nWhen adding feature-gated config:\n\n- follow the existing `#[cfg(feature = \"...\")]` pattern used for `AiConfig`\n- keep defaults inside `Config::new()` so the feature remains easy to enable\n\n## Minimal example\n\n```rust\nuse rust_scraper::Config;\n\nfn main() -> Result<(), Box<dyn std::error::Error>> {\n    let mut config = Config::new();\n\n    config.scraper = config.scraper.with_images();\n    config.scraper = config.scraper.with_scraper_concurrency(5);\n    config.scraper = config.scraper.with_max_pages(100);\n\n    config.validate()?;\n\n    Ok(())\n}\n```\n\n## Summary\n\n`src/config.rs` is the application’s central configuration hub:\n\n- it assembles subsystem configs into one struct\n- it provides defaults suitable for bootstrapping the app\n- it enforces a small set of global safety checks\n- it is the primary handoff object for CLI, services, and infrastructure wiring","core-application-logic-application":"# Core Application Logic — application\n\n# Core Application Logic — application\n\nThis module contains the core application logic, acting as the orchestrator for various scraping and data processing tasks. It defines the application's use cases, dependency injection container, and core services.\n\n## Purpose\n\nThe `application` module is responsible for:\n\n1.  **Dependency Injection**: Providing a centralized `Container` to manage and wire up all services and their dependencies, adhering to Clean Architecture principles.\n2.  **Core Use Cases**: Implementing high-level functionalities such as crawling websites (`crawler_service`), scraping individual URLs (`scraper_service`), managing crawl results (`crawl_result_repository`), and handling data export (`export_factory`, `export_utils`).\n3.  **Cross-Cutting Concerns**: Managing shared concerns like rate limiting (`rate_limiter`), URL deduplication (`deduplicator`), and communication channels (`results_channel`).\n4.  **Configuration and State**: Holding application-level configurations and managing state for features like resume mode.\n\n## Key Components\n\n### 1. Dependency Injection Container (`container.rs`)\n\nThe `Container` struct serves as the application's dependency injection container. It holds instances of various services and configurations, ensuring they are created once and reused throughout the application.\n\n*   **`Container::new(...)`**: Initializes the container by creating instances of infrastructure services like `HttpClient` and `CrawlResultRepositoryImpl`.\n*   **`http_client`**: An `Arc<HttpClient>` for making HTTP requests.\n*   **`state_store`**: An optional `Arc<StateStore>` used for resume functionality.\n*   **`crawl_result_repo`**: An optional `Arc<dyn CrawlResultRepository>` that uses an append-only log for storing crawl results.\n\n### 2. Crawl Result Repository (`crawl_result_repository.rs`)\n\nImplements the `CrawlResultRepository` trait using an append-only log file (`crawl_results.bin`) for persistence and a `DashMap` for an in-memory index (URL -> byte offset).\n\n*   **Storage Format**: `[4 bytes: u32 LE payload_length][N bytes: JSON ScrapedContent][1 byte: \\n]`\n*   **`CrawlResultRepositoryImpl::new(...)`**: Initializes the repository, spawns a background writer task, and recovers the index from an existing log file.\n*   **`recover_index(...)`**: Scans the log file to rebuild the in-memory index.\n*   **`save(...)`**: Appends a `ScrapedContent` to the log via an MPSC channel to a background writer. This is the hot path, designed for minimal overhead.\n*   **`find_by_url(...)`**: Reads directly from the log file using the offset from the in-memory index for O(1) lookups.\n*   **`BackgroundWriter`**: A separate task that handles sequential writes to the log file, preventing lock contention on the main thread.\n\n### 3. Crawler Service (`crawler_service.rs`)\n\nThis module contains the primary crawling logic. It's marked as **DEPRECATED** and users are advised to migrate to the newer `application::crawler` module. It provides functions for discovering and scraping URLs, including support for sitemaps and basic rate limiting.\n\n*   **`CrawlState`**: Manages the state of a resumable crawl.\n*   **`discover_urls_for_tui(...)`**: Discovers URLs from a website, either via sitemap or by scraping links from a single page. Designed for TUI interaction.\n*   **`scrape_urls_for_tui(...)`**: Scrapes a given list of URLs, downloading and extracting content. Uses `buffer_unordered` for concurrency.\n*   **`scrape_single_url_for_tui(...)`**: Handles the scraping of a single URL, including HTML cleaning and content extraction using Readability or a fallback.\n*   **`crawl_site(...)`**: The legacy function for crawling an entire site, managing tasks, rate limiting, and results collection.\n*   **`crawl_with_sitemap(...)`**: Crawls a site using its sitemap, with logic for auto-discovery and handling nested sitemaps.\n\n### 4. Deduplicator (`deduplicator.rs`)\n\nProvides URL deduplication logic, extracted for testability and potential future backend swapping (e.g., Redis).\n\n*   **`UrlDeduplicator` Trait**: Defines the interface for deduplication operations (`is_visited`, `mark_visited`, `check_and_mark`).\n*   **`InMemoryDeduplicator`**: An implementation using `Arc<Mutex<HashSet<String>>>` for thread-safe, in-memory deduplication.\n*   **`normalize_url(...)`**: A utility function to normalize URLs for consistent comparison (removes trailing slashes, www prefixes, default ports, etc.).\n*   **`ResultsCollector`**: A generic collector for accumulating results, designed to avoid `Arc<Mutex<Vec<T>>>` contention by using channels.\n\n### 5. Export Factory (`export_factory.rs`)\n\nHandles the creation of different exporter types based on the desired `ExportFormat`.\n\n*   **`create_exporter(...)`**: Factory function that instantiates `JsonlExporter` or `VectorExporter` based on the `ExportFormat` enum. Supports `Auto` detection.\n*   **`create_state_store(...)`**: Initializes a `StateStore` for tracking processed URLs, typically used in resume mode.\n*   **`process_results(...)`**: Orchestrates the export process, converting `ScrapedContent` into `DocumentChunkUnvalidated`, validating them, exporting via the chosen exporter, and updating the `StateStore` if resume mode is active.\n*   **`domain_from_url(...)`**: Utility to extract the domain name from a URL.\n\n### 6. Rate Limiter (`rate_limiter.rs`)\n\nImplements rate limiting using the `governor` crate, providing a thread-safe mechanism to control request frequency and concurrency.\n\n*   **`RateLimiterConfig`**: Configuration for delay (milliseconds) and concurrency (burst).\n*   **`SharedRateLimiter`**: A wrapper around `governor::RateLimiter` using `Arc` for shared access across async tasks.\n*   **`RateLimiterBackend`**: Enum to specify `InMemory` or `Redis` (prepared but not fully implemented).\n*   **`RateLimiter` Enum**: Acts as a unified interface, potentially using a distributed Redis backend or falling back to `InMemory`.\n*   **`until_ready()`**: The core method that asynchronously waits until a request is allowed according to the configured rate limits.\n\n### 7. Results Channel (`results_channel.rs`)\n\nProvides a high-performance, lock-free mechanism for collecting crawl results using Tokio's MPSC (Multi-Producer, Single-Consumer) channels.\n\n*   **`CrawlMessage`**: Enum representing messages sent through the channel (`Success` or `Error`).\n*   **`ResultsCollector`**: Manages the MPSC channel. It holds the sender (`tx`) which is cloned for worker tasks, and spawns a dedicated receiver task that owns the final `Vec<DiscoveredUrl>`.\n*   **`is_full(...)`**: Atomically checks if the maximum number of pages has been reached without requiring a lock.\n*   **`collect()`**: Consumes the channel, waits for the receiver task to finish, and returns the collected results.\n\n### 8. Scraper Service (`scraper_service.rs`)\n\nThis module contains the core logic for scraping a single URL, including fetching HTML, cleaning it, extracting content using Readability, downloading assets, and performing basic SPA detection.\n\n*   **`detect_spa_content(...)`**: Analyzes extracted content and raw HTML to heuristically detect if a page is a Single Page Application (SPA) that might require JavaScript rendering.\n*   **`scrape_with_readability(...)`**: A convenience function to scrape a URL using the Readability algorithm with default configurations.\n*   **`scrape_with_config(...)`**: The main function for scraping a URL. It handles:\n    *   Fetching HTML using `wreq::Client`.\n    *   Checking HTTP status codes and network errors.\n    *   Logging HTML size (truncated for large bodies).\n    *   Detecting WAF/CAPTCHA challenges.\n    *   Cleaning HTML boilerplate using `html_cleaner`.\n    *   Extracting content using `readability::parse` or `fallback::extract_text`.\n    *   Performing SPA detection.\n    *   Downloading assets if enabled via `ScraperConfig`.\n    *   Returning `ScrapedContent`.\n\n## Execution Flow Example: Crawling a Site\n\nA typical crawl operation might involve the following flow:\n\n1.  **Initialization**: The `Container` is created, initializing services like `HttpClient`, `CrawlResultRepositoryImpl`, and `SharedRateLimiter`.\n2.  **Crawl Start**: `crawl_site` (or `crawl_with_sitemap`) is called with a `CrawlerConfig`.\n3.  **URL Discovery**: Seed URLs are added to a queue (`UrlQueue` or `VecDeque`). If using sitemaps, `crawl_with_sitemap` is invoked.\n4.  **Task Spawning**: The main loop spawns worker tasks up to the configured `concurrency` limit. Each task:\n    *   Acquires a permit from the `SharedRateLimiter` (`until_ready()`).\n    *   Fetches a URL using `fetch_url` (which internally uses `HttpClient`).\n    *   If successful, extracts links using `extract_links`.\n    *   Normalizes and filters discovered links using `normalize_url` and `is_allowed`.\n    *   Adds valid, unvisited internal links back to the URL queue.\n    *   Sends `CrawlMessage::Success` to the `ResultsCollector`.\n    *   Handles errors by sending `CrawlMessage::Error` and incrementing an error counter.\n5.  **Result Collection**: The `ResultsCollector` receives messages via its MPSC channel. A dedicated receiver task accumulates results.\n6.  **Completion**: Once the URL queue is empty and all tasks are joined, `ResultsCollector::collect()` is called to retrieve all gathered `DiscoveredUrl` entries.\n7.  **Export**: The collected URLs might then be passed to `scrape_urls_for_tui` or `scrape_with_config` for detailed scraping, and finally processed by `process_results` for export.\n\n## Mermaid Diagram (Conceptual)\n\n```mermaid\ngraph TD\n    subgraph Application Layer\n        A[Container] --> B_HttpClient[\"B(HttpClient)\"];\n        A --> C_CrawlResultRepositoryImpl[\"C(CrawlResultRepositoryImpl)\"];\n        A --> D_SharedRateLimiter[\"D(SharedRateLimiter)\"];\n        A --> E_ResultsCollector[\"E(ResultsCollector)\"];\n        A --> F_CrawlerService[\"F(CrawlerService)\"];\n        A --> G_ScraperService[\"G(ScraperService)\"];\n        A --> H_ExportFactory[\"H(ExportFactory)\"];\n        A --> I_Deduplicator[\"I(Deduplicator)\"];\n\n        F --> J_fetch_url[\"J(fetch_url)\"];\n        F --> K_extract_links[\"K(extract_links)\"];\n        F --> L_normalize_url[\"L(normalize_url)\"];\n        F --> M_is_allowed[\"M(is_allowed)\"];\n        F --> E;\n        F --> D;\n\n        G --> N_readability__parse[\"N(readability::parse)\"];\n        G --> O_fallback__extract_text[\"O(fallback::extract_text)\"];\n        G --> P_download_assets_if_enabled[\"P(download_assets_if_enabled)\"];\n        G --> Q_detect_spa_content[\"Q(detect_spa_content)\"];\n        G --> R_WafInspector[\"R(WafInspector)\"];\n\n        C --> S_BackgroundWriter[\"S(BackgroundWriter)\"];\n\n        H --> T_create_exporter[\"T(create_exporter)\"];\n        H --> U_process_results[\"U(process_results)\"];\n        H --> V_create_state_store[\"V(create_state_store)\"];\n    end\n\n    subgraph Domain Layer\n        B --> W_HttpClientConfig[\"W(HttpClientConfig)\"];\n        C --> X_CrawlResultRepository[\"X(CrawlResultRepository)\"];\n        C --> Y_ScrapedContent[\"Y(ScrapedContent)\"];\n        F --> Z_CrawlerConfig[\"Z(CrawlerConfig)\"];\n        F --> AA_DiscoveredUrl[\"AA(DiscoveredUrl)\"];\n        F --> AB_CrawlResult[\"AB(CrawlResult)\"];\n        G --> AC_ScraperConfig[\"AC(ScraperConfig)\"];\n        G --> AD_ScrapedContent[\"AD(ScrapedContent)\"];\n        G --> AE_ValidUrl[\"AE(ValidUrl)\"];\n        G --> AF_DownloadedAsset[\"AF(DownloadedAsset)\"];\n        H --> AG_Exporter[\"AG(Exporter)\"];\n        H --> AH_ExporterConfig[\"AH(ExporterConfig)\"];\n        H --> AI_ExportFormat[\"AI(ExportFormat)\"];\n        H --> AJ_StateStore[\"AJ(StateStore)\"];\n        I --> AK_UrlDeduplicator[\"AK(UrlDeduplicator)\"];\n        E --> AL_CrawlMessage[\"AL(CrawlMessage)\"];\n        E --> AA;\n        D --> AM_RateLimiterConfig[\"AM(RateLimiterConfig)\"];\n    end\n\n    subgraph Infrastructure Layer\n        B --> AN_http[\"AN(http)\"];\n        C --> AO_repositories[\"AO(repositories)\"];\n        C --> AP_storage[\"AP(storage)\"];\n        F --> AQ_crawler[\"AQ(crawler)\"];\n        F --> AR_http[\"AR(http)\"];\n        G --> AS_scraper[\"AS(scraper)\"];\n        G --> AT_converter[\"AT(converter)\"];\n        G --> AU_http[\"AU(http)\"];\n        G --> AV_waf_engine[\"AV(waf_engine)\"];\n        C --> AW_dashmap[\"AW(dashmap)\"];\n        C --> AX_tokio__sync__mpsc[\"AX(tokio::sync::mpsc)\"];\n        H --> AY_export[\"AY(export)\"];\n        H --> AZ_state_store[\"AZ(state_store)\"];\n        I --> BA_tokio__sync__Mutex[\"BA(tokio::sync::Mutex)\"];\n        E --> BB_tokio__sync__mpsc[\"BB(tokio::sync::mpsc)\"];\n        D --> BC_governor[\"BC(governor)\"];\n    end\n\n    %% Connections between layers\n    B -- uses --> AN;\n    C -- implements --> AO;\n    C -- uses --> AP;\n    F -- uses --> AQ;\n    F -- uses --> AR;\n    G -- uses --> AS;\n    G -- uses --> AT;\n    G -- uses --> AU;\n    G -- uses --> AV;\n    C -- uses --> AW;\n    C -- uses --> AX;\n    H -- uses --> AY;\n    H -- uses --> AZ;\n    I -- uses --> BA;\n    E -- uses --> BB;\n    D -- uses --> BC;\n\n    %% Domain entities used by Application components\n    AA -- used by --> F;\n    AD -- used by --> G;\n    AE -- used by --> G;\n    AF -- used by --> G;\n    Y -- used by --> C;\n    Y -- used by --> G;\n    AB -- used by --> F;\n    AG -- used by --> H;\n    AH -- used by --> H;\n    AI -- used by --> H;\n    AJ -- used by --> H;\n    AK -- used by --> I;\n    AL -- used by --> E;\n    X -- used by --> C;\n    Z -- used by --> F;\n    AC -- used by --> G;\n    AM -- used by --> D;\n    W -- used by --> B;\n    AX -- used by --> C;\n    BB -- used by --> E;\n    BA -- used by --> I;\n    BC -- used by --> D;\n```","core-application-logic-src":"# Core Application Logic — src\n\n# Core Application Logic — src\n\nThis module contains the core application logic, including the dependency injection container.\n\n## Dependency Injection Container (`src/di.rs`)\n\nThe `di.rs` file defines the `Container` struct, which serves as the application's dependency injection (DI) container. This container is responsible for holding and providing access to the application's core services and configurations.\n\n### Purpose\n\nThe `Container` follows the principles of Clean Architecture by residing in the application layer. Its primary purpose is to:\n\n*   **Centralize Dependencies:** Manage all application-level dependencies in a single location.\n*   **Promote Reusability:** Ensure that services are instantiated once and reused throughout the application's lifetime, preventing redundant object creation and managing shared state.\n*   **Decouple Components:** Allow different parts of the application to access necessary services without needing to know how they are created or managed.\n\n### Components\n\nThe `Container` struct holds the following key dependencies:\n\n*   `config`: An `Arc<Config>` that holds the application's overall configuration. `Arc` is used for shared ownership, allowing multiple parts of the application to access the configuration safely.\n*   `http_client`: An `Arc<HttpClient>` that provides an HTTP client instance. This client is configured with settings from the application's configuration.\n\n### Functionality\n\n#### `Container::new(config: Config)`\n\nThis is the constructor for the `Container`. It takes the application's `Config` as input and performs the following actions:\n\n1.  **Configuration Validation:** It calls `config.validate()?` to ensure the provided configuration is valid before proceeding.\n2.  **HTTP Client Initialization:** It creates a new `HttpClient` instance using the HTTP-specific settings from the `config.http` field. This client is then wrapped in an `Arc` for shared access.\n3.  **Container Instantiation:** It constructs and returns a new `Container` instance, wrapping the validated `config` and the initialized `http_client` in `Arc`.\n\n#### `Container::config(&self) -> &Config`\n\nReturns a reference to the application's configuration.\n\n#### `Container::http_client(&self) -> &HttpClient`\n\nReturns a reference to the application's HTTP client.\n\n#### `Container::scraper_config(&self) -> &ScraperConfig`\n\nReturns a reference to the scraper-specific configuration, which is a sub-field of the main `config`.\n\n### Integration with the Codebase\n\nThe `Container` is instantiated early in the application's startup process, typically when the main server (e.g., MCP server) is being built.\n\n**Execution Flow Example:**\n\n```mermaid\ngraph TD\n    A[start_mcp_server] --> B_build_mcp_router[\"B(build_mcp_router)\"];\n    B --> C_Container__new[\"C(Container::new)\"];\n    C --> D_HttpClient__new[\"D(HttpClient::new)\"];\n    C --> E_config_validate[\"E(config.validate)\"];\n    C --> F_Container[\"F(Container\"] instance);\n```\n\nAs shown in the call graph and execution flows, the `Container::new` function is invoked by `build_mcp_router` within the MCP server setup. This means that once the `Container` is created, it's available to any component that needs it during the server's operation. The `Container` itself does not make outgoing calls to other modules but rather provides access to services that might.","core-application-logic":"# Core Application Logic\n\n# Core Application Logic\n\nThis module group encapsulates the fundamental business logic and orchestration of the application. It defines the core use cases, manages dependencies, and provides the services necessary for crawling, scraping, and exporting data.\n\nThe `application` sub-module acts as the central orchestrator. It defines high-level use cases such as website crawling (`crawler_service`) and individual URL scraping (`scraper_service`). It also manages the persistence of crawl results through the `crawl_result_repository` and handles data export via the `export_factory` and `export_utils`.\n\nThe `src` sub-module, specifically `src/di.rs`, houses the `Container` which is the application's dependency injection mechanism. This `Container` centralizes the instantiation and management of all application-level services, ensuring adherence to Clean Architecture principles and promoting reusability.\n\nKey workflows that span these sub-modules include:\n\n*   **Crawling and Scraping**: The `crawler_service` initiates crawls, potentially using sitemaps, and delegates the scraping of individual URLs to the `scraper_service`. The `scraper_service` can be configured to download assets, which involves interaction with asset handling logic.\n*   **Data Management**: Crawl results are persisted using the `crawl_result_repository`, which supports operations like saving, finding by URL, and retrieving all results.\n*   **Exporting**: The `export_factory` orchestrates the creation of appropriate exporters, leveraging `export_utils` for tasks like determining domain information from URLs.\n*   **Dependency Resolution**: The `Container` from `src/di.rs` is used throughout the application to provide instances of services like the `crawler_service`, `scraper_service`, and `crawl_result_repository`, ensuring they are correctly wired with their own dependencies.\n\n```mermaid\ngraph TD\n    subgraph Core Application Logic\n        application[application]\n        src[src]\n    end\n\n    application -->|Defines Use Cases| crawler_service\n    application -->|Defines Use Cases| scraper_service\n    application -->|Manages Persistence| crawl_result_repository\n    application -->|Handles Exporting| export_factory\n    application -->|Handles Exporting| export_utils\n\n    src -->|Provides DI Container| Container\n    Container -->|Injects Services| crawler_service\n    Container -->|Injects Services| scraper_service\n    Container -->|Injects Services| crawl_result_repository\n    Container -->|Injects Services| export_factory\n    Container -->|Injects Services| export_utils\n\n    crawler_service -->|Scrapes URLs| scraper_service\n    scraper_service -->|Saves Results| crawl_result_repository\n    crawl_result_repository -->|Stores Data| Persistence Layer\n    export_factory -->|Uses Utilities| export_utils\n```","crawling-engine":"# Crawling Engine\n\n# Crawling Engine\n\nThe Crawling Engine module is responsible for the core logic of discovering and fetching web pages. It orchestrates the crawling process, managing concurrency, rate limiting, and the collection of discovered URLs. This module acts as the central hub for initiating and controlling web crawls.\n\n## Purpose\n\nThe primary purpose of the Crawling Engine is to:\n\n1.  **Manage the crawl lifecycle:** Initiate a crawl from a seed URL, manage the queue of URLs to visit, and terminate the crawl when conditions are met (e.g., max pages, max depth).\n2.  **Handle concurrency:** Spawn and manage multiple crawling tasks concurrently to improve efficiency.\n3.  **Integrate with rate limiting:** Ensure that crawling respects the defined rate limits to avoid overwhelming target servers.\n4.  **Collect results:** Gather information about visited pages, including successful fetches and errors.\n5.  **Deduplicate URLs:** Maintain a record of visited URLs to prevent redundant crawling.\n\n## Key Components\n\nThe Crawling Engine is composed of several key components:\n\n### `crawl_site` Function\n\nThis is the main entry point for initiating a crawl. It takes a `CrawlerConfig` as input and orchestrates the entire crawling process.\n\n*   **Initialization:** Sets up logging spans, clones the configuration for safe sharing across asynchronous tasks, and initializes essential components like the rate limiter, URL queue, visited set, and results collector.\n*   **Seeding:** Adds the initial seed URL to the URL queue.\n*   **Crawl Loop:** Enters a loop that continues as long as there are URLs in the queue or active crawling tasks.\n    *   **Task Management:** Manages a `tokio::task::JoinSet` to track active crawling tasks.\n    *   **Queue Processing:** Drains URLs from the internal `UrlQueue` and adds them to a `VecDeque` for processing.\n    *   **Task Spawning:** For each URL, it checks if it has been visited. If not, it spawns a new asynchronous task to handle the crawling of that URL. This task respects the concurrency limits and integrates with the rate limiter.\n    *   **Result Collection:** Processes results from completed tasks and updates the `ResultsCollector`.\n*   **Termination:** Breaks the loop when the maximum number of pages is reached or when both the URL queue and active tasks are exhausted.\n*   **Finalization:** Collects all results and returns a `CrawlResult`.\n\n### `UrlQueue`\n\nA thread-safe queue specifically designed for managing URLs during the crawling process.\n\n*   **Concurrency:** Uses `tokio::sync::Mutex` to protect the internal `Vec<DiscoveredUrl>` for thread-safe access.\n*   **Deduplication:** Integrates with a `DashSet<String>` to keep track of URLs that have been added to the queue or already visited, preventing duplicate entries.\n*   **Operations:** Provides methods for `push`ing new URLs, `pop_front`ing URLs to be processed, and `drain_all`ing all pending URLs.\n\n## Execution Flow\n\nThe `crawl_site` function orchestrates the following high-level flow:\n\n1.  **Setup:** Initialize configuration, rate limiter, URL queue, visited set, and results collector.\n2.  **Seed:** Add the starting URL to the queue.\n3.  **Loop:**\n    *   Check if the maximum page limit has been reached.\n    *   Process any completed crawling tasks.\n    *   Transfer URLs from the internal `UrlQueue` to the main processing queue.\n    *   For each URL in the processing queue:\n        *   Check if the URL has already been visited.\n        *   If not visited and concurrency limits allow, spawn a new crawling task.\n        *   The spawned task will acquire a permit from the rate limiter before proceeding.\n4.  **Termination:** Exit loop when the queue is empty and no tasks are running, or when the page limit is hit.\n5.  **Result Aggregation:** Collect and return the final crawl results.\n\n```mermaid\ngraph TD\n    A[CrawlerConfig] --> B_crawl_site[\"B(crawl_site)\"];\n    B --> C{Initialize Components};\n    C --> D[RateLimiter];\n    C --> E[UrlQueue];\n    C --> F[Visited Set];\n    C --> G[ResultsCollector];\n    B --> H[Seed URL];\n    H --> E;\n    B --> I{Crawl Loop};\n    I -- While URLs or Tasks --> J{Process Completed Tasks};\n    I -- While URLs or Tasks --> K{Drain UrlQueue};\n    K --> L[Processing Queue];\n    I -- While URLs or Tasks --> M{Spawn New Tasks};\n    L -- Pop URL --> M;\n    M -- Check Visited --> F;\n    M -- If Not Visited & Concurrency OK --> N[Spawn Task];\n    N --> D;\n    N --> O[HTTP Fetch & Parse];\n    O --> G;\n    I -- Max Pages Reached --> P[End Loop];\n    J --> G;\n    M --> I;\n    B --> Q[Collect Results];\n    Q --> R[CrawlResult];\n\n    %% Styling\n    classDef component fill:#f9f,stroke:#333,stroke-width:2px;\n    classDef data fill:#ccf,stroke:#333,stroke-width:1px;\n    classDef process fill:#cfc,stroke:#333,stroke-width:1px;\n\n    class B,D,E,F,G,N,O component;\n    class A,H,L,R data;\n    class C,I,J,K,M,P,Q process;\n```\n\n## Integration with Other Modules\n\n*   **`application::crawler::discovery`:** The `crawl_site` function relies on discovery mechanisms (like `crawl_with_sitemap`) to populate the initial URL queue and to process discovered URLs from fetched pages.\n*   **`application::rate_limiter`:** The engine integrates directly with `SharedRateLimiter` to ensure requests are made at an appropriate pace.\n*   **`application::results_channel`:** The `ResultsCollector` is used to gather the outcomes of individual page fetches.\n*   **`domain::CrawlerConfig`:** The entire crawling process is configured by `CrawlerConfig`, which dictates seed URLs, depth, concurrency, rate limits, and more.\n*   **`infrastructure::crawler::http_client`:** While the engine itself doesn't perform HTTP requests directly, the tasks it spawns will use `fetch_url` to get page content.\n*   **`infrastructure::crawler::sitemap_parser`:** The `crawl_site` function can be configured to use sitemaps, which are parsed by this module.\n\n## Usage\n\nThe primary way to use the Crawling Engine is by calling the `crawl_site` function with a `CrawlerConfig`:\n\n```rust\nuse rust_scraper::domain::CrawlerConfig;\nuse rust_scraper::application::crawler::crawl_site;\n\n#[tokio::main]\nasync fn main() -> Result<(), Box<dyn std::error::Error>> {\n    let config = CrawlerConfig {\n        seed_url: \"https://example.com\".to_string(),\n        max_depth: 3,\n        max_pages: 1000,\n        concurrency: 10,\n        delay_ms: 500,\n        timeout_secs: 30,\n        include_patterns: vec![],\n        exclude_patterns: vec![],\n        // ... other fields\n    };\n\n    match crawl_site(config).await {\n        Ok(crawl_result) => {\n            println!(\"Crawl finished successfully. Total pages: {}\", crawl_result.total_pages);\n            // Process crawl_result.results\n        }\n        Err(crawl_error) => {\n            eprintln!(\"Crawl failed: {:?}\", crawl_error);\n        }\n    }\n\n    Ok(())\n}\n```","data-extraction-and-detection":"# Data Extraction and Detection\n\n# Data Extraction and Detection Module\n\nThis module is responsible for extracting relevant data from web pages, specifically focusing on identifying and classifying assets like images and documents. It also provides mechanisms for detecting MIME types and downloading these assets.\n\n## Overview\n\nThe Data Extraction and Detection module acts as a bridge between raw HTML content and structured, usable data. It leverages several sub-modules to achieve its goals:\n\n*   **MIME Type Detection (`adapters::detector::mime`):** Identifies the type of a file or data based on its extension or content (magic bytes).\n*   **Asset Extraction (`extractor`):** Parses HTML to find and extract URLs of images and documents.\n*   **Asset Downloading (`infrastructure::scraper::asset_download`):** Handles the process of downloading identified assets.\n*   **Text Extraction (`infrastructure::scraper::fallback` and `infrastructure::scraper::readability`):** Extracts readable text content from HTML, with fallback mechanisms.\n\n## Key Components and Functionality\n\n### 1. MIME Type Detection (`adapters::detector::mime`)\n\nThis sub-module provides utilities to determine the type of a resource.\n\n*   **`AssetType` Enum:**\n    *   Represents the classified type of an asset: `Image`, `Document`, or `Unknown`.\n    *   Provides helper methods `is_image()` and `is_document()`.\n\n*   **Detection Functions:**\n    *   **`detect_from_url(url: &str) -> AssetType`**: Detects the asset type by examining the file extension in the URL. It first attempts to parse the URL and then uses `detect_from_path`.\n    *   **`detect_from_path(path: &str) -> AssetType`**: Detects the asset type based on the file extension extracted from a given path. It maintains lists of known image and document extensions.\n    *   **`detect_from_bytes(data: &[u8]) -> AssetType`**: (Feature-gated by `images` or `documents`) Detects the asset type by analyzing the \"magic bytes\" (initial bytes of the file content) using the `mimetype-detector` crate. This is a more robust method than extension-based detection.\n\n*   **Helper Functions:**\n    *   **`get_extension(url: &str) -> Option<String>`**: Extracts the file extension from a URL.\n    *   **`get_mime_type(url: &str) -> Option<&'static str>`**: Attempts to determine the MIME type of a resource from its URL. It prioritizes extension-based detection.\n\n*   **Constants:**\n    *   `IMAGE_MIMES`, `DOCUMENT_MIMES`: Lists of known MIME types for images and documents, used by `detect_from_bytes`.\n    *   `IMAGE_EXTENSIONS`, `DOCUMENT_EXTENSIONS`: Lists of known file extensions for images and documents, used by `detect_from_path`.\n\n### 2. Asset Extraction (`extractor`)\n\nThis sub-module focuses on parsing HTML to find URLs of images and documents.\n\n*   **`AssetUrl` Struct:**\n    *   Represents a discovered asset with its `url`, `asset_type`, and optional `alt` text (for images) or description (for documents).\n\n*   **Extraction Functions:**\n    *   **`extract_images(document: &Html, base_url: &url::Url) -> Vec<AssetUrl>`**: Extracts image URLs from `<img>` tags (both `src` and `srcset` attributes) and `<source>` tags within `<picture>` elements. It uses pre-compiled CSS selectors for efficiency.\n    *   **`extract_documents(document: &Html, base_url: &url::Url) -> Vec<AssetUrl>`**: Extracts document URLs from `<a>` tags. It filters out links that are not actual resources (e.g., fragment identifiers, JavaScript links) and checks if the URL points to a document using `detect_from_url`. The link's text content is used as a description.\n    *   **`extract_all_assets(html: &str, base_url: &url::Url) -> Vec<AssetUrl>`**: A convenience function that parses the HTML document once and then calls both `extract_images` and `extract_documents` to gather all asset URLs.\n\n*   **Internal Helpers:**\n    *   **`process_asset_src(src: &str, base_url: &url::Url, alt: Option<String>) -> Option<AssetUrl>`**: A core function that takes a source URL, resolves it against a base URL, filters out invalid or non-asset sources (like `data:` URIs), detects the asset type, and returns an `AssetUrl` if valid.\n    *   **`parse_srcset(srcset: &str) -> Vec<String>`**: Parses the `srcset` attribut
