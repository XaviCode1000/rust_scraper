ow progress and errors are reported back to the UI\n- the event and state types used to model progress\n- the expected async event loop structure using `tokio::select!`\n- acceptance criteria and test expectations\n\nThis spec is the coordination point between the scraper service, the TUI adapter layer, and the widgets that render progress and error state.\n\n## What this spec covers\n\nThe document is focused on the scraping phase of the TUI:\n\n- a progress widget with per-URL state\n- an error log widget for live failures\n- a unified progress event stream\n- a non-blocking event loop that handles user input and scraper updates concurrently\n\nIt explicitly excludes:\n\n- URL discovery and selection behavior\n- scraping logic changes in the application layer\n- export pipeline changes\n\nThat separation matters: the spec assumes the scraper already exists and only defines how the TUI observes and presents its work.\n\n## Core concepts defined by the spec\n\n### `ScrapeProgress`\n\n`ScrapeProgress` is the event payload sent from the scraper layer into the TUI over a `tokio::mpsc` channel. It models the lifecycle of a URL scrape:\n\n- `Started`\n- `StatusChanged`\n- `Completed`\n- `Failed`\n- `Finished`\n\nThis is the bridge between backend work and frontend state. The spec uses it to avoid coupling the TUI directly to scraping internals.\n\n### `ScrapeStatus`\n\n`ScrapeStatus` is the per-URL state machine displayed by the progress widget:\n\n- `Pending`\n- `Fetching`\n- `Extracting`\n- `Downloading`\n- `Completed`\n- `Failed`\n\nThe spec also defines `ScrapeStatus::icon()`, which returns the visual symbol used in the list view.\n\n### `ScrapeError` and `ErrorType`\n\n`ScrapeError` is the internal error representation for failures in scraping. `ScrapeError::error_type()` maps it to an `ErrorType`, and `ScrapeError::message()` turns it into a display-friendly string.\n\n`ErrorType` is designed for UI rendering and classification:\n\n- `Network`\n- `Http(u16)`\n- `WafBlocked(String)`\n- `Parse(String)`\n- `Timeout`\n- `Connection`\n- `Other`\n\nThis split lets the UI show both a human-readable message and a structured severity/category.\n\n### `ErrorEntry`\n\n`ErrorEntry` represents one rendered row in the error log widget:\n\n- timestamp\n- URL\n- error type\n- message\n\nThe spec uses `chrono::DateTime<Utc>` for ordering and display.\n\n### `ProgressState`\n\n`ProgressState` aggregates the whole scraping batch:\n\n- URL states\n- counts for total/completed/failed\n- collected errors\n- start time\n- ETA\n\nIt also defines `percentage()` and `update_eta()` as the core derived-state helpers.\n\n### `UrlState`\n\n`UrlState` holds the per-URL UI state:\n\n- `url`\n- `status`\n- `chars`\n- `error`\n\nThis is the data structure the progress widget renders line by line.\n\n### `AppEvent`\n\n`AppEvent` is the event union for the TUI loop. It combines:\n\n- keyboard input\n- scraper progress\n- tick events\n- quit signals\n- a no-op state\n\nThe intent is to keep the event loop logic centralized and avoid separate control paths for input, background work, and animation timing.\n\n## Architecture described by the spec\n\nThe module layout proposed by the spec is:\n\n```text\nsrc/adapters/tui/\n├── mod.rs\n├── terminal.rs\n├── url_selector.rs\n├── progress_state.rs\n├── progress_widget.rs\n├── error_log_widget.rs\n├── scrape_progress.rs\n├── app_event.rs\n└── event_loop.rs\n```\n\nThis reflects a clean split:\n\n- `scrape_progress.rs` defines the shared progress/error enums\n- `progress_state.rs` tracks derived batch state\n- `progress_widget.rs` renders the batch progress view\n- `error_log_widget.rs` renders failures\n- `app_event.rs` normalizes event sources\n- `event_loop.rs` drives the async TUI loop\n\nThe existing terminal setup and URL selection code are intentionally left unchanged.\n\n## Runtime flow implied by the spec\n\nThe high-level flow is:\n\n1. the UI discovers URLs\n2. the user selects URLs interactively\n3. the scraper begins work\n4. the scraper sends `ScrapeProgress` messages through a bounded `tokio::mpsc` channel\n5. the TUI event loop receives progress updates alongside user input\n6. the TUI updates `ProgressState`\n7. widgets redraw the current scraping status and errors\n\nThe spec requires `tokio::select!` in the event loop so that input and progress updates are handled concurrently without blocking.\n\n```mermaid\nflowchart LR\n  Scraper[Scraper service] -->|ScrapeProgress| Ch[tokio::mpsc channel]\n  Ch --> Loop[TUI event loop]\n  Input[Keyboard input] --> Loop\n  Loop --> State[ProgressState]\n  State --> P[Progress widget]\n  State --> E[Error log widget]\n```\n\n## How the spec is intended to be used\n\nThis document functions as both a requirements contract and an implementation guide. Contributors should use it to:\n\n- understand what the progress UI must do\n- verify the shape of new types before implementing them\n- align the scraper service and TUI adapter on event payloads\n- derive tests and acceptance checks\n\nIf implementation details drift from the spec, the spec should be updated first or in lockstep.\n\n## Implementation constraints encoded in the spec\n\nThe document is specific about several engineering choices:\n\n- `tokio::mpsc` is the event transport\n- the channel is bounded with capacity 100\n- failed sends should be logged but must not fail scraping\n- `tokio::select!` drives the event loop\n- user input has priority over lower-level rendering ticks\n- the tick interval is 100ms\n- the error panel defaults to 10 visible entries\n\nThese constraints are important because they shape responsiveness and failure behavior. They also make the UI’s concurrency model testable.\n\n## UI behavior defined by the spec\n\nThe progress screen is designed around three visible concerns:\n\n- batch completion percentage\n- per-URL status and counts\n- a live error feed\n\nThe visual examples in the spec show:\n\n- a top progress bar with a percentage and ETA\n- a URL list with status icons\n- a bottom error widget, newest first\n- a summary line with completed / remaining / failed counts\n\nThe spec also defines the handling of failures:\n\n- failed URLs remain visible\n- errors appear quickly in the log\n- WAF errors are classified separately from generic HTTP failures\n- the UI should continue processing remaining URLs after a failure\n\n## Testing guidance in the spec\n\nThe spec includes both unit and integration testing targets.\n\n### Unit-level targets\n\n- `ScrapeStatus::icon()`\n- `ScrapeError::error_type()`\n- `ScrapeError::message()`\n- `ProgressState::percentage()`\n- `ProgressState::update_eta()`\n\n### Integration-level targets\n\n- scraping a batch and observing progress updates\n- showing errors for failed URLs\n- quitting cleanly with `q`\n- force-stopping with `Ctrl+C`\n\nThe acceptance criteria are written to be directly testable, including responsiveness expectations in milliseconds.\n\n## Example of the intended data flow\n\nA scraper implementation following this spec would emit events like:\n\n```rust\nprogress_tx.send(ScrapeProgress::Started { url: url.clone() }).await?;\nprogress_tx.send(ScrapeProgress::StatusChanged {\n    url: url.clone(),\n    status: ScrapeStatus::Fetching,\n}).await?;\nprogress_tx.send(ScrapeProgress::Completed {\n    url: url.clone(),\n    chars: 1234,\n}).await?;\n```\n\nOn failure:\n\n```rust\nprogress_tx.send(ScrapeProgress::Failed {\n    url: url.clone(),\n    error: ScrapeError::Http(404, \"Not Found\".into()),\n}).await?;\n```\n\nThe TUI is expected to translate those events into `ProgressState` updates and widget redraws.\n\n## Relationship to the rest of the codebase\n\nThis specification sits at the boundary between:\n\n- the scraper service, which produces work and progress events\n- the TUI adapter layer, which consumes those events and renders them\n- the existing URL selection flow, which precedes scraping\n\nIt does not replace implementation code, but it defines the contract that the implementation should satisfy. For contributors, it is the best place to start before modifying the TUI progress path or adding new progress-related event types.\n\n## Notes on scope and future changes\n\nThe spec deliberately defers several enhancements:\n\n- animated progress bars\n- pause/resume\n- retry failed URLs\n- per-URL timing\n- export during scraping\n- multi-select retry workflows\n\nIf any of those are added later, they should be introduced as explicit spec updates so the UI behavior, event model, and tests remain aligned.","documentation-and-examples-state-md":"# Documentation and Examples — STATE.md\n\n# Project State\n\nThis document provides a snapshot of the `rust_scraper` project's current status, including test results, recent fixes, architectural details, and relevant commands. It serves as a quick reference for developers to understand the project's health and operational aspects.\n\n## Current Status\n\n✅ **ALL TESTS PASSING**\n\n**Date**: 2026-04-22\n\n## Test Suite Status\n\nThe project's test suite is comprehensive and currently shows all tests passing.\n\n| Test Group              | Status   |\n|-------------------------|----------|\n| All unit tests          | ✅ PASS  |\n| Integration tests       | ✅ PASS  |\n| CLI binary tests        | ✅ PASS  |\n| Security tests          | ✅ PASS  |\n| Vector exporter tests   | ✅ PASS  |\n\n## Recent Fixes\n\nThis section details recent changes made to address specific issues and improve the project's stability and functionality.\n\n### 1. Tokio-console Conflict\n\n*   **Files Affected**: `Cargo.toml`, `src/main.rs`\n*   **Issue**: The `console-subscriber` crate, when used as a global test hook (`0.5`), interfered with the execution of CLI binary tests.\n*   **Resolution**: The `console-subscriber` dependency was removed from `Cargo.toml`, and the `console_subscriber::init()` call was removed from `src/main.rs`.\n*   **Tests Impacted**: 5 CLI binary tests.\n\n### 2. Entropy Detection Threshold Adjustment\n\n*   **File Affected**: `src/application/http_client/waf.rs`\n*   **Issue**: The UTF-8 encoding of code points 128-255 results in 2-byte sequences, which naturally lowers the byte entropy to approximately 5.5 bits. This was causing false positives in entropy-based detection.\n*   **Resolution**: The entropy threshold for detection was lowered from 6.5 to 6.0, and subsequently to 5.5, to accommodate this characteristic of UTF-8 encoding.\n*   **Tests Impacted**: `test_detect_by_entropy_high`, `test_datadome_high_entropy_detection`.\n\n### 3. CLI Error Output Correction\n\n*   **File Affected**: `src/cli/error.rs`\n*   **Issue**: The `CliExit::Termination::report()` method was not printing error messages to `stderr` as expected.\n*   **Resolution**: `eprintln!(\"Error: {}\", msg)` was added for each error variant within `report()` to ensure errors are directed to the standard error stream.\n*   **Tests Impacted**: `test_invalid_url_shows_error`.\n\n### 4. Vector Exporter Test Data Correction\n\n*   **File Affected**: `src/infrastructure/export/vector_exporter.rs`\n*   **Issue**: The `create_test_chunk()` helper function was generating documents without the `embeddings` field. However, some tests were written expecting this field to be present.\n*   **Resolution**: In the affected tests, the `embeddings` field is now manually added to the document using `doc.embeddings = Some(vec![...])`.\n*   **Tests Impacted**: `test_serialize_document_with_embeddings`, `test_serialize_document_dimension_mismatch`.\n\n## Architecture Summary\n\n*   **Core Technologies**: Rust 1.88, Tokio (for asynchronous operations), wreq (for HTTP requests, including TLS fingerprinting), ratatui (for TUI rendering), tract-onnx (for ONNX model inference).\n*   **Development Hardware**: Intel i5-4590 (4 Cores), 8GB DDR3 RAM, HDD storage.\n*   **Test Execution**: `cargo-nextest` is used as the test runner, configured with 2 threads to optimize performance on HDD systems.\n\n## Commands\n\nA collection of useful commands for interacting with the `rust_scraper` project.\n\n*   **Run Tests**:\n    ```bash\n    cargo nextest run --test-threads 2\n    ```\n*   **Check Compilation**:\n    ```bash\n    cargo check\n    ```\n*   **Linting**:\n    ```bash\n    cargo clippy -- -D warnings\n    ```\n*   **CI Pipeline Execution**:\n    ```bash\n    just test-ci\n    ```\n\n## Call Graph & Execution Flows\n\nThis module primarily serves as a status report and does not contain executable code that participates in internal or external call graphs or execution flows within the `rust_scraper` application itself. It is a documentation artifact.","documentation-and-examples-typestate-pattern":"# Documentation and Examples — typestate-pattern\n\n# Typestate Pattern for Compile-Time Validation\n\nThis module introduces the Typestate pattern to enforce compile-time validation of `DocumentChunk` objects before they can be exported. This approach shifts validation from runtime checks to compile-time guarantees, preventing invalid data from reaching export mechanisms.\n\n## Motivation\n\nPreviously, `DocumentChunk` objects could be created without explicit validation, leading to potential runtime errors when these unvalidated chunks were passed to exporters like `FileExporter`. The Typestate pattern addresses this by ensuring that a `DocumentChunk` must transition through a `Validated` state before it can be exported.\n\n## Design and Architecture\n\nThe core of this pattern relies on Rust's private state pattern using marker types and `PhantomData`.\n\n### Key Components\n\n*   **State Marker Structs**: Private, empty structs (`Draft`, `Validated`, `Exported`) represent the possible states of a `DocumentChunk`. These are not intended to be constructed directly by users.\n*   **`DocumentChunk<S>`**: The main entity struct. It now includes a generic type parameter `S` representing its current state, defaulting to `Draft`. `PhantomData<S>` is used to associate the state with the struct without storing any data.\n*   **State Transitions**: Methods like `.validate()` and `.export()` are implemented on specific state variants of `DocumentChunk`.\n    *   `DocumentChunk<Draft>` has a `.validate()` method that consumes the `Draft` chunk and returns a `DocumentChunk<Validated>`.\n    *   `DocumentChunk<Validated>` has an `.export()` method, which is the only state from which export is permitted.\n*   **Backward Compatibility**: A type alias `type DocumentChunk = DocumentChunk<Draft>;` is provided to maintain compatibility with existing code that does not explicitly specify the state.\n\n### Architectural Decisions\n\n*   **State Representation**: Private, empty structs are used as marker types for states. This is idiomatic in Rust for typestate and avoids runtime overhead associated with enums or trait objects.\n*   **`DocumentChunk` Location**: The `DocumentChunk` struct and its state-related logic remain in `src/domain/entities.rs` to minimize refactoring.\n*   **Compile-Time vs. Trait Bounds**: The `Exporter` trait is updated to accept `DocumentChunk<Validated>` via a trait bound (`where S: Validated`). This directly enforces the validation requirement at compile time.\n*   **API Backward Compatibility**: A type alias allows existing code to continue using `DocumentChunk` without modification, while new code can explicitly use `DocumentChunk<Draft>` or `DocumentChunk<Validated>`.\n\n## Data Flow\n\nThe typical data flow for a `DocumentChunk` is as follows:\n\n```mermaid\ngraph TD\n    A[ScrapedContent] --> B_DocumentChunk[\"B(DocumentChunk\"]<Draft>);\n    B --> C{Call .validate()};\n    C --> D_DocumentChunk[\"D(DocumentChunk\"]<Validated>);\n    D --> E{Call Exporter.export()};\n    E --> F[Exported Result];\n```\n\nA `ScrapedContent` is initially converted into a `DocumentChunk<Draft>`. This `Draft` chunk must then be explicitly validated using the `.validate()` method, transitioning it to `DocumentChunk<Validated>`. Only the `Validated` chunk can be passed to an `Exporter`'s `.export()` method.\n\n## Integration with Other Modules\n\n*   **`src/domain/entities.rs`**: This is the primary location for the `DocumentChunk` struct, state marker definitions, and transition methods.\n*   **`src/domain/exporter.rs`**: The `Exporter` trait is modified to require `DocumentChunk<Validated>` as input for its `export` method.\n*   **`src/infrastructure/export/file_exporter.rs`**: The concrete implementation of the `Exporter` trait is updated to align with the modified `Exporter` trait.\n*   **`src/export_flow.rs` and `src/export_factory.rs`**: These modules, which consume the `DocumentChunk` for export, are updated to call `.validate()` before calling `.export()`.\n\n## Testing Strategy\n\n*   **Unit Tests**: Focus on verifying the state transitions and ensuring that `DocumentChunk<Draft>` cannot be compiled into the export process. Tests are located in `entities.rs`.\n*   **Integration Tests**: Verify the correct functioning of `FileExporter` with `DocumentChunk<Validated>` instances. These are located in `file_exporter.rs`.\n\n## Migration and Rollout\n\nThe migration is planned in phases:\n\n1.  **Phase 1**: Introduce state marker structs and modify `DocumentChunk` with `PhantomData`. Add the backward-compatible type alias.\n2.  **Phase 2**: Implement the `.validate()` and `.export()` methods, including basic validation logic within `.validate()`.\n3.  **Phase 3**: Update the `Exporter` trait and its implementations to require `DocumentChunk<Validated>`.\n4.  **Phase 4**: Modify consumer modules (`export_flow.rs`, `export_factory.rs`) to use the new validation and export flow.\n5.  **Phase 5**: Comprehensive testing, including compilation checks, clippy, and existing test suites (with necessary updates).\n6.  **Phase 6**: Code cleanup, ensuring no unused type warnings and verifying the backward-compatible alias.\n\nA feature flag can be used to enable/disable this functionality, and a simple rollback involves disabling the flag and reverting code changes.\n\n## Open Questions\n\n*   **Specific Validation Logic**: The exact validation checks performed by `.validate()` (e.g., content length, URL format, required fields) need to be clearly defined.\n*   **`embeddings` Field State**: It is unclear if the `embeddings` field within `DocumentChunk` also requires state management, although this is considered out of scope for the current proposal.","documentation-and-examples":"# Documentation and Examples\n\n# Documentation and Examples\n\nThis module serves as the central repository for all documentation, research, and example code related to the `rust_scraper` project. Its purpose is to provide comprehensive guidance for users, developers, and contributors, ensuring clarity on the project's functionality, architecture, and development practices.\n\nThe sub-modules within this group work together to offer a complete picture of the project:\n\n*   **`README.md`**: Acts as the primary entry point, summarizing the project's purpose, installation, and common usage, while linking to more detailed documentation.\n*   **`AGENTS.md`**: Provides specific instructions for AI agents interacting with the Rust Scraper, detailing workflows and commands.\n*   **`DEVELOPMENT.md`**: Outlines the development workflow, tooling, and best practices for contributing to the project, including setup and testing guidelines.\n*   **`STATE.md`**: Offers a snapshot of the project's current status, including test results and recent fixes, serving as a quick health check.\n*   **`docs/`**: A directory containing a broad range of documentation, explaining architecture, features, and usage guides.\n*   **`research/`**: Houses research findings and proposals, such as specifications for exporting data compatible with knowledge management systems like Obsidian.\n*   **`examples/`**: Contains standalone code examples demonstrating how to use and test core components, like the MCP server in different transports.\n*   **`mpsc-channel-refactor`**: Explores a specific refactoring proposal to improve concurrency by moving from a mutex-based collector to an mpsc channel.\n*   **`typetstate-pattern`**: Details the implementation of the Typestate pattern for compile-time validation of `DocumentChunk` objects before export.\n*   **`specs/`**: Contains product and implementation specifications, such as `async-reactive-tui.md`, which defines the async progress UI for the TUI.\n\nTogether, these sub-modules ensure that the project's functionality, development processes, and future directions are well-documented and accessible.","domain-models-and-entities":"# Domain Models and Entities\n\n# Domain Models and Entities\n\nThis module defines the core domain models and entities used throughout the `rust-scraper` application. It represents the fundamental business types and data structures, adhering to Clean Architecture principles by having no dependencies on infrastructure or external frameworks. This ensures that the core business logic is pure and testable independently.\n\n## Purpose\n\nThe primary purpose of this module is to establish a robust and type-safe representation of data relevant to web crawling and content processing. This includes:\n\n*   **Crawl Job Entities**: Representing discovered URLs and their properties.\n*   **Credentials**: Securely handling sensitive information like API keys and access tokens.\n*   **Document Representation**: Defining how scraped content is structured, validated, and prepared for downstream processing (e.g., RAG pipelines).\n*   **Configuration**: Specifying how a crawler should behave for a given site.\n*   **Errors**: Defining domain-specific errors for various operations.\n*   **Value Objects**: Providing type-safe primitives for URLs, correlation IDs, etc.\n\n## Key Components\n\nThe domain layer is organized into several sub-modules, each focusing on a specific aspect of the application's data model:\n\n### `crawl_job`\n\n*   **`ContentType`**: An enum representing the type of content discovered (e.g., `Html`, `Xml`, `Text`).\n*   **`DiscoveredUrl`**: A struct representing a URL found during a crawl. It includes the URL itself, its depth in the crawl tree, its parent URL, and its content type.\n\n### `credentials`\n\nThis sub-module provides secure handling of sensitive credentials using the `secrecy` crate, ensuring memory is zeroized on drop and secrets are not leaked in debug output.\n\n*   **`ApiKey`**, **`AccessToken`**: Wrappers for API keys and access tokens, providing secure storage and redacted debug output.\n*   **`SecretCredential`**: Combines a provider name with a secret and an optional expiry timestamp.\n*   **`CredentialStore`**: A collection for managing `SecretCredential` instances, keyed by provider.\n*   **`SensitiveString`**: A general-purpose wrapper for sensitive string data.\n*   **`CredentialError`**: Enum for errors related to credential operations (e.g., `Expired`, `NotFound`).\n\n### `entities`\n\nThis module defines core business entities, particularly focusing on the representation of scraped content and its transformation into document chunks for RAG pipelines.\n\n*   **`ScrapedContent`**: Represents raw data extracted from a web page, including title, content, URL, excerpt, author, date, and downloaded assets.\n*   **`DownloadedAsset`**: Metadata about assets (images, documents) downloaded from a page.\n*   **`DocumentChunk<S>`**: A generic struct representing a piece of content ready for RAG. It uses a typestate pattern (`Draft`, `Validated`, `Exported`) to enforce a safe workflow:\n    *   `Draft`: Initial state after scraping.\n    *   `Validated`: State after passing validation checks.\n    *   `Exported`: State after being exported.\n    *   `DocumentChunkUnvalidated`, `DocumentChunkValidated`, `DocumentChunkExported`: Type aliases for convenience.\n*   **`ValidationError`**: Errors that can occur during `DocumentChunk` validation.\n*   **`ExportFormat`**: Enum defining supported export formats for RAG pipelines (`Jsonl`, `Vector`, `Auto`).\n*   **`ExportState`**: Tracks processed URLs for incremental exports.\n\n### `error`\n\n*   **`CrawlError`**: A comprehensive enum defining various errors that can occur during the crawling process. It follows the `thiserror` pattern for library error types and is designed to be non-exhaustive.\n\n### `exporter`\n\n*   **`Exporter` Trait**: Defines the interface for exporting `DocumentChunk`s to various formats.\n*   **`ExporterConfig`**: Configuration struct for exporter instances, specifying output directory, format, filename, and append mode.\n*   **`ExporterError`**: Enum for errors related to export operations.\n\n### `js_renderer`\n\n*   **`JsRenderer` Trait**: A forward-compatible stub defining the interface for rendering JavaScript-heavy web pages. No concrete implementation exists yet, but the trait is defined in the domain layer to represent this business capability.\n*   **`JsRenderError`**: Error type for JavaScript rendering failures.\n\n### `link_extractor`\n\n*   **`LinkExtractor` Trait**: Defines the contract for extracting links from HTML. Implementations are expected in the infrastructure layer.\n*   **`LinkProcessor`**: A struct containing pure functions for link normalization and validation (e.g., `is_internal_link`, `normalize_url`).\n\n### `pattern_matching`\n\n*   **`matches_pattern` function**: A utility for performing SSRF-safe glob-style pattern matching on URL hosts only, not raw URL strings.\n\n### `result`\n\n*   **`CrawlResult`**: Represents the outcome of a crawling operation, containing discovered URLs, total pages crawled, and error counts.\n\n### `site`\n\n*   **`CrawlerConfig`**: Configuration for crawling a specific site, including seed URL, depth limits, patterns, concurrency, and user agent.\n*   **`CrawlerConfigBuilder`**: A builder pattern implementation for fluently constructing `CrawlerConfig` instances.\n\n### `url_validation`\n\n*   **`validate_and_parse_url` function**: A utility for strictly validating and parsing URL strings, ensuring they use `http` or `https` schemes and have a valid host.\n\n### `url_validator`\n\n*   **`UrlValidator`**: A service containing pure functions for validating URLs against business rules, such as filtering out specific invalid patterns (e.g., certain Node.js version URLs).\n\n### `value_objects`\n\n*   **`CorrelationId`**: A value object representing W3C TraceContext correlation IDs for distributed tracing, including `trace_id` (UUID v7) and `span_id`.\n*   **`ValidUrl`**: A newtype wrapper around `url::Url` that guarantees the URL is valid at the type level, preventing runtime errors from invalid URLs.\n\n## Architecture and Relationships\n\nThe domain layer serves as the heart of the application, defining the core business logic and data structures. It is designed to be independent of any external concerns like HTTP clients, databases, or specific file formats.\n\n```mermaid\ngraph TD\n    subgraph Domain Layer\n        A[crawl_job] --> B_entities[\"B(entities)\"]\n        A --> C_error[\"C(error)\"]\n        D[credentials] --> C\n        E[entities] --> F_value_objects[\"F(value_objects)\"]\n        E --> G_url_validation[\"G(url_validation)\"]\n        E --> H_url_validator[\"H(url_validator)\"]\n        I[exporter] --> E\n        J[js_renderer] --> C\n        K[link_extractor] --> C\n        L[pattern_matching] --> F\n        M[repositories]\n        N[result] --> A\n        O[site] --> P_crawler_entities[\"P(crawler_entities)\"]\n        O --> Q_pattern_matching[\"Q(pattern_matching)\"]\n        R[url_validation] --> S_error[\"S(error)\"]\n        T[url_validator] --> U_value_objects[\"U(value_objects)\"]\n        V[value_objects]\n        W[crawler_entities] --> A\n        W --> O\n        W --> N\n        W --> C\n        W --> Q\n        X[semantic_cleaner] --> E\n    end\n\n    subgraph Application Layer\n        Y[scraper_service] --> O\n        Y --> E\n        Y --> K\n        Y --> J\n        Y --> X\n        Y --> N\n        Y --> C\n        Z[export_factory] --> I\n        Z --> E\n        AA[url_filter] --> Q\n        AA --> H\n        AA --> O\n        AB[deduplicator] --> G\n        AB --> V\n    end\n\n    subgraph Infrastructure Layer\n        AC[scraper] --> Y\n        AC --> K\n        AD[http_client] --> C\n        AE[asset_download] --> Y\n        AF[storage] --> E\n        AG[ai] --> X\n        AH[headless_chrome] --> J\n        AI[link_extractor_impl] --> K\n        AJ[repositories_impl] --> M\n        AK[url_validation_impl] --> G\n        AL[url_validator_impl] --> H\n    end\n\n    subgraph CLI/UI Layer\n        AM[export_flow] --> Z\n        AM --> Y\n        AN[crawl_flow] --> Y\n        AN --> O\n        AO[main] --> AM\n        AO --> AN\n    end\n\n    B --> V\n    C --> C\n    F --> F\n    G --> V\n    H --> G\n    I --> I\n    J --> J\n    K --> K\n    L --> L\n    M --> M\n    N --> N\n    O --> O\n    P --> P\n    Q --> Q\n    R --> R\n    S --> S\n    T --> T\n    U --> U\n    V --> V\n    W --> W\n    X --> X\n    Y --> Y\n    Z --> Z\n    AA --> AA\n    AB --> AB\n    AC --> AC\n    AD --> AD\n    AE --> AE\n    AF --> AF\n    AG --> AG\n    AH --> AH\n    AI --> AI\n    AJ --> AJ\n    AK --> AK\n    AL --> AL\n    AM --> AM\n    AN --> AN\n    AO --> AO\n\n```\n\n*   **Domain Layer**: Contains the core business logic and entities.\n*   **Application Layer**: Orchestrates use cases, coordinating domain logic and infrastructure.\n*   **Infrastructure Layer**: Provides concrete implementations for interfaces defined in the domain and application layers (e.g., HTTP clients, database access, AI model inference).\n*   **CLI/UI Layer**: Handles user interaction and application entry points.\n\nThe domain entities are fundamental building blocks used across all layers. For instance, `DocumentChunk` is created in the domain, potentially processed by application services, and then exported using infrastructure implementations. `CrawlerConfig` is used by the application layer to configure crawling tasks, which are then executed by infrastructure components. Errors defined in the domain (`CrawlError`, `ValidationError`) are propagated and handled across layers.","error-handling":"# Error Handling\n\n# Error Handling Module (`rust_scraper::error`)\n\nThis module defines the primary error types and the `Result` alias used throughout the `rust_scraper` library. It leverages the `thiserror` crate to provide robust, type-safe, and informative error handling, distinguishing it from more general-purpose error handling crates like `anyhow`.\n\n## Purpose\n\nThe goal of this module is to:\n\n*   **Centralize Error Definitions:** Provide a single source of truth for all possible errors that can occur within the `rust_scraper` library.\n*   **Enhance Debuggability:** Offer detailed error messages that aid developers in diagnosing and resolving issues.\n*   **Enable Granular Error Handling:** Allow calling code to match on specific error variants and implement tailored recovery or reporting strategies.\n*   **Facilitate Error Conversion:** Support seamless conversion from underlying library errors (e.g., `std::io::Error`, `url::ParseError`, `serde_json::Error`) into `ScraperError`.\n\n## Core Components\n\n### `ScraperError` Enum\n\nThe `ScraperError` enum is the main error type for the library. Each variant represents a distinct failure mode, often wrapping underlying errors or providing specific context.\n\n```rust\n#[derive(Error, Debug)]\npub enum ScraperError {\n    #[error(\"URL inválida: {0}\")]\n    InvalidUrl(String),\n\n    #[error(\"http error {status} al acceder a {url}\")]\n    Http {\n        status: u16,\n        url: String,\n    },\n\n    #[error(\"Error de legibilidad: {0}\")]\n    Readability(String),\n\n    #[error(\"Error de I/O: {0}\")]\n    Io(#[from] std::io::Error),\n\n    #[error(\"error de red: {0}\")]\n    Network(String),\n\n    #[error(\"error de middleware: {0}\")]\n    Middleware(String),\n\n    #[error(\"Error de serialización: {0}\")]\n    Serialization(#[from] serde_json::Error),\n\n    #[error(\"Error de YAML: {0}\")]\n    Yaml(#[from] serde_yaml::Error),\n\n    #[error(\"Error de parseo de URL: {0}\")]\n    UrlParse(#[from] url::ParseError),\n\n    #[error(\"Error de extracción: {0}\")]\n    Extraction(String),\n\n    #[error(\"Error de descarga: {0}\")]\n    Download(String),\n\n    #[error(\"Error de configuración: {0}\")]\n    Config(String),\n\n    #[error(\"WAF/CAPTCHA detectado en {url}: {provider}\")]\n    WafBlocked {\n        url: String,\n        provider: String,\n    },\n\n    #[error(\"Validación de URL falló: {0}\")]\n    Validation(String),\n\n    #[error(\"Error de conversión: {0}\")]\n    Conversion(String),\n\n    #[error(\"Error de exportación: {0}\")]\n    Export(String),\n\n    #[error(\"extracción falló para {url}: {reason}\")]\n    ExtractionFailed {\n        url: String,\n        reason: String,\n    },\n\n    #[error(\"Error de exportación en batch: {0}\")]\n    ExportBatch(String),\n\n    #[cfg(feature = \"ai\")]\n    #[error(\"Error de limpieza semántica: {0}\")]\n    Semantic(#[from] SemanticError),\n}\n```\n\n**Key Variants and Their Meanings:**\n\n*   **`InvalidUrl(String)`**: The provided URL could not be parsed or is malformed.\n*   **`Http { status: u16, url: String }`**: An HTTP request resulted in a non-success status code. Includes the status code and the URL that was requested.\n*   **`Readability(String)`**: An error occurred during the content extraction process using the Readability algorithm.\n*   **`Io(#[from] std::io::Error)`**: A standard I/O operation failed (e.g., file system access). The `#[from]` attribute allows automatic conversion from `std::io::Error`.\n*   **`Network(String)`**: A network-related error occurred (e.g., connection refused, timeout).\n*   **`Middleware(String)`**: An error originating from the request middleware, often related to retries or other request pipeline issues.\n*   **`Serialization(#[from] serde_json::Error)`**: A JSON serialization or deserialization error.\n*   **`Yaml(#[from] serde_yaml::Error)`**: A YAML serialization or deserialization error.\n*   **`UrlParse(#[from] url::ParseError)`**: An error during URL parsing, typically from the `url` crate.\n*   **`Extraction(String)`**: A general error during asset or content extraction.\n*   **`Download(String)`**: An error encountered while downloading an asset.\n*   **`Config(String)`**: An issue with the scraper's configuration.\n*   **`WafBlocked { url: String, provider: String }`**: A Web Application Firewall (WAF) or CAPTCHA challenge was detected, preventing access to the URL.\n*   **`Validation(String)`**: A general URL validation failure.\n*   **`Conversion(String)`**: An error during data format conversion (e.g., HTML to Markdown).\n*   **`Export(String)`**: An error during an export operation.\n*   **`ExtractionFailed { url: String, reason: String }`**: A specific failure during content extraction for a given URL, with a reason provided.\n*   **`ExportBatch(String)`**: An error occurred during a batch export operation, potentially indicating partial success.\n*   **`Semantic(#[from] SemanticError)`**: (Conditional on `ai` feature) An error related to AI-powered semantic cleaning operations.\n\n### `SemanticError` Enum\n\nThis enum, available only when the `ai` feature is enabled, defines errors specific to AI/ML operations like model loading, tokenization, and inference.\n\n```rust\n#[cfg(feature = \"ai\")]\n#[derive(Error, Debug)]\npub enum SemanticError {\n    #[error(\"Error cargando modelo ONNX: {0}\")]\n    ModelLoad(#[from] std::io::Error),\n\n    #[error(\"Error tokenizando texto: {0}\")]\n    Tokenize(String),\n\n    #[error(\"Error ejecutando inferencia ONNX: {0}\")]\n    Inference(String),\n\n    #[error(\n        \"Chunk {chunk_id} excede límite de tokens: {tokens} > {max} (modelo: all-MiniLM-L6-v2)\"\n    )]\n    ChunkTooLarge {\n        chunk_id: String,\n        tokens: usize,\n        max: usize,\n    },\n\n    #[error(\"Error descargando modelo '{repo}': {cause}\")]\n    Download {\n        repo: String,\n        cause: String,\n    },\n\n    #[error(\"Validación de caché falló para '{repo}': SHA256 inválido (esperado: {expected}, obtenido: {actual})\")]\n    CacheValidation {\n        repo: String,\n        expected: String,\n        actual: String,\n    },\n\n    #[error(\"Modo offline: modelo '{repo}' no está en caché\")]\n    OfflineMode {\n        repo: String,\n    },\n}\n```\n\n### `Result<T>` Type Alias\n\nA convenient type alias is provided for `std::result::Result<T, ScraperError>`, simplifying function signatures that return a `ScraperError`.\n\n```rust\npub type Result<T> = std::result::Result<T, ScraperError>;\n```\n\n### Helper Functions\n\nThe `ScraperError` enum includes several `#[must_use]` associated functions to easily construct specific error variants. These functions promote clarity and reduce boilerplate when creating errors.\n\n*   `ScraperError::invalid_url(msg: impl Into<String>) -> Self`\n*   `ScraperError::http(status: u16, url: &str) -> Self`\n*   `ScraperError::waf_blocked(url: impl Into<String>, provider: impl Into<String>) -> Self`\n*   `ScraperError::readability(msg: impl Into<String>) -> Self`\n*   `ScraperError::extraction(msg: impl Into<String>) -> Self`\n*   `ScraperError::download(msg: impl Into<String>) -> Self`\n*   `ScraperError::conversion(msg: impl Into<String>) -> Self`\n*   `ScraperError::export(msg: impl Into<String>) -> Self`\n*   `ScraperError::export_batch(msg: impl Into<String>) -> Self`\n\n## Integration with the Codebase\n\nThe `ScraperError` and its associated `Result` type are fundamental to the library's error handling strategy.\n\n*   **Function Signatures:** Most functions that can fail will return `ScraperError::Result<T>`.\n*   **Error Propagation:** The `?` operator is extensively used to propagate errors up the call stack. When an operation returns a `Result` that is an `Err`, the `?` operator will immediately return that error from the current function.\n*   **Error Conversion:** The `#[from]` attribute on variants like `Io` and `Serialization` allows for automatic conversion from underlying error types. For other types, explicit `map_err` calls might be used.\n*   **Specific Error Handling:** Callers can use `match` statements on `ScraperError` to handle specific failure modes differently. For example, a WAF block might trigger a different user notification than a simple HTTP 404.\n\n### Call Graph and Execution Flows\n\nThe `ScraperError` variants, particularly `Http` and `InvalidUrl`, are frequently encountered and handled across various parts of the application.\n\n*   **`Http` and `InvalidUrl`:** These are often generated by lower-level functions responsible for fetching and validating URLs, such as `scrape_with_config` in `scraper_service.rs` and `scrape_single_url_for_tui` in `crawler_service.rs`. The `validate_and_parse_url` function in `url_validation.rs` is a direct source of `InvalidUrl` errors.\n*   **Testing:** The included unit tests demonstrate how to create and assert against various `ScraperError` variants, ensuring the error reporting is as expected.\n\n```mermaid\ngraph TD\n    A[Scraper Service] --> B_scrape_with_config[\"B(scrape_with_config)\"];\n    C[Crawler Service] --> D_scrape_single_url_for_tui[\"D(scrape_single_url_for_tui)\"];\n    E[URL Validation] --> F_validate_and_parse_url[\"F(validate_and_parse_url)\"];\n\n    B --> G{ScraperError::Http};\n    B --> H{ScraperError::InvalidUrl};\n    D --> G;\n    D --> H;\n    F --> H;\n\n    subgraph Error Types\n        G\n        H\n    end\n```\n\nThis diagram illustrates how services like `Scraper Service` and `Crawler Service` interact with functions that can produce `Http` and `InvalidUrl` errors, which are defined within the `ScraperError` enum.","http-client":"# HTTP Client\n\n# HTTP Client Module\n\nThe HTTP Client module provides a robust and configurable HTTP client for making web requests. It wraps the `wreq` crate, enhancing it with features like retry logic, user-agent rotation, TLS fingerprint emulation, rate limiting, and WAF detection. This module is designed to handle the complexities of web scraping by providing a resilient and adaptable way to interact with web servers.\n\n## Purpose\n\nThe primary purpose of this module is to abstract away the low-level details of making HTTP requests, offering a higher-level interface that is tailored for web scraping scenarios. It aims to:\n\n*   **Improve Reliability:** Implement retry mechanisms for transient network errors and server-side issues (5xx status codes).\n*   **Bypass Detection:** Employ user-agent rotation and TLS fingerprint emulation to mimic real browser traffic and avoid detection by websites.\n*   **Manage Load:** Incorporate rate limiting to prevent overwhelming target servers and adhere to their usage policies.\n*   **Handle Challenges:** Detect and attempt to mitigate Web Application Firewall (WAF) challenges.\n*   **Provide Configuration:** Allow fine-grained control over request parameters, timeouts, and retry behavior.\n\n## Key Components\n\nThe HTTP Client module consists of the following core components:\n\n### `HttpClient` Struct\n\nThe central struct of this module, `HttpClient`, wraps the underlying `wreq::Client`. It holds the configuration, a pool of user agents, and a rate limiter.\n\n*   **`client: Client`**: The internal `wreq::Client` instance, configured with TLS emulation, default headers, timeouts, and connection pooling.\n*   **`config: HttpClientConfig`**: Stores all configurable parameters for the client's behavior, including headers, retry settings, and timeouts.\n*   **`user_agents: Vec<String>`**: A collection of user agent strings used for rotation, particularly when encountering 403 Forbidden responses.\n*   **`rate_limiter: Option<RateLimiter<NotKeyed, InMemoryState, DefaultClock>>`**: An optional rate limiter instance, configured based on the `rate_limit_rpm` setting in `HttpClientConfig`.\n\n### `HttpClientConfig` Struct\n\nThis struct defines the configurable aspects of the HTTP client. It allows users to customize various settings to tailor the client's behavior for specific scraping tasks.\n\n*   **`accept_language`**: Sets the `Accept-Language` header.\n*   **`accept`**: Sets the `Accept` header.\n*   **`referer`**: Sets the `Referer` header.\n*   **`cache_control`**: Sets the `Cache-Control` header.\n*   **`max_retries`**: The maximum number of times a request will be retried upon failure.\n*   **`backoff_base_ms`**: The base delay in milliseconds for exponential backoff.\n*   **`backoff_max_ms`**: The maximum delay in milliseconds for exponential backoff.\n*   **`enable_cookies`**: Whether to use a cookie store.\n*   **`timeout_secs`**: The overall request timeout in seconds.\n*   **`connect_timeout_secs`**: The connection timeout in seconds.\n*   **`rate_limit_rpm`**: An optional setting for requests per minute.\n*   **`tls_emulation`**: Specifies the TLS fingerprint to emulate (e.g., `Chrome145`, `Chrome131`).\n\n### `HttpError` Enum\n\nThis enum defines the possible errors that can occur during HTTP requests. It provides specific variants to help the caller understand the nature of the failure and potentially implement appropriate recovery strategies.\n\n*   **`Forbidden`**: For 403 responses, indicating potential site blocking.\n*   **`RateLimited(u64)`**: For 429 responses, including the `retry-after` duration.\n*   **`ClientError(u16)`**: For other 4xx client errors.\n*   **`ServerError(u16)`**: For 5xx server errors.\n*   **`Timeout`**: For request timeouts.\n*   **`Connection(String)`**: For connection-related errors.\n*   **`Request(String)`**: For errors during request construction or execution.\n*   **`WafChallenge(String)`**: For detected WAF or CAPTCHA challenges.\n\n### `HttpResult<T>` Type Alias\n\nA convenience type alias for `Result<T, HttpError>`, simplifying function signatures.\n\n## Core Functionality\n\n### `HttpClient::new(config: HttpClientConfig)`\n\nThis constructor creates a new `HttpClient` instance. It initializes the underlying `wreq::Client` with the provided configuration, including:\n\n*   **TLS Emulation**: Configures the client to mimic specific browser TLS fingerprints using `wreq_util::Emulation`.\n*   **Default Headers**: Sets standard headers like `sec-ch-ua`, `sec-ch-ua-mobile`, `sec-ch-ua-platform`, `sec-fetch-*`, and `upgrade-insecure-requests` to enhance browser-like behavior.\n*   **Timeouts**: Sets both the overall request timeout and the connection timeout.\n*   **Connection Pooling**: Configures the maximum number of idle connections per host and their idle timeout.\n*   **Compression**: Enables Gzip and Brotli compression.\n*   **Cookie Store**: Enables cookie persistence.\n*   **Redirect Policy**: Sets a limited redirect policy.\n*   **Rate Limiter**: Initializes a `RateLimiter` if `config.rate_limit_rpm` is set.\n\n### `HttpClient::get(url: &str)`\n\nThis is the primary method for performing GET requests. It implements the following logic:\n\n1.  **URL Validation**: Parses the URL and ensures it uses `http` or `https` schemes.\n2.  **Rate Limiting**: Waits for the rate limiter to be ready if configured.\n3.  **Retry Loop**: Enters a loop to handle retries and different error conditions.\n    *   **User-Agent Rotation**: Selects a user agent from the pool. If WAF challenges are detected and `ua_index` is within certain bounds, it increments `ua_index` to try different strategies.\n    *   **Header Management**: Applies standard headers and conditionally includes `Referer` and `Cache-Control` based on the `ua_index` (to attempt WAF bypass).\n    *   **Request Execution**: Sends the request using `self.client.get(url).send().await`.\n    *   **Error Handling**: Maps `wreq` errors to `HttpError` variants (e.g., `Timeout`, `Connection`).\n    *   **Status Code Handling**:\n        *   **2xx**: If the response body is successfully retrieved, it's checked for WAF challenges using `WafInspector::detect_body`. If a challenge is found, it triggers fallback strategies (UA rotation, minimal headers, random delay) or returns `HttpError::WafChallenge`. If no challenge, the body is returned.\n        *   **403**: Retries once with a rotated user agent. If it fails again, returns `HttpError::Forbidden`.\n        *   **429**: Implements exponential backoff, respecting the `Retry-After` header if present. It retries up to `max_attempts`.\n        *   **5xx**: Implements exponential backoff and retries up to `max_attempts`.\n        *   **Other 4xx**: Returns `HttpError::ClientError`.\n        *   **Other codes**: Returns `HttpError::ServerError`.\n\n### `create_http_client()`\n\nA legacy function that creates a `wreq::Client` with a basic configuration, including a single, randomly selected user agent and Chrome 145 TLS emulation. It's less configurable than `HttpClient::new`.\n\n### `get_random_user_agent_from_pool()`\n\nA utility function to select a random user agent from a provided slice of strings.\n\n## Integration with the Codebase\n\n*   **Configuration**: The `HttpClientConfig` struct is used to configure the client's behavior, often loaded from application settings or defaults.\n*   **Error Handling**: `HttpError` and `HttpResult` are used throughout the application to represent and handle network-related failures.\n*   **Web Scraping Logic**: The `HttpClient::get` method is the primary interface used by higher-level scraping functions (e.g., in `scraper_service.rs` and `crawler_service.rs`) to fetch web page content.\n*   **Testing**: The module includes extensive unit and integration tests, often using `wiremock` to simulate various HTTP responses and test the retry and error handling logic.\n\n## Architecture Overview\n\nThe `HttpClient` acts as a middleware layer over `wreq::Client`. It intercepts requests and responses to apply custom logic before passing them to or receiving them from the underlying `wreq` implementation.\n\n```mermaid\ngraph TD\n    A[Application Logic] --> B_HttpClient[\"B(HttpClient)\"];\n    B --> C{HttpClientConfig};\n    B --> D[wreq::Client];\n    D --> E_Network[\"E(Network)\"];\n    B -- Handles --> F[HttpError];\n    B -- Uses --> G[UserAgentCache];\n    B -- Uses --> H[RateLimiter];\n    B -- Detects --> I[WafInspector];\n\n    subgraph HttpClient Module\n        B\n        C\n        F\n        G\n        H\n        I\n    end\n```","infrastructure-adapters":"# Infrastructure Adapters\n\n# Infrastructure Adapters\n\nThis module contains the infrastructure-facing adapters used by the scraper: network asset downloading, URL/path translation, and re-exports for extraction-related helpers. It sits at the boundary between the core domain logic and external systems such as HTTP clients and the filesystem.\n\nThe two most concrete pieces in this snapshot are:\n\n- `adapters::downloader` — streams remote assets to disk with size limits, atomic rename, and MIME-based extensions\n- `adapters::url_path` — converts URLs into filesystem-safe output paths, with collision avoidance and Windows reserved-name protection\n\n`src/adapters/mod.rs` also acts as the adapter layer entry point and re-exports selected items from submodules so callers can depend on a smaller surface area.\n\n## Module layout\n\n- `src/adapters/mod.rs`\n  - `detector`\n  - `downloader`\n  - `extractor`\n  - `tui`\n  - `url_path`\n\nThe `mod.rs` file declares the adapter submodules and re-exports:\n\n- `get_extension` and `AssetType` from `detector`\n- `get_extension`, `extract_all_assets`, `extract_documents`, `extract_images`, and `AssetUrl` from `extractor`\n\nThis makes `crate::adapters` the main integration point for infrastructure concerns.\n\n## Responsibilities\n\nThis layer is responsible for:\n\n- downloading assets from remote URLs\n- choosing file extensions from MIME types\n- building stable, unique, filesystem-safe output names\n- preventing platform-specific path issues\n- providing convenience wrappers around lower-level adapters\n\nIt intentionally avoids owning higher-level scraping logic; instead, it provides the I/O primitives that the rest of the application can compose.\n\n---\n\n## `adapters::downloader`\n\n`src/adapters/downloader/mod.rs` implements a streaming download pipeline that writes assets directly to disk.\n\n### Core types\n\n#### `DownloadedAsset`\n\nRepresents the result of a successful download.\n\nFields:\n\n- `url: String` — original source URL\n- `local_path: PathBuf` — final on-disk path\n- `mime_type: Option<String>` — response `Content-Type`, if available\n- `size: u64` — number of bytes downloaded\n- `content_hash: String` — first 12 hex characters of the SHA-256 hash\n\nThe hash is computed during streaming and later used to generate the filename.\n\n#### `DownloadConfig`\n\nConfiguration for `Downloader`.\n\nFields:\n\n- `output_dir: PathBuf` — root output directory\n- `images_dir: String` — subdirectory for image assets\n- `documents_dir: String` — subdirectory for document assets\n- `max_file_size: u64` — hard size limit per file\n- `timeout_secs: u64` — request timeout\n- `concurrency_limit: usize` — batch download concurrency\n- `user_agent: String` — HTTP `User-Agent`\n\n`DownloadConfig::default()` sets:\n\n- output directory to `./downloads`\n- images directory to `images`\n- documents directory to `documents`\n- max size to 50 MB\n- timeout to 30 seconds\n- concurrency limit to 3\n- user agent to `WebCrawlerStaticPages/<package-version>`\n\n### `Downloader`\n\n`Downloader` wraps a configured `wreq::Client` plus the download configuration.\n\n#### `Downloader::new(config: DownloadConfig) -> Result<Self>`\n\nInitializes the downloader and pre-creates the asset directories.\n\nWhat it does:\n\n1. resolves `output_dir/images_dir`\n2. resolves `output_dir/documents_dir`\n3. creates both directories synchronously with `std::fs::create_dir_all`\n4. builds an HTTP client with:\n   - `Emulation::Chrome145`\n   - configured timeout\n   - configured user agent\n\nImportant behavior:\n\n- directory creation is done once up front\n- client construction failures are mapped into `ScraperError::Config`\n- I/O failures become `ScraperError::Io`\n\nThis “init once” pattern is deliberate: it removes runtime directory-creation contention from the hot download path.\n\n#### `Downloader::download(&self, url: &str) -> Result<DownloadedAsset>`\n\nDownloads a single asset using a true streaming workflow.\n\nExecution outline:\n\n1. `GET` the URL with `wreq::Client`\n2. capture the `Content-Type` header if present\n3. classify the URL via `crate::adapters::detector::detect_from_url(url)`\n4. choose the destination subdirectory:\n   - image assets → `images_dir`\n   - everything else → `documents_dir`\n5. create a UUID-named temp file in the target subdirectory\n6. stream chunks from the response\n7. for each chunk:\n   - increment byte count\n   - reject downloads exceeding `max_file_size`\n   - append chunk to disk immediately\n   - update the SHA-256 hasher\n8. sync and close the temp file\n9. finalize the hash\n10. generate the final filename from hash + MIME type\n11. atomically rename temp file to final file\n12. return a populated `DownloadedAsset`\n\nBehavioral details:\n\n- memory usage stays roughly constant because chunks are written directly to disk\n- size limits are enforced while streaming, not after the fact\n- failed oversized downloads remove the temp file before returning\n- final rename is atomic, so consumers never see partial files under the final name\n\nFilename generation uses:\n\n- the first 12 hex characters of the SHA-256 hash\n- an extension derived from MIME type when known\n- `.bin` as a fallback\n\n#### `Downloader::download_batch(&self, urls: &[String]) -> Vec<Result<DownloadedAsset>>`\n\nDownloads multiple URLs with bounded concurrency.\n\nHow it works:\n\n- returns early with an empty vector if `urls` is empty\n- turns each URL into an async task calling `self.download(&url)`\n- uses `stream::iter(...).buffer_unordered(self.config.concurrency_limit)`\n- collects the individual `Result<DownloadedAsset>` values into a `Vec`\n\nThis preserves per-item success/failure rather than failing the whole batch at the first error.\n\n#### `Downloader::generate_filename_from_hash(&self, content_hash: &str, mime_type: Option<&str>) -> String`\n\nCreates a stable filename from:\n\n- the first 12 characters of `content_hash`\n- a MIME-derived extension\n\nIf no MIME type maps cleanly to an extension, the method falls back to `.bin`.\n\nThis method is private, but it is central to the module’s collision-resistant naming strategy.\n\n### Helpers\n\n#### `into_stream(response: Response)`\n\nConverts a `wreq::Response` into a byte stream via `response.bytes_stream()`.\n\nThis is the adapter point that enables chunk-by-chunk disk writes.\n\n#### `mime_type_to_extension(mime: &str) -> Option<String>`\n\nMaps common MIME types to file extensions.\n\nSupported mappings include:\n\n- image formats:\n  - `image/jpeg` / `image/jpg` → `jpg`\n  - `image/png` → `png`\n  - `image/gif` → `gif`\n  - `image/webp` → `webp`\n  - `image/svg+xml` → `svg`\n  - `image/bmp` → `bmp`\n  - `image/tiff` → `tiff`\n  - `image/x-icon` → `ico`\n- documents and office formats:\n  - `application/pdf` → `pdf`\n  - `application/msword` → `doc`\n  - `application/vnd.openxmlformats-officedocument.wordprocessingml.document` → `docx`\n  - `application/vnd.ms-excel` → `xls`\n  - `application/vnd.openxmlformats-officedocument.spreadsheetml.sheet` → `xlsx`\n  - `application/vnd.ms-powerpoint` → `ppt`\n  - `application/vnd.openxmlformats-officedocument.presentationml.presentation` → `pptx`\n  - `application/vnd.oasis.opendocument.text` → `odt`\n  - `application/vnd.oasis.opendocument.spreadsheet` → `ods`\n  - `application/epub+zip` → `epub`\n  - `application/rtf` → `rtf`\n- text and data formats:\n  - `text/csv` → `csv`\n  - `text/plain` → `txt`\n  - `application/json` → `json`\n  - `application/xml` / `text/xml` → `xml`\n\nUnknown types return `None`.\n\n#### `quick_download(url: &str, output_dir: &Path) -> Result<DownloadedAsset>`\n\nA convenience wrapper for one-off downloads.\n\nIt:\n\n1. builds a `DownloadConfig` using the provided `output_dir`\n2. applies default values for the rest of the config\n3. constructs a `Downloader`\n4. calls `Downloader::download`\n\nUse this when you need a small, direct API. For production or repeated downloads, construct `Downloader` yourself so you can control size limits, concurrency, and user agent policy.\n\n### Downloader flow\n\n```mermaid\nflowchart TD\n    A[quick_download] --> B[DownloadConfig::default]\n    B --> C[Downloader::new]\n    C --> D[Downloader::download]\n    D --> E[detect_from_url]\n    D --> F[into_stream]\n    F --> G[write chunks + hash]\n    G --> H[generate_filename_from_hash]\n    H --> I[atomic rename]\n```\n\n---\n\n## `adapters::url_path`\n\n`src/adapters/url_path.rs` provides type-safe path handling for URL-derived output locations.\n\nIts design avoids “stringly typed” path construction by introducing dedicated newtypes for domain names and URL paths.\n\n### Why this module exists\n\nURL-to-filesystem mapping is deceptively tricky:\n\n- query strings and fragments should not affect the output path\n- `/docs` and `/docs/` need consistent behavior\n- nested trailing-slash URLs must not collapse into the same `index.md`\n- Windows reserved device names must never become filenames\n- output paths need to be reproducible and safe across platforms\n\nThis module encapsulates those rules.\n\n### `WINDOWS_RESERVED`\n\nA constant slice of Windows reserved device names:\n\n- `CON`\n- `PRN`\n- `AUX`\n- `NUL`\n- `COM1` through `COM9`\n- `LPT1` through `LPT9`\n\nThese are checked case-insensitively when generating filenames.\n\n### `Domain`\n\nA validated domain extracted from a URL.\n\n#### `Domain::from_url(url: &str) -> Result<Self, DomainError>`\n\nParses the URL and extracts the host.\n\nBehavior:\n\n- rejects invalid URLs\n- rejects URLs with no host\n- rejects empty hosts\n- strips a leading `www.` for consistency\n\nThis normalization keeps output folders stable across common host variants.\n\n#### Other `Domain` methods\n\n- `new_unchecked<S: Into<String>>(s: S) -> Self`\n  - constructor bypassing validation\n  - marked `#[allow(dead_code)]`\n- `as_str(&self) -> &str`\n- `into_string(self) -> String`\n\n`Domain` also implements `Display`, so it can be formatted directly.\n\n#### `DomainError`\n\nVariants:\n\n- `InvalidUrl(String)`\n- `NoHost`\n- `EmptyHost`\n\n### `UrlPath`\n\nRepresents a normalized path component derived from a URL.\n\nInternal fields:\n\n- `raw: String`\n- `is_root: bool`\n- `ends_with_slash: bool`\n\nThe `ends_with_slash` field is currently tracked during parsing, but the filename generation strategy does not collapse trailing-slash paths into `index.md` except for the root path.\n\n#### `UrlPath::from_url_path(path: &str) -> Self`\n\nNormalizes a raw URL path string.\n\nSteps:\n\n1. strips query string and fragment\n2. ensures the path begins with `/`\n3. detects the root path\n4. tracks whether the original path ended in `/`\n5. stores a trailing-slash-trimmed version of the path for later use\n\n#### `UrlPath::from_url(url: &str) -> Result<Self, UrlPathError>`\n\nParses a full URL and extracts its path portion.\n\n#### `UrlPath::to_safe_filename(&self) -> String`\n\nGenerates a unique, filesystem-safe filename using the default output format.\n\nRules:\n\n- root path → `index.md`\n- nested paths are flattened into a single slug using `-`\n- spaces become `_`\n- invalid path characters are sanitized\n- Windows reserved names get a `_safe` suffix\n- extension defaults to `.md`\n\nExamples:\n\n- `/` → `index.md`\n- `/docs` → `docs.md`\n- `/docs/api/` → `docs-api.md`\n- `/blog/post1/` → `blog-post1.md`\n\n#### `UrlPath::to_safe_filename_with_format(&self, format: Option<OutputFormat>) -> String`\n\nSame as `to_safe_filename`, but lets callers select the extension via `OutputFormat`:\n\n- `OutputFormat::Json` → `.json`\n- `OutputFormat::Text` → `.txt`\n- `OutputFormat::Markdown` or `None` → `.md`\n\n#### `UrlPath::to_directory(&self) -> String`\n\nReturns the parent directory portion of the path, without the final component.\n\nExamples:\n\n- `/` → `\"\"`\n- `/docs` → `\"\"`\n- `/docs/api/` → `\"docs/\"`\n\nThis is used when constructing the final folder hierarchy.\n\n#### `UrlPath::sanitize_path_segment(s: &str) -> String`\n\nInternal sanitizer used during filename generation.\n\nIt replaces invalid filesystem characters such as:\n\n- `\\`\n- `:`\n- `*`\n- `?`\n- `\"`\n- `<`\n- `>`\n- `|`\n- space\n\nwith `_`, while preserving alphanumeric characters and `-`, `_`, `.`.\n\n`UrlPath` also implements `Display` to show the normalized raw path.\n\n#### `UrlPathError`\n\nCurrently contains:\n\n- `InvalidUrl(String)`\n\n### `OutputPath`\n\nCombines `Domain` + `UrlPath` into a complete output location.\n\n#### `OutputPath::from_url(url: &str) -> Result<Self, OutputPathError>`\n\nBuilds the full output path from a URL.\n\nProcess:\n\n1. parse the domain with `Domain::from_url`\n2. parse the full URL with `url::Url`\n3. extract and normalize the path into `UrlPath`\n\n#### `OutputPath::to_folder_path(&self) -> String`\n\nProduces the directory path under `./output`.\n\nExamples:\n\n- `https://example.com/` → `./output/example.com/`\n- `https://example.com/docs/api/` → `./output/example.com/docs/`\n\n#### `OutputPath::to_full_path(&self) -> String`\n\nProduces the full file path using the default markdown format.\n\nExamples:\n\n- `https://example.com/` → `./output/example.com/index.md`\n- `https://example.com/docs/api/` → `./output/example.com/docs/docs-api.md`\n\n#### `OutputPath::to_full_path_with_format(&self, format: Option<OutputFormat>) -> String`\n\nLike `to_full_path`, but allows explicit output format selection.\n\n#### `OutputPath::to_pathbuf(&self) -> PathBuf`\n\nConvenience wrapper around `to_full_path()`.\n\n#### `OutputPath::domain(&self) -> &Domain`\n\nReturns the parsed domain.\n\n#### `OutputPath::path(&self) -> &UrlPath`\n\nReturns the parsed URL path.\n\n#### `OutputPath::images_relative_path(&self) -> String`\n\nBuilds a relative `images/` folder path for embedded assets.\n\nExamples:\n\n- root pages → `\"images/\"`\n- `/docs/api/` → `\"docs/images/\"`\n\nThis is useful for keeping asset references local to the page folder.\n\n#### `OutputPathError`\n\nVariants:\n\n- `InvalidUrl(String)`\n- `Domain(#[from] DomainError)`\n\n### URL path flow\n\n```mermaid\nflowchart TD\n    A[URL string] --> B[Domain::from_url]\n    A --> C[UrlPath::from_url]\n    B --> D[OutputPath]\n    C --> D\n    D --> E[to_folder_path]\n    D --> F[to_full_path]\n    F --> G[to_safe_filename_with_format]\n```\n\n---\n\n## Re-exports and integration points\n\n### `src/adapters/mod.rs`\n\nThis module exposes the adapter layer to the rest of the crate:\n\n- `pub mod detector;`\n- `pub mod downloader;`\n- `pub mod extractor;`\n- `pub mod tui;`\n- `pub mod url_path;`\n\nIt also re-exports:\n\n- `detector::{get_extension, AssetType}`\n\n### `src/adapters/extractor/mod.rs`\n\nThis is a thin re-export layer that bridges extraction helpers from the crate root into the adapter namespace:\n\n- `crate::adapters::detector::get_extension`\n- `crate::extractor::{extract_all_assets, extract_documents, extract_images, AssetUrl}`\n\nThis means code that works with adapter-level concerns can access extraction helpers through `crate::adapters::extractor` without needing to know the original module location.\n\n### Connection to the rest of the codebase\n\nThe adapter layer depends on shared crate-level types and services:\n\n- `crate::error::{Result, ScraperError}` for consistent error handling\n- `crate::adapters::detector::detect_from_url` to distinguish images from documents\n- `crate::OutputFormat` for output-format-aware filename generation\n- `crate::extractor::*` via re-export for URL extraction workflows\n\nIn practice, the surrounding application can:\n\n- extract asset URLs\n- classify them\n- download them with `Downloader`\n- map pages and assets into stable output paths with `OutputPath`\n\n---\n\n## Testing strategy\n\nThe module includes unit tests that validate:\n\n- downloader initialization\n- pre-creation of output directories\n- config defaults and overrides\n- MIME-to-extension mapping\n- filename generation from hashes\n- empty batch behavior\n- domain parsing\n- URL path normalization\n- output path construction\n- Windows reserved-name handling\n- collision avoidance for nested and trailing-slash URLs\n\nThe tests emphasize behavior that matters for production stability:\n\n- filesystem safety\n- deterministic naming\n- unique output generation\n- safe defaults\n\n## Implementation notes for contributors\n\n- `Downloader::new` creates directories synchronously before the async download path begins. Keep this pattern if you add more asset subdirectories.\n- `Downloader::download` is intentionally streaming; avoid introducing buffering that defeats the constant-memory design.\n- Any new MIME mappings should be added in `mime_type_to_extension`.\n- If you extend URL-to-path behavior, preserve the collision-avoidance guarantees around nested trailing-slash URLs.\n- Windows reserved-name handling should remain case-insensitive.\n- Prefer returning `Result<T, ScraperError>`-compatible errors in the downloader so callers get consistent failure modes.\n\n## Summary\n\nThe infrastructure adapters module provides the code that turns remote resources and URLs into durable local artifacts. `downloader` handles network-to-disk streaming safely and efficiently, while `url_path` guarantees that URL-derived output paths are stable, unique, and filesystem-safe. Together, they form the infrastructure backbone that higher-level scraping logic relies on.","mcp-server":"# MCP Server\n\n# MCP Server Module\n\nThe `src/infrastructure/mcp_server` module exposes the application as a Model Context Protocol (MCP) server over Streamable HTTP. It bridges AI clients to the scraper/content/export/utility functionality in the rest of the codebase and enforces per-category concurrency limits to keep the server stable on constrained hardware.\n\nThe module is split into three parts:\n\n- `state.rs` — shared server state and backpressure controls\n- `server.rs` — HTTP transport, Axum router, server startup, and tests\n- `handlers/` — tool router composition by feature/category\n\nAt the center is `McpHandler`, an MCP `ServerHandler` implementation that owns the application `Container`-backed state and registers 37 tools via `#[tool_router]` and `#[tool]` macros.\n\n---\n\n## Architecture\n\n```mermaid\nflowchart LR\n    Client[MCP Client]\n    HTTP[Axum /mcp<br/>StreamableHttpService]\n    Handler[McpHandler]\n    State[McpState<br/>Container + Semaphores]\n    App[Application / Infrastructure<br/>scraper, converter, WAF, obsidian, export]\n\n    Client --> HTTP --> Handler\n    Handler --> State\n    Handler --> App\n```\n\nThe request path is:\n\n1. An MCP client connects to `/mcp`.\n2. `StreamableHttpService` creates a fresh `McpHandler` using shared `McpState`.\n3. `McpHandler` routes the tool call to the correct method generated by `#[tool_router]`.\n4. The tool method acquires a category semaphore, validates input, and delegates to lower-level application/infrastructure code.\n5. The result is serialized into an MCP `CallToolResult`.\n\n---\n\n## Responsibilities\n\nThis module is responsible for:\n\n- exposing application capabilities as MCP tools\n- serializing tool input and output according to MCP conventions\n- protecting CPU, disk, and network resources through semaphores\n- providing a single HTTP endpoint for MCP-compatible clients\n- wiring the MCP transport into the application’s dependency injection container\n\nIt intentionally does not contain most of the business logic itself. Tool methods mostly act as thin orchestration wrappers around functions in:\n\n- `crate::application::scraper_service`\n- `crate::application::crawler_service`\n- `crate::infrastructure::converter::*`\n- `crate::infrastructure::http::waf_engine`\n- `crate::infrastructure::obsidian::*`\n- `crate::adapters::url_path`\n\n---\n\n## `McpState` and backpressure\n\n`state.rs` defines the shared state passed into every handler instance.\n\n### `CategoryLimits`\n\n`CategoryLimits` is a per-tool-category concurrency configuration:\n\n- `ai`\n- `scraping`\n- `export`\n- `obsidian`\n- `content`\n- `url_utils`\n- `security`\n- `assets`\n\nThe defaults are tuned for low-resource environments:\n\n- AI: `2`\n- scraping: `8`\n- export: `4`\n- obsidian: `3`\n- content: `6`\n- url_utils: `16`\n- security: `8`\n- assets: `4`\n\nThe important design choice is that limits are category-specific, not global. This avoids one expensive operation type starving everything else.\n\n### `CategorySemaphores`\n\n`CategorySemaphores` wraps a `tokio::sync::Semaphore` per category. Tool methods acquire a permit before doing work:\n\n```rust\nlet _permit = self.state.semaphores.scraping.acquire().await?;\n```\n\nThis pattern appears throughout the tool implementations and is the main backpressure mechanism in the module.\n\n### `McpState`\n\n`McpState` contains:\n\n- `container: Arc<Container>`\n- `limits: Arc<CategoryLimits>`\n- `semaphores: Arc<CategorySemaphores>`\n\n`McpState::new(container)` constructs the default limits and semaphores, while `McpState::with_limits(container, limits)` allows tests or callers to override the concurrency profile.\n\n---\n\n## Server startup and transport\n\n`server.rs` provides the HTTP entry point.\n\n### `DEFAULT_MCP_ADDR`\n\nDefault bind address:\n\n- `127.0.0.1:8080`\n\n### `build_mcp_router(state: McpState) -> Router`\n\nBuilds an Axum router and mounts the MCP service at `/mcp`.\n\nIt creates an `rmcp::transport::streamable_http_server::tower::StreamableHttpService` using:\n\n- a handler factory closure: `move || Ok(McpHandler::new(state.clone()))`\n- `LocalSessionManager::default()`\n\nThis means each session gets a handler instance, but the state itself is shared via `Arc`.\n\n### `start_mcp_server(state, addr)`\n\nStarts the HTTP server:\n\n1. builds the router with `build_mcp_router`\n2. binds a `TcpListener`\n3. serves the Axum app\n4. waits for graceful shutdown via `shutdown_signal()`\n\n### `shutdown_signal()`\n\nBlocks on `tokio::signal::ctrl_c()` and logs shutdown. This keeps the server responsive to `Ctrl+C` without abrupt termination.\n\n---\n\n## `McpHandler`\n\n`McpHandler` is the MCP server implementation.\n\n```rust\n#[derive(Clone)]\npub struct McpHandler {\n    pub state: McpState,\n    pub tool_router: ToolRouter<Self>,\n}\n```\n\n### Construction\n\n`McpHandler::new(state)` combines:\n\n- `Self::tool_router()` generated from the `#[tool_router]` impl block in this file\n- `handlers::build_tool_router()`, which aggregates the category submodules\n\nThis architecture leaves room for future modularization while keeping the actual tool definitions centralized today.\n\n### MCP integration\n\n`#[tool_handler] impl ServerHandler for McpHandler {}` generates the protocol-level request handling methods and delegates tool dispatch to `tool_router`.\n\n---\n\n## Tool organization\n\nTools are grouped into categories that match semaphore limits and conceptual areas of responsibility.\n\n### 1. Scraping Core\n\nTools:\n\n- `scrape_url`\n- `scrape_with_options`\n- `scrape_batch`\n- `crawl_site`\n- `crawl_with_sitemap`\n- `discover_urls`\n- `discover_sitemap`\n- `detect_spa`\n\nThese methods mostly:\n\n- acquire `semaphores.scraping`\n- validate URL parameters with `url::Url::parse`\n- call scraper/crawler services\n- serialize structured results to JSON\n\nCommon call patterns:\n\n- `crate::application::scraper_service::scrape_with_readability`\n- `crate::application::scraper_service::scrape_with_config`\n- `crate::application::scraper_service::scrape_multiple_with_limit`\n- `crate::application::crawler_service::crawl_site`\n- `crate::application::crawler_service::crawl_with_sitemap`\n- `crate::application::crawler_service::fetch_sitemap`\n- `crate::infrastructure::crawler::extract_links`\n\n`detect_spa` additionally uses:\n\n- `crate::infrastructure::scraper::fallback::extract_text`\n- `crate::application::scraper_service::detect_spa_content`\n\n### 2. Content Processing\n\nTools:\n\n- `clean_html`\n- `convert_html_to_markdown`\n- `extract_links`\n- `highlight_code_blocks`\n- `convert_wiki_links`\n- `generate_frontmatter`\n- `generate_rich_metadata`\n\nThese are mostly pure transformations and use `semaphores.content`.\n\nThey delegate to:\n\n- `crate::infrastructure::converter::html_cleaner::clean_html`\n- `crate::infrastructure::converter::html_to_markdown::convert_to_markdown`\n- `crate::infrastructure::crawler::extract_links`\n- `crate::infrastructure::converter::syntax_highlight::highlight_code_blocks`\n- `crate::infrastructure::converter::wikilinks::convert_wiki_links`\n- `crate::infrastructure::output::frontmatter::generate_with_metadata`\n- `crate::infrastructure::obsidian::metadata::{compute_word_count, compute_reading_time}`\n\n### 3. Export\n\nTools:\n\n- `export_file`\n- `export_jsonl`\n- `export_vector`\n- `process_export_pipeline`\n\nThese methods are currently mostly orchestration stubs with directory validation and status messages, but they still use `semaphores.export` to protect I/O-heavy operations.\n\nNotable logic:\n\n- `export_file` parses `ExportFormat` via `crate::domain::entities::ExportFormat::parse_str`\n- `export_file` ensures the output directory exists with `std::fs::create_dir_all`\n- filenames are built using the export format extension\n\n### 4. URL Utilities\n\nTools:\n\n- `validate_url`\n- `extract_domain`\n- `normalize_url`\n- `match_url_pattern`\n- `is_internal_link`\n- `url_to_file_path`\n\nThese are lightweight and use `semaphores.url_utils`.\n\nThey rely on:\n\n- `url::Url::parse`\n- `crate::adapters::url_path::OutputPath::from_url`\n\n`validate_url` returns a structured JSON object with the parsed components or error details.\n\n`normalize_url` strips fragments and removes trailing slashes from non-root paths.\n\n`match_url_pattern` is intentionally simple and SSRF-safe in spirit, but the current implementation is a string containment check with `*` support. If you extend it, keep the tool’s contract and security implications in mind.\n\n### 5. Security & Diagnostics\n\nTools:\n\n- `detect_waf`\n- `verify_waf_integrity`\n- `list_waf_providers`\n- `get_scrape_metrics`\n\nThese use `semaphores.security`.\n\nDelegation points:\n\n- `crate::infrastructure::http::waf_engine::WafInspector::detect_body`\n- `crate::infrastructure::http::waf_engine::WafInspector::verify_integrity`\n- `crate::infrastructure::http::waf_engine::WafInspector::supported_providers`\n\n`get_scrape_metrics` currently returns a placeholder response indicating that live metrics require an active scraping session.\n\n### 6. Obsidian Integration\n\nTools:\n\n- `detect_obsidian_vault`\n- `build_obsidian_uri`\n- `open_in_obsidian`\n- `search_obsidian`\n\nThese use `semaphores.obsidian`.\n\nDelegation points:\n\n- `crate::infrastructure::obsidian::vault_detector::detect_vault`\n- `crate::infrastructure::obsidian::uri::build_obsidian_uri`\n\n`open_in_obsidian` shells out to `open` with the generated URI, so it is platform-specific and currently macOS-oriented.\n\n`search_obsidian` is a placeholder that explicitly notes it requires `--features ai` for embedding-based search. The tool exists in the protocol surface, but the semantic implementation is not completed here.\n\n### 7. Asset Management\n\nTool:\n\n- `download_assets`\n\nThis uses `semaphores.assets`.\n\nIt validates `base_url` with `url::Url::parse` and returns a queued status message. The actual asset downloading is not yet wired to the scraper service.\n\n### 8. AI\n\nThe `handlers/ai.rs` submodule is feature-gated with `#[cfg(feature = \"ai\")]`, but currently just returns an empty `ToolRouter`.\n\nThis is important for future extension:\n\n- the category exists in state and routing\n- the semaphore budget exists\n- the routing module is ready\n- the actual tools are not yet implemented in the submodule\n\n---\n\n## Execution pattern for tools\n\nMost tool methods follow the same structure:\n\n1. acquire a category semaphore\n2. validate or parse the request parameters\n3. call the relevant service/helper\n4. convert the result into `CallToolResult`\n5. return `CallToolResult::error(...)` for recoverable failures, or `McpError::invalid_params(...)` for input validation errors\n\nThis keeps the transport layer thin and makes tool behavior predictable.\n\n### Common response shapes\n\nThe module uses two main MCP response patterns:\n\n- `CallToolResult::success(vec![Content::text(...)])`\n- `CallToolResult::error(vec![Content::text(...)])`\n\nJSON is usually pretty-printed before being wrapped in text content.\n\n---\n\n## Handler submodules\n\n`handlers/mod.rs` defines the category-level router composition.\n\n### `build_tool_router()`\n\nCombines the partial routers with `+`:\n\n- `scraping::build_router()`\n- `content::build_router()`\n- `export::build_router()`\n- `url_utils::build_router()`\n- `security::build_router()`\n- `obsidian::build_router()`\n- `assets::build_router()`\n- `ai::build_router()`\n\nThe submodules currently return empty `ToolRouter::new()` values. Their purpose is structural: they provide a path to split the large `#[tool_router]` impl into smaller files without changing the external interface.\n\n### Important note\n\n`handlers/mod.rs` comments state that all 37 tools are currently defined in the parent `mod.rs` `#[tool_router]` block. That is the effective source of truth for registered tools today.\n\n---\n\n## Tool parameter structs\n\nThe module defines request parameter types with `serde::Deserialize` and `schemars::JsonSchema` so MCP clients can infer the input schema.\n\nExamples include:\n\n- `ScrapeUrlParams`\n- `ScrapeWithOptionsParams`\n- `CrawlSiteParams`\n- `CleanHtmlParams`\n- `ExportFileParams`\n- `ValidateUrlParams`\n- `DetectWafParams`\n- `BuildObsidianUriParams`\n\nThese structs are local to the module and serve as the canonical input schema for the tools.\n\nPatterns to note:\n\n- optional fields are represented as `Option<T>`\n- parameter names are descriptive and aligned with the tool descriptions\n- many methods reuse smaller parameter structs where the shape overlaps, such as `ValidateUrlParams` for both `validate_url` and `url_to_file_path`\n\n---\n\n## Testing strategy\n\n`server.rs` contains tests for two layers:\n\n### Server assembly\n\n`test_handler_builds_with_all_tools`\n\n- constructs a `Container` with `Config::default()`\n- wraps it in `McpState`\n- builds `McpHandler`\n- checks that the tool router contains the expected tool names\n\nThis is the main smoke test for registration integrity.\n\n### Direct logic checks\n\nThe rest of the tests call lower-level helpers directly, not the MCP protocol layer, for example:\n\n- URL parsing and normalization\n- HTML cleaning and markdown conversion\n- WAF detection\n- output path conversion\n- frontmatter generation\n- wiki-link conversion\n\nThis is a good model for adding new tests: keep protocol-layer tests focused on router composition and delegate business logic testing to the underlying service/helper module.\n\n---\n\n## Extension guide\n\nWhen adding a new MCP tool to this module:\n\n1. Define a parameter struct with `Deserialize` and `JsonSchema`.\n2. Add a method inside the `#[tool_router] impl McpHandler`.\n3. Add a `#[tool(...)]` description that is concise and specific.\n4. Acquire the correct category semaphore.\n5. Delegate as much
