\nThe Utilities module provides essential helper functions and data structures that are used across various parts of the `rust-scraper` application. This includes managing user agents, handling file paths, and providing version information.\n\n## User Agent Management\n\nThe `user_agent` submodule is responsible for providing realistic User-Agent strings for HTTP requests. It implements a Time-To-Live (TTL) based caching strategy to balance performance and freshness.\n\n### Cache Strategy\n\nThe User-Agent cache follows these steps:\n\n1.  **Check Cache:** It first looks for a cached `user_agents.json` file at `~/.cache/rust_scraper/user_agents.json`.\n2.  **Validate Cache:** If the cache file exists, it checks the `chrome_version` stored within. If the cached version's year is within the last year of the current year, the cache is considered valid and used.\n3.  **Fetch Fresh:** If the cache is invalid (too old or missing), it attempts to download a fresh list of user agents from the configured API URL (`https://raw.githubusercontent.com/user-agents-api/data/main/user-agents.json`).\n4.  **Save Cache:** Upon a successful download, the new list of user agents and their metadata (including the Chrome version and download timestamp) are saved to the cache file.\n5.  **Fallback:** If downloading from the API fails for any reason, the module falls back to a hardcoded list of user agents.\n\n### Key Components\n\n*   **`UserAgentCache` Struct:**\n    *   `agents`: A `Vec<String>` holding the list of user agent strings.\n    *   `chrome_version`: The Chrome version associated with the cached user agents.\n    *   `downloaded_at`: A `DateTime<Utc>` timestamp indicating when the cache was last updated.\n\n*   **`UserAgentCache::load()`:**\n    *   The primary public method for obtaining a list of user agents.\n    *   It orchestrates the cache loading, validation, fetching, and fallback logic.\n    *   Returns a `Vec<String>` of user agents.\n\n*   **`UserAgentCache::load_from_cache()`:**\n    *   Reads and deserializes the user agent cache from the local file system.\n\n*   **`UserAgentCache::fetch_and_cache()`:**\n    *   Handles the asynchronous fetching of user agents from the remote API.\n    *   Filters for user agents with a Chrome version greater than or equal to `MIN_CHROME_VERSION` (currently 131).\n    *   Saves the fetched data to the cache file, creating directories if necessary. Errors during cache writing are silently ignored to handle read-only file systems or container environments gracefully.\n\n*   **`UserAgentCache::fallback_agents()`:**\n    *   Provides a static, hardcoded list of user agents. This is used when cache loading or API fetching fails. The fallback list includes recent Chrome and Firefox versions.\n\n*   **`get_random_user_agent_from_pool(pool: &[String]) -> String`:**\n    *   A utility function that selects a random user agent string from a given slice of strings.\n\n*   **`get_random_user_agent() -> String` (Deprecated):**\n    *   A legacy function that directly uses `fallback_agents()` to get a random user agent. It is deprecated in favor of `UserAgentCache::load()` for better cache management.\n\n### Cache Location\n\nThe cache file is stored at: `~/.cache/rust_scraper/user_agents.json`. The `dirs::cache_dir()` function is used to find the appropriate cache directory, with a fallback to the current directory if it cannot be determined.\n\n## Version Information\n\nThe module also provides a way to retrieve detailed build information about the `rust-scraper` application.\n\n*   **`version_string() -> String`:**\n    *   Returns a formatted string containing the application version, short Git commit hash, and build date. This information is embedded during the build process using the `built` crate.\n\n## Module Structure\n\n```mermaid\ngraph TD\n    A[Utilities Module] --> B_user_agent[\"B(user_agent\"] submodule);\n    B --> C{UserAgentCache};\n    C --> C1_load[\"C1(load)\"];\n    C --> C2_load_from_cache[\"C2(load_from_cache)\"];\n    C --> C3_fetch_and_cache[\"C3(fetch_and_cache)\"];\n    C --> C4_fallback_agents[\"C4(fallback_agents)\"];\n    B --> D_get_random_user_agent_from_pool[\"D(get_random_user_agent_from_pool)\"];\n    B --> E_get_random_user_agent[\"E(get_random_user_agent\"] - Deprecated);\n    A --> F_version_string[\"F(version_string)\"];\n    F --> G_built_info[\"G(built_info\"] module);\n```\n\n## Integration with the Codebase\n\n*   **HTTP Client:** The `create_http_client` function in `application/http_client/client.rs` utilizes `UserAgentCache::load()` to set up the `wreq::Client` with appropriate User-Agent headers. In cases where fetching fails, it falls back to `fallback_agents()`.\n*   **Testing:** The `user_agent` submodule includes comprehensive unit tests to verify cache loading, fallback mechanisms, and random agent selection. Integration tests also implicitly test the user agent fetching and fallback logic when setting up HTTP clients.\n*   **Build System:** The `version_string` function relies on build-time information generated by the `built` crate, which is configured in the `build.rs` file.","waf-web-application-firewall":"# WAF (Web Application Firewall)\n\n# WAF (Web Application Firewall) Engine\n\nThe WAF Engine module provides advanced detection and mitigation capabilities against Web Application Firewalls. It goes beyond simple signature matching by employing multiple layers of analysis, including header inspection, pattern matching with Aho-Corasick, and entropy analysis for detecting obfuscated challenges.\n\n## Purpose\n\nThe primary goal of this module is to identify and flag responses that are likely generated by a WAF, indicating that the target website is employing bot detection or access control mechanisms. This allows the scraper to:\n\n*   Avoid getting blocked or rate-limited.\n*   Identify when a response is not the actual content but a challenge page.\n*   Potentially adapt scraping strategies based on the detected WAF provider.\n\n## Key Components and Functionality\n\nThe `WafInspector` struct is the main entry point for WAF detection. It orchestrates checks across different layers.\n\n### Detection Layers\n\nThe `verify_integrity` function implements a multi-layered approach:\n\n1.  **Control Headers:**\n    *   Checks for specific HTTP headers known to be associated with WAFs (e.g., `x-datadome-response`, `cf-mitigated`, `x-akamai-edge-auth`).\n    *   This is the fastest check, performed first.\n    *   Implemented in `check_control_headers`.\n\n2.  **Body Signatures:**\n    *   Scans the response body for known WAF challenge patterns (e.g., \"Just a moment...\", reCAPTCHA script URLs, DataDome JS snippets).\n    *   Utilizes the `aho-corasick` crate for efficient O(N) multi-pattern matching across a large set of signatures. The `WAF_AC` static variable holds the pre-compiled automaton.\n    *   Implemented in `check_body_signatures`.\n\n3.  **Entropy Analysis (Silent Challenges):**\n    *   Detects \"silent challenges\" where a WAF returns an HTTP 200 OK status but with a minimal HTML body containing heavy JavaScript.\n    *   This is achieved by analyzing:\n        *   Body size (small bodies are more suspicious).\n        *   Density of `<script>` tags.\n        *   Ratio of script content to text content.\n    *   Implemented in `check_entropy`.\n\n### `detect_body` Function\n\nThis function provides a focused body-only scan. It's useful for scenarios where only the response body is available or for replacing legacy WAF detection logic.\n\n*   It first performs a quick check for common WAF signatures using the Aho-Corasick automaton.\n*   For bodies larger than `SUSPICIOUS_SIZE_THRESHOLD` (100KB), it calculates the Shannon entropy. If the entropy exceeds `ENTROPY_THRESHOLD` (5.5), it flags the body as potentially containing an \"Obfuscated WAF\" challenge.\n\n### Entropy Calculation\n\nThe `calculate_entropy` function computes the Shannon entropy of a given string. This is a measure of randomness or information content. High entropy in a response body, especially when combined with other factors like small size and script density, is a strong indicator of obfuscated JavaScript used in WAF challenges.\n\n### Supported Providers\n\nThe `supported_providers` function returns a sorted list of unique WAF provider names that the module is configured to detect.\n\n## Data Structures\n\n*   `WAF_CONTROL_HEADERS`: A static array of tuples `(&str, &str)` mapping WAF-specific headers to their provider names.\n*   `WAF_BODY_SIGNATURES`: A static array of tuples `(&str, &str)` mapping body patterns to their provider names. This is used to build the Aho-Corasick automaton.\n*   `WAF_AC`: A lazily initialized `AhoCorasick` automaton, compiled from `WAF_BODY_SIGNATURES`. This ensures efficient, thread-safe pattern matching.\n\n## Usage\n\nThe `WafInspector` is typically used within the scraping process:\n\n```rust\nuse rust_scraper::infrastructure::http::waf_engine::WafInspector;\nuse wreq::Response; // Assuming Response is from wreq or similar\n\n// ... inside a scraping function ...\n\nlet response: Response = /* ... perform HTTP request ... */;\nlet body: String = /* ... get response body ... */;\nlet headers = response.headers();\n\n// Full integrity check (headers + body)\nif let Err(e) = WafInspector::verify_integrity(headers, &body) {\n    // Handle WAF block, e.g., return an error, retry with different strategy\n    eprintln!(\"WAF detected: {}\", e);\n    return Err(e.into()); // Assuming ScraperError is the error type\n}\n\n// If no WAF detected, proceed with content processing...\n\n// Alternatively, use body-only detection if needed:\nif let Some(provider) = WafInspector::detect_body(&body) {\n    eprintln!(\"WAF detected by body scan: {}\", provider);\n    // Handle body-only WAF detection\n}\n```\n\n## Integration with Codebase\n\n*   **`scraper_service.rs`**: The `scrape_with_config` function calls `WafInspector::detect_body` to perform an initial check on the response body. If a WAF is detected, the scraping process for that URL might be aborted or handled differently.\n*   **`http_client.rs`**: While `http_client.rs` might have basic WAF detection, this module (`waf_engine.rs`) provides a more sophisticated and comprehensive layer.\n*   **Tests**: Extensive unit tests (`#[cfg(test)] mod tests`) cover various WAF scenarios, including specific provider signatures, entropy-based detection, and control header checks. Integration tests in `tests/security_integration.rs` also leverage `WafInspector`.\n\n## Architecture Diagram\n\n```mermaid\ngraph TD\n    A[HTTP Response] --> B_WafInspector__verify_integrity[\"B(WafInspector::verify_integrity)\"];\n    B --> C{Check Control Headers};\n    C -- Match --> D[Err(ScraperError::WafBlocked)];\n    C -- No Match --> E{Check Body Signatures};\n    E -- Match --> D;\n    E -- No Match --> F{Check Entropy};\n    F -- Match --> D;\n    F -- No Match --> G[Ok(())];\n\n    A --> H_WafInspector__detect_body[\"H(WafInspector::detect_body)\"];\n    H --> I{Check Body Signatures (AC)};\n    I -- Match --> J[Some(Provider)];\n    I -- No Match --> K{Check Entropy (Large Bodies)};\n    K -- High Entropy --> J;\n    K -- Low Entropy --> L[None];\n\n    subgraph WAF Signatures\n        M[WAF_CONTROL_HEADERS]\n        N[WAF_BODY_SIGNATURES]\n    end\n\n    N --> O_AhoCorasick[\"O(AhoCorasick\"] Automaton - WAF_AC);\n    O --> E;\n    O --> I;\n\n    subgraph Entropy Analysis\n        P[calculate_entropy]\n        Q[ENTROPY_THRESHOLD]\n        R[SUSPICIOUS_SIZE_THRESHOLD]\n    end\n\n    P --> K;\n    Q --> K;\n    R --> K;\n```"};

(function() {
  var activePage = 'overview';

  document.addEventListener('DOMContentLoaded', function() {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
    renderMeta();
    renderNav();
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });
    if (location.hash && location.hash.length > 1) {
      activePage = decodeURIComponent(location.hash.slice(1));
    }
    navigateTo(activePage);
  });

  function renderMeta() {
    if (!META) return;
    var el = document.getElementById('meta-info');
    var parts = [];
    if (META.generatedAt) {
      parts.push(new Date(META.generatedAt).toLocaleDateString());
    }
    if (META.model) parts.push(META.model);
    if (META.fromCommit) parts.push(META.fromCommit.slice(0, 8));
    el.textContent = parts.join(' \u00b7 ');
  }

  function renderNav() {
    var container = document.getElementById('nav-tree');
    var html = '<div class="nav-section">';
    html += '<a class="nav-item overview" data-page="overview" href="#overview">Overview</a>';
    html += '</div>';
    if (TREE.length > 0) {
      html += '<div class="nav-group-label">Modules</div>';
      html += buildNavTree(TREE);
    }
    container.innerHTML = html;
    container.addEventListener('click', function(e) {
      var target = e.target;
      while (target && !target.dataset.page) { target = target.parentElement; }
      if (target && target.dataset.page) {
        e.preventDefault();
        navigateTo(target.dataset.page);
      }
    });
  }

  function buildNavTree(nodes) {
    var html = '';
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      html += '<div class="nav-section">';
      html += '<a class="nav-item" data-page="' + escH(node.slug) + '" href="#' + encodeURIComponent(node.slug) + '">' + escH(node.name) + '</a>';
      if (node.children && node.children.length > 0) {
        html += '<div class="nav-children">' + buildNavTree(node.children) + '</div>';
      }
      html += '</div>';
    }
    return html;
  }

  function escH(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function navigateTo(page) {
    activePage = page;
    location.hash = encodeURIComponent(page);

    var items = document.querySelectorAll('.nav-item');
    for (var i = 0; i < items.length; i++) {
      if (items[i].dataset.page === page) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }

    var contentEl = document.getElementById('content');
    var md = PAGES[page];

    if (!md) {
      contentEl.innerHTML = '<div class="empty-state"><h2>Page not found</h2><p>' + escH(page) + '.md does not exist.</p></div>';
      return;
    }

    contentEl.innerHTML = marked.parse(md);

    // Rewrite .md links to hash navigation
    var links = contentEl.querySelectorAll('a[href]');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href');
      if (href && href.endsWith('.md') && href.indexOf('://') === -1) {
        var slug = href.replace(/\.md$/, '');
        links[i].setAttribute('href', '#' + encodeURIComponent(slug));
        (function(s) {
          links[i].addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(s);
          });
        })(slug);
      }
    }

    // Convert mermaid code blocks into mermaid divs
    var mermaidBlocks = contentEl.querySelectorAll('pre code.language-mermaid');
    for (var i = 0; i < mermaidBlocks.length; i++) {
      var pre = mermaidBlocks[i].parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = mermaidBlocks[i].textContent;
      pre.parentNode.replaceChild(div, pre);
    }
    try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}

    window.scrollTo(0, 0);
    document.getElementById('sidebar').classList.remove('open');
  }
})();
