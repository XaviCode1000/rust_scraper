e of `<img>` and `<source>` tags, extracting individual URLs.\n\n*   **CSS Selectors:**\n    *   `IMG_SELECTOR`, `SRCSET_SELECTOR`, `SOURCE_SELECTOR`, `LINK_SELECTOR`: Pre-compiled `scraper::Selector` instances for efficient HTML element selection. `LazyLock` is used to ensure they are compiled only once.\n\n### 3. Asset Downloading (`infrastructure::scraper::asset_download`)\n\nThis feature-gated module handles the actual downloading of assets. It's enabled when the `images` or `documents` features are active.\n\n*   **`download_all(html: &str, base_url: &url::Url, config: &ScraperConfig) -> Result<Vec<DownloadedAsset>>`**: The main entry point for downloading. It first extracts image and document URLs using the `extractor` module and then proceeds to download them in batches with controlled concurrency.\n*   **Batch Download Functions:**\n    *   **`download_image_batch(...)`**: Downloads a collection of image `AssetUrl`s.\n    *   **`download_document_batch(...)`**: Downloads a collection of document `AssetUrl`s.\n    *   These functions use `futures::stream::buffer_unordered` to manage concurrent downloads, limiting them by `DOWNLOAD_CONCURRENCY`.\n*   **`download_single_asset(url: &str, asset_type: &str, output_dir: &Path) -> Result<DownloadedAsset>`**: Downloads a single asset.\n    *   It uses the `wreq` crate with a Chrome user agent for better compatibility.\n    *   The downloaded content is hashed using SHA-256 to generate a unique filename.\n    *   The file extension is determined using `adapters::detector::mime::get_extension`.\n    *   The asset is saved into a subdirectory (`images` or `documents`) within the specified `output_dir`.\n    *   File system operations (directory creation and writing) are performed on a separate thread pool using `tokio::task::spawn_blocking` to avoid blocking the async runtime.\n*   **`DownloadedAsset` Struct:** (Defined in `src/domain/value_objects.rs`) Represents a successfully downloaded asset, containing its original `url`, `local_path`, `asset_type`, and `size`.\n\n### 4. Text Extraction (`infrastructure::scraper::fallback` and `infrastructure::scraper::readability`)\n\nThese modules provide ways to extract clean, readable text content from HTML.\n\n*   **`infrastructure::scraper::readability`:**\n    *   **`parse(html: &str, url: Option<&str>) -> Result<Article>`**: Wraps the `legible` crate to apply the Readability algorithm. This algorithm aims to remove boilerplate content (navigation, ads, footers) and extract the main article content.\n    *   **`Article` Struct:** Represents the parsed article, containing fields like `title`, `content` (clean HTML), `text_content` (plain text), `excerpt`, `byline`, and `published_time`.\n\n*   **`infrastructure::scraper::fallback`:**\n    *   **`extract_text(html: &str) -> String`**: Provides a fallback mechanism for text extraction when the Readability algorithm fails. It primarily uses the `htmd` crate for HTML-to-Markdown conversion. If `htmd` also fails, it performs a very basic line-by-line filtering of the HTML to extract any semblance of text.\n\n## Module Dependencies\n\nThe Data Extraction and Detection module has the following key dependencies:\n\n*   **`scraper`**: For parsing HTML and selecting elements using CSS selectors.\n*   **`url`**: For URL parsing and resolution.\n*   **`mimetype-detector`**: (Optional, feature-gated) For detecting MIME types from file content.\n*   **`wreq` / `wreq-util`**: (Optional, feature-gated) For making HTTP requests to download assets.\n*   **`sha2`**: (Optional, feature-gated) For generating file hashes.\n*   **`legible`**: (Optional, feature-gated) For applying the Readability algorithm.\n*   **`htmd`**: (Optional, feature-gated) For HTML to Markdown conversion as a fallback.\n*   **`tokio`**: For asynchronous operations, especially `spawn_blocking` for file I/O.\n*   **`tracing`**: For logging information and warnings.\n\n## Execution Flow Example: Downloading an Image\n\n1.  **`download_all`** is called with HTML content and a base URL.\n2.  Inside `download_all`, the HTML is parsed by `scraper::Html::parse_document`.\n3.  **`extract_images`** is called, which uses CSS selectors to find `<img>` and `<source>` tags.\n4.  For each image source found, **`process_asset_src`** is called.\n5.  `process_asset_src` resolves the URL against the `base_url` and calls **`detect_from_url`**.\n6.  `detect_from_url` calls **`detect_from_path`** (or `detect_from_bytes` if enabled and content is available) to classify the asset as `AssetType::Image`.\n7.  If classified as an image, an `AssetUrl` is created and added to a list.\n8.  Back in `download_all`, the list of `AssetUrl`s for images is passed to **`download_image_batch`**.\n9.  `download_image_batch` creates asynchronous tasks for each image URL and uses `buffer_unordered` to download them concurrently via **`download_single_asset`**.\n10. `download_single_asset` makes an HTTP GET request using `wreq`, reads the response bytes, determines the filename (using `get_extension` and hashing), creates necessary directories, and writes the file to disk.\n11. Successfully downloaded assets are collected into a `Vec<DownloadedAsset>` and returned.\n\n## Architecture Diagram\n\n```mermaid\ngraph TD\n    A[HTML Content] --> B_Scraper[\"B(Scraper\"] Service);\n    B --> C{Extractor};\n    C --> D_MIME[\"D(MIME\"] Detector);\n    C --> E_Asset[\"E(Asset\"] Downloader);\n    E --> F_HTTP[\"F(HTTP\"] Client);\n    E --> G_File[\"G(File\"] System);\n    B --> H{Text Extractor};\n    H --> I_Readability[\"I(Readability)\"];\n    H --> J_Fallback[\"J(Fallback\"] Text Stripper);\n    D --> K_MIME[\"K(MIME\"] Type Lists);\n    D --> L_File[\"L(File\"] Extension Lists);\n    E --> D; % Downloader uses Detector for extension\n    E --> M_Hashing[\"M(Hashing)\"];\n    E --> N_Directory[\"N(Directory\"] Creation);\n\n    subgraph Extractor\n        C1[extract_images]\n        C2[extract_documents]\n        C3[process_asset_src]\n        C4[parse_srcset]\n    end\n\n    subgraph MIME Detector\n        D1[detect_from_url]\n        D2[detect_from_path]\n        D3[detect_from_bytes]\n        D4[get_extension]\n        D5[get_mime_type]\n    end\n\n    subgraph Asset Downloader\n        E1[download_all]\n        E2[download_image_batch]\n        E3[download_document_batch]\n        E4[download_single_asset]\n    end\n\n    subgraph Text Extractor\n        H1[extract_text]\n    end\n\n    subgraph Readability\n        I1[legible::parse]\n    end\n\n    subgraph Fallback Text Stripper\n        J1[htmd::convert]\n        J2[Basic Line Filtering]\n    end\n\n    B -- Uses --> C;\n    B -- Uses --> H;\n    C -- Uses --> D;\n    C -- Uses --> C3;\n    C3 -- Uses --> D1;\n    D1 -- Uses --> D2;\n    C -- Uses --> C4;\n    C2 -- Uses --> D1;\n    B -- Uses --> E;\n    E -- Uses --> C; % Extracts assets first\n    E -- Uses --> E1;\n    E1 -- Uses --> E2;\n    E1 -- Uses --> E3;\n    E2 -- Uses --> E4;\n    E3 -- Uses --> E4;\n    E4 -- Uses --> D4;\n    E4 -- Uses --> M;\n    E4 -- Uses --> N;\n    B -- Uses --> H;\n    H -- Uses --> I;\n    H -- Uses --> J;\n    I -- Uses --> I1;\n    J -- Uses --> J1;\n    J -- Uses --> J2;\n```","documentation-and-examples-agents-md":"# Documentation and Examples — AGENTS.md\n\n# Agent Instructions — Rust Scraper\n\nThis document provides instructions and guidelines for interacting with the Rust Scraper project, particularly for AI agents. It covers development workflows, command usage, project structure, and best practices to ensure efficient and correct development.\n\n---\n\n## Project Overview\n\nThe Rust Scraper is a production-ready web scraping tool built with Clean Architecture principles. It features a Terminal User Interface (TUI) for selector assistance and optional AI-powered semantic cleaning for extracted content.\n\n**Technology Stack:**\n*   **Language:** Rust 1.88\n*   **Concurrency:** Tokio\n*   **HTTP Client:** `wreq` (with TLS fingerprint emulation)\n*   **TUI Framework:** `ratatui`\n*   **AI/ML (feature-gated):** `tract-onnx` for ONNX model inference\n\n**Hardware Considerations:**\nThe project is optimized for modest hardware (Intel i5-4590, 8GB RAM, HDD). Commands are designed to be HDD-optimized, and explicit timeouts are recommended for heavy operations.\n\n---\n\n## Development Workflow & Commands\n\nThis section details the commands and workflows essential for development, emphasizing efficiency and avoiding common pitfalls like HDD timeouts.\n\n### `just` Recipes (Preferred Orchestration)\n\nThe `justfile` provides convenient recipes for common development tasks.\n\n*   `just check`: Runs `cargo fmt` and `clippy` with strict settings.\n*   `just check-fast`: Executes `cargo check` for the fastest compilation verification.\n*   `just test`: Runs tests using `nextest` with 2 threads.\n*   `just test-ai`: Runs `nextest` specifically for tests involving AI features.\n*   `just audit`: Performs security audits (`audit`, `deny`, `machete`).\n*   `just cov`: Generates an HTML coverage report.\n*   `just fmt`: Formats the code according to `rustfmt` standards.\n*   `just build-release`: Builds the project in release mode with optimizations.\n\n### Raw Commands (When `just` is Unavailable)\n\nDirect `cargo` and `nextest` commands are also supported.\n\n*   **Compilation Verification:**\n    *   `cargo check`: Fast check, recommended during development.\n    *   `cargo check --features ai`: Check with AI features enabled.\n*   **Linting:**\n    *   `cargo clippy -- -D warnings`: Quick lint pass.\n    *   `cargo clippy --all-targets --all-features -- -D warnings`: Full lint with all features.\n*   **Testing:**\n    *   `cargo nextest run --test-threads 2`: Run tests (always prefer `nextest` over `cargo test`).\n    *   `cargo nextest run --test-threads 2 --features ai`: Run tests with AI features.\n*   **Coverage:**\n    *   `cargo llvm-cov --html --output-dir coverage-llvm`: Generate LLVM coverage report.\n*   **Formatting Check:**\n    *   `cargo fmt --check`: Verify code formatting.\n*   **Background Checking:**\n    *   `bacon`: Auto-runs `clippy` in the background.\n\n**⚠️ HDD Timeout Rules:**\nInitial `cargo check` can take ~4 minutes due to cold compilation. `sccache` significantly speeds up subsequent builds. **Always set explicit timeouts** for heavy commands. Prefer `cargo check` over `cargo build` during active development. Avoid `cargo build --release` unless specifically required.\n\n### 🚀 GitNexus + Just Strategy (2026 - Anti-Timeout)\n\nThis mandatory strategy is crucial for AI agents to avoid timeouts and ensure efficient development.\n\n#### ✅ Recommended Sequence (10-30 second iterations)\n\n1.  **Before any changes:** Refresh GitNexus index.\n    ```bash\n    just analyze\n    ```\n2.  **After each edit:** Run tests only on affected code.\n    ```bash\n    just test-dev # (Note: This command is listed as 'never use' later, implying watch-dev is the primary auto-mode)\n    ```\n    *Correction based on later sections: `just watch-dev` is the primary automatic mode. `test-dev` might be a manual trigger if `watch-dev` is not running.*\n3.  **If GitNexus provides a specific filter:** Use precise filtering.\n    ```bash\n    just test-filter 'package(rust_scraper) + test(contains(\"scraper\"))'\n    ```\n4.  **Only at the END (when instructed \"task complete\"):** Run the full test suite.\n    ```bash\n    just test\n    ```\n\n#### 🎯 Commands for Agents (Full Pipeline 2026)\n\n| Command                     | Usage                                     | Approx. Time | When to Use                               |\n| :-------------------------- | :---------------------------------------- | :----------- | :---------------------------------------- |\n| `just analyze`              | Refresh GitNexus index                    | < 8s         | At the start of a session                 |\n| `just watch-dev`            | **Primary automatic mode**                | Automatic    | **During ALL development**                |\n| `just test-dev-with-impact` | Manual smart tests                        | 8-25s        | If `watch-dev` is not running             |\n| `just test-filter 'filter'` | Custom test filtering                     | 10-30s       | When GitNexus provides a specific filter  |\n| `just test`                 | Full test suite (lighter alternative)     | 2-6 min      | As a lighter alternative to `test-ci`     |\n| `just test-ci`              | **FINAL GATE** (fmt + clippy + tests)     | 2-7 min      | **Only when instructed \"task complete\"**  |\n\n### 🚨 Prompts for Code Agents (2026 Best Practices)\n\nClear prompts are essential for AI agents, especially since they start each session without state.\n\n#### 🎯 Definitive Prompt for Agents (Copy & Paste)\n\n> **MANDATORY 2026 Anti-Timeout Strategy (GitNexus + Just):**\n> 1. At session start: `just analyze`\n> 2. Immediately after: `just watch-dev` (automatic mode)\n> 3. The agent **never** runs tests manually. It only edits code and lets `watch-dev` handle the rest.\n> 4. Only when I explicitly say **\"task complete\"** or **\"finish\"**, then execute `just test-ci`.\n> 5. If you need to verify something specific, use `just test-filter 'filter'`.\n\n#### 📋 Specialized Prompts by Task Type\n\n*   **For Debugging:**\n    > Use GitNexus for impact analysis before any changes. Execute `gitnexus_impact({target: \"function_name\"})` and report HIGH/CRITICAL risks.\n*   **For Refactoring:**\n    > Execute `gitnexus_detect_changes()` before commits. Never rename without `gitnexus_rename({symbol_name: \"old\", new_name: \"new\", dry_run: true})`.\n*   **For New Features:**\n    > Follow Clean Architecture: business logic in `domain/`, use cases in `application/`, external adapters in `infrastructure/`.\n\n#### ⚙️ Prompt Configuration by Tool\n\n*   **Claude Code:**\n    ```bash\n    ln -sf AGENTS.md CLAUDE.md\n    ```\n*   **Cursor:**\n    ```bash\n    echo \"AGENTS.md contains complete instructions\" > .cursorrules\n    ```\n*   **GitHub Copilot:**\n    ```bash\n    mkdir -p .github\n    cp AGENTS.md .github/copilot-instructions.md\n    ```\n\n#### 📊 Prompt Effectiveness (2026 Data)\n\n*   **Human-authored files:** +4% improvement vs. no context.\n*   **Auto-generated files:** -0.5% to -2% performance impact.\n*   **Optimal size:** ≤150 lines (60K+ repos adopted AAIF standard).\n*   **Hierarchy:** Nested `AGENTS.md` files in subdirectories take precedence.\n\n#### 🎨 Effective Prompt Structure\n\n1.  **Context First:** Stack, tools, conventions.\n2.  **Critical Commands:** `just analyze`, `just watch-dev`, `just test-ci`.\n3.  **Clear Rules:** Automatic actions vs. requiring permission.\n4.  **Concrete Examples:** References to actual repo files.\n5.  **Defined Limits:** Forbidden zones, patterns to avoid.\n\n#### ⚠️ NEVER Use These Commands (Cause Timeouts)\n\n*   `cargo nextest run` (❌ Unnecessary full suite)\n*   `cargo nextest run 2>&1 | tail -5` (❌ Pipes block output)\n*   `just test-ci` (❌ Only for CI)\n*   `just test-dev` (❌ Use `watch-dev` instead)\n\n---\n\n## Code Style\n\n*   **Error Messages:** In Spanish.\n*   **HTTP Client:** Uses `wreq`, not `reqwest`.\n\n```rust\n// Example: src/error.rs — Spanish error messages\n#[derive(Error, Debug)]\npub enum ScraperError {\n    #[error(\"URL inválida: {0}\")]\n    InvalidUrl(String),\n    #[error(\"error de red: {0}\")]\n    Network(String),\n    #[error(\"WAF/CAPTCHA detectado en {url}: {provider}\")]\n    WafBlocked { url: String, provider: String },\n}\n\n// Example: src/application/http_client.rs — Using wreq\nuse wreq::Client;\nuse wreq_util::emulation::ClientBuilderExt;\n\nlet client = Client::builder()\n    .emulate(wreq_util::emulation::KnownVersion::Chrome131)\n    .build()?;\n```\n\n---\n\n## Project Architecture\n\nThe project follows a Clean Architecture pattern.\n\n```\nsrc/\n├── adapters/        # External adapters (HTTP, filesystem)\n├── application/    # Use cases, services (CrawlerService, ScraperService)\n├── cli/            # CLI argument parsing and commands\n├── domain/         # Entities, value objects, domain logic\n├── extractor/      # Content extraction (HTML, text)\n├── infrastructure/  # AI, Obsidian, detectors, converters\n│   ├── ai/         # Semantic cleaning (ONNX embeddings)\n│   ├── obsidian/   # Vault detection and parsing\n│   └── ...\n└── lib.rs          # Main library (ScraperConfig, exports)\n```\n\n**Key Modules:**\n*   `src/application/crawler_service.rs`: Crawling logic with rate limiting.\n*   `src/application/scraper_service.rs`: Page scraping with SPA detection.\n*   `src/infrastructure/ai/semantic_cleaner_impl.rs`: AI content cleaning implementation.\n*   `src/infrastructure/obsidian/`: Integration with Obsidian vaults.\n*   `src/cli/`: Command-line interface and TUI components.\n\n---\n\n## Non-Obvious Patterns\n\n### Crate Version Conflicts\n\nDo not attempt to unify these versions; they are intentionally managed.\n*   `dashmap`: 5.x (via `governor`) and 6.x (direct).\n*   `quick-xml`: 0.37 (direct) and 0.38 (via `syntect` → `plist`).\n*   `scraper`: 0.22 → `selectors` 0.26, `legible` → `dom_query` → `selectors` 0.35.\n\n### HTTP Client: `wreq`\n\nUses TLS fingerprint emulation (e.g., Chrome 131) for WAF evasion. Includes Layer 2 evasion.\n\n### WAF Detection\n\nResponses are scanned for 19 WAF signatures (Cloudflare, reCAPTCHA, hCaptcha, DataDome, PerimeterX, Akamai) even on HTTP 200 OK. If detected, the User-Agent is rotated and retried once. Persistent blocks result in `ScraperError::WafBlocked`.\n\n### AI Feature (`--features ai`)\n\n*   Loads a ~90MB ONNX model (`all-MiniLM-L6-v2`) into memory.\n*   `SemanticCleanerImpl::new()` is `async` and loads the model once for reuse.\n*   `cleaner.clean(html)` is `async` and returns `Vec<DocumentChunk>` with embeddings.\n*   AI cleaning can result in multiple `DocumentChunk`s per page.\n*   The model is cached in `~/.cache/rust_scraper/models/`.\n\n---\n\n## Testing Rules\n\n*   All new functionality must have associated tests.\n*   Tests must be deterministic and isolated.\n*   External dependencies must be mocked.\n*   **Always run `cargo nextest run`** (never `cargo test`) before marking a task complete.\n*   Use `--test-threads 2` to mitigate HDD I/O bottlenecks.\n\n### HDD Configuration (CRITICAL)\n\nFor Intel i5-4590, 8GB RAM, HDD:\n\n```toml\n# .config/nextest.toml\n[profile.default]\nthreads-required = 2 # MAX 2 threads - prevents thrashing\nretries = { backoff = \"exponential\", count = 2, delay = \"1s\" }\nslow-timeout = { period = \"60s\", terminate-after = 3 }\n```\n\n*   **Never** use more than 2 threads during development.\n*   `nextest` profiles: `dev` (fast), `agent` (conservative), `ci` (complete).\n\n---\n\n## Boundaries\n\n### ✅ Always\n\n*   Run `cargo check` before task completion.\n*   Run `cargo clippy -- -D warnings` before committing.\n*   Use `cargo nextest run` (never `cargo test`).\n*   Use `cargo llvm-cov` (never `cargo tarpaulin`).\n*   Use `bacon` for background checking (never `cargo-watch`).\n*   Use `just` recipes for multi-step tasks (audit, coverage, release).\n\n### ⚠️ Ask First\n\n*   Adding or removing dependencies.\n*   Changing feature flag structure.\n*   Modifying `Cargo.toml` profiles.\n\n### 🚫 Never\n\n*   Commit secrets, `.env` files, or credentials.\n*   Use `.unwrap()` in production code; prefer `?` or `match`.\n*   Force push to `main` or protected branches.\n*   Modify `target/`, `dist/`, or `build/` directories.\n*   Run `cargo build --release` during development (use `cargo check`).\n\n---\n\n## Resources\n\n*   [docs/ARCHITECTURE.md](docs/ARCHITECTURE.md): Detailed architecture.\n*   [DEVELOPMENT.md](DEVELOPMENT.md): Development workflow and tooling.\n*   [justfile](justfile): Task recipes.\n\n---\n\n## Search Tools\n\n| Tool            | Usage                               |\n| :-------------- | :---------------------------------- |\n| `gitnexus_query`| Find code by concept (execution flows). |\n| `gitnexus_context`| 360° view of symbols.               |\n| `fff_find_files`| Find files by name.                 |\n| `fff_grep`      | Find specific content.              |\n\n---\n\n## GitNexus — Code Intelligence\n\nThe project is indexed by **rust\\_scraper** (3963 symbols, 6951 relationships, 300 execution flows, 118 communities). GitNexus tools are essential for understanding code, assessing impact, and safe navigation.\n\n> If GitNexus reports a stale index, run `gitnexus analyze` first.\n\n### Communities\n\n| Community   | Symbols   | Cohesion |\n| :---------- | :-------- | :------- |\n| Application | 30        | 0.85     |\n| Domain      | 26        | 0.54     |\n| Ai          | 24-19     | 0.78-1.0 |\n| Export      | 22-13     | 0.95-0.98|\n| Downloader  | 16        | 0.94     |\n| Crawler     | 12        | 0.63     |\n| Tui         | 10        | 0.63     |\n| Scraper     | 10        | 0.73     |\n\n### Always Do (GitNexus)\n\n*   **MUST run impact analysis** before editing any symbol: `gitnexus_impact({target: \"symbolName\", direction: \"upstream\"})`.\n*   **MUST run `gitnexus_detect_changes()`** before committing.\n*   **MUST warn the user** if impact analysis returns HIGH or CRITICAL risk.\n*   Use `gitnexus_query({query: \"concept\"})` to find execution flows instead of grepping.\n\n### When Debugging (GitNexus)\n\n1.  `gitnexus_query({query: \"<error or symptom>\"})` to find execution flows.\n2.  `gitnexus_context({name: \"<suspect function>\"})` to see callers and callees.\n3.  `READ gitnexus://repo/rust_scraper/process/{processName}` to trace full flows.\n\n### When Refactoring (GitNexus)\n\n*   **Renaming:** MUST use `gitnexus_rename({symbol_name: \"old\", new_name: \"new\", dry_run: true})` first.\n*   **Extracting/Splitting:** MUST run `gitnexus_impact` before moving code.\n\n### Tools Quick Reference (GitNexus)\n\n| Tool           | Command                                       |\n| :------------- | :-------------------------------------------- |\n| `query`        | `gitnexus_query({query: \"concept\"})`          |\n| `context`      | `gitnexus_context({name: \"symbolName\"})`      |\n| `impact`       | `gitnexus_impact({target: \"X\", direction: \"upstream\"})` |\n| `detect_changes`| `gitnexus_detect_changes({scope: \"staged\"})`  |\n| `rename`       | `gitnexus_rename({symbol_name: \"old\", new_name: \"new\", dry_run: true})` |\n\n### Self-Check Before Finishing (GitNexus)\n\n1.  `gitnexus_impact` was run for all modified symbols.\n2.  No HIGH/CRITICAL risk warnings were ignored.\n3.  `gitnexus_detect_changes()` confirms the expected scope.\n4.  All `d=1` (WILL BREAK) dependents were updated.\n\n---\n\n## SDD Workflow\n\nThis project supports Spec-Driven Development (SDD) via skills in `./.opencode/skills/`.\n\n| Skill       | Purpose                               |\n| :---------- | :------------------------------------ |\n| `sdd-init`  | Initialize context, detect stack.     |\n| `sdd-explore`| Investigate existing code.            |\n| `sdd-propose`| Create a proposal.                    |\n| `sdd-spec`  | Write specifications.                 |\n| `sdd-design`| Technical design.                     |\n| `sdd-tasks` | Generate task list.                   |\n| `sdd-apply` | Implement (using `gitnexus_impact`).  |\n| `sdd-verify`| Verify against specs.                 |\n| `sdd-archive`| Archive changes.                      |\n\n### SDD + GitNexus Pipeline\n\n1.  `just analyze` → Initialize.\n2.  `gitnexus_impact` → Before editing.\n3.  `gitnexus_detect_changes` → Pre-commit check.\n4.  `just test-ci` → Final verification.\n\n---\n\n## Rust Best Practices\n\nThis project incorporates 50+ `rust-skills` rules located in `.atl/skills/rust-skills/rules/`.\n\n| Category       | Examples                                      |\n| :------------- | :-------------------------------------------- |\n| Memory         | `mem-zero-copy`, `mem-smallvec`, `mem-compact-string` |\n| Performance    | `perf-release-profile`, `perf-profile-first`, `perf-collect-once` |\n| API Design     | `api-typestate`, `api-non-exhaustive`, `api-serde-optional` |\n| Async          | `async-tokio-runtime`, `async-no-lock-await`  |\n| Testing        | `test-integration-dir`, `test-tokio-async`, `test-proptest-properties` |\n| Error Handling | `err-question-mark`, `err-lowercase-msg`      |\n\n### Auto-load `rust-skills`\n\nWhen writing Rust code, automatically load the skills:\n```\nskill(name: \"rust-skills\")\n```\n(Path: `.atl/skills/rust-skills/`)\n\n---\n\n## Skills\n\n| Skill                       | Location                                             | Trigger                     |\n| :-------------------------- | :--------------------------------------------------- | :-------------------------- |\n| `rust-skills`               | `~/.config/opencode/skills/rust-skills/SKILL.md`     | Any Rust code               |\n| `gitnexus-exploring`        | `.opencode/skills/gitnexus/gitnexus-exploring/SKILL.MD` | \"How does X work?\"          |\n| `gitnexus-impact-analysis`  | `.opencode/skills/gitnexus/gitnexus-impact-analysis/SKILL.MD` | \"What breaks if I change X?\"|\n| `gitnexus-debugging`        | `.opencode/skills/gitnexus/gitnexus-debugging/SKILL.MD` | \"Why is X failing?\"         |\n| `gitnexus-refactoring`      | `.opencode/skills/gitnexus/gitnexus-refactoring/SKILL.MD` | Rename, extract, split      |\n| `gitnexus-cli`              | `.opencode/skills/gitnexus/gitnexus-cli/SKILL.MD`     | Index, status, clean        |\n| `gitnexus-guide`            | `.opencode/skills/gitnexus/gitnexus-guide/SKILL.MD`   | Tools, resources            |\n\n### Area-Specific Skills\n\n| Area        | Skill File                                  |\n| :---------- | :------------------------------------------ |\n| Ai (212 symbols) | `.opencode/skills/generated/ai/SKILL.MD`    |\n| Application (78 symbols) | `.opencode/skills/generated/application/SKILL.MD` |\n| Domain (74 symbols) | `.opencode/skills/generated/domain/SKILL.MD` |\n| Export (59 symbols) | `.opencode/skills/generated/export/SKILL.MD` |\n| Crawler (51 symbols) | `.opencode/skills/generated/crawler/SKILL.MD` |\n| Tui (27 symbols) | `.opencode/skills/generated/tui/SKILL.MD`   |\n| Obsidian (24 symbols) | `.opencode/skills/generated/obsidian/SKILL.MD` |\n| Scraper (19 symbols) | `.opencode/skills/generated/scraper/SKILL.MD` |\n\n> Index: `gitnexus analyze` · Status: `gitnexus status`","documentation-and-examples-development-md":"# Documentation and Examples — DEVELOPMENT.md\n\n# Development Workflow — Rust Scraper\n\nThis document outlines the development workflow, tooling, and best practices for the Rust Scraper project. It serves as a guide for developers to set up their environment, run tests, build the project, and understand performance optimizations.\n\n## 🚀 Quick Start\n\nFor a rapid setup and to get started with common development tasks:\n\n```bash\n# Install essential tools (one-time setup)\ncargo binstall just cargo-nextest cargo-llvm-cov cargo-audit cargo-machete\n\n# Run all tests (optimized for HDD)\njust test\n\n# Perform a full code check (formatting and linting)\njust check\n\n# Start the background code checker (re-runs checks on file changes)\nbacon\n```\n\n## 📦 Stack Óptimo 2025-26\n\nThe project utilizes a curated set of tools for an efficient and robust development experience.\n\n| Tool             | Version   | Purpose                                     |\n|------------------|-----------|---------------------------------------------|\n| **Rust**         | 1.88      | Minimum Supported Rust Version (MSRV)       |\n| **just**         | 1.49      | Task runner for orchestrating commands      |\n| **cargo-nextest**| 0.9+      | Parallel and advanced test runner           |\n| **cargo-llvm-cov**| latest    | Native LLVM code coverage                   |\n| **cargo-audit**  | latest    | Security vulnerability scanning             |\n| **cargo-deny**   | 0.16+     | License and dependency policy enforcement   |\n| **cargo-machete**| 0.9+      | Detects unused dependencies                 |\n| **sccache**      | 0.14      | Build artifact caching                      |\n| **bacon**        | latest    | Background code checker                     |\n| **mold**         | 2.40      | High-performance linker                     |\n\n## 🛠️ Commands\n\nThe `justfile` provides convenient recipes for common development tasks.\n\n### Just Recipes (Preferred)\n\n```bash\njust                # Default: Runs 'check' (fmt + clippy)\njust check          # Runs 'cargo fmt' and 'cargo clippy -- -D warnings --all-targets --all-features'\njust check-fast     # Runs 'cargo check' for a quicker syntax check\njust test           # Runs 'cargo nextest run --test-threads 2'\njust test-ai        # Runs 'cargo nextest run' with the 'ai' feature enabled\njust audit          # Runs 'cargo audit', 'cargo deny check', and 'cargo machete'\njust cov            # Generates an HTML code coverage report using 'cargo llvm-cov'\njust build-release  # Builds the project in release mode: 'cargo build --release'\n```\n\n### Raw Commands\n\n#### Tests\n\n*   **Nextest (Recommended):**\n    ```bash\n    cargo nextest run --test-threads 2\n    ```\n*   **Run only failed tests:**\n    ```bash\n    cargo nextest run --failed\n    ```\n*   **Run ignored tests (typically interact with real external resources):**\n    ```bash\n    cargo nextest run --run-ignored ignored-only\n    ```\n\n#### Coverage\n\n*   **LLVM-Cov (Recommended):** Generates an HTML report.\n    ```bash\n    cargo llvm-cov nextest --html --output-dir coverage-llvm\n    ```\n\n#### Build\n\n*   **Standard Release Build:**\n    ```bash\n    cargo build --release\n    ```\n*   **With sccache:** `sccache` is typically configured globally via `~/.cargo/config.toml` as a `rustc-wrapper`.\n    ```bash\n    sccache --show-stats  # View cache statistics\n    ```\n\n#### Linting\n\n*   **Clippy with warnings as errors:**\n    ```bash\n    cargo clippy -- -D warnings\n    ```\n*   **Auto-fix Clippy suggestions:**\n    ```bash\n    cargo clippy --fix -- -D warnings\n    ```\n\n#### Formatting\n\n*   **Check code format:**\n    ```bash\n    cargo fmt --check\n    ```\n*   **Format code:**\n    ```bash\n    cargo fmt\n    ```\n\n#### Background Checking (Bacon)\n\n*   **Run bacon:** Automatically runs `clippy` and `nextest` on file changes.\n    ```bash\n    bacon\n    ```\n*   **Keybindings within bacon:** `t` (run tests), `c` (run clippy), `n` (run nextest), `r` (run release build).\n\n#### Audit\n\n*   **Security vulnerabilities:**\n    ```bash\n    cargo audit\n    ```\n*   **License and dependency policy:**\n    ```bash\n    cargo deny check\n    ```\n*   **Unused dependencies:**\n    ```bash\n    cargo machete\n    ```\n\n## 📊 Performance Comparison\n\nThe optimized toolchain significantly improves development cycle times.\n\n| Task         | Traditional (`cargo`) | Optimized 2025-26 (`just`/`nextest`/`sccache`) | Improvement |\n|--------------|-----------------------|-------------------------------------------------|-------------|\n| **Tests**    | ~30s                  | ~6s                                             | **~5x**     |\n| **Coverage** | ~5min (`tarpaulin`)   | ~30s (`llvm-cov`)                               | **~10x**    |\n| **Build**    | ~60s (clean)          | ~10s (`sccache`)                                | **~6x**     |\n| **Linting**  | Manual                | Instant (`bacon`)                               | **Instant** |\n| **Multi-step**| Manual sequential     | Orchestrated (`just audit`)                     | **Orchestrated** |\n\n## 🔧 Configuration\n\n### nextest.toml\n\nLocated at the project root, this file configures `cargo-nextest` for optimal performance, especially on HDDs.\n\n```toml\n[profile.default]\nthreads-required = 2\nretries = 2\nslow-timeout = { period = \"60s\", terminate-after = 3 }\n\n[profile.ci]\nthreads-required = 4\nretries = 0\n```\n\n### bacon.toml\n\nConfiguration for the background checker.\n\n```toml\nsummary = true\n\n[keybindings]\nt = \"nextest\"\nf = \"nextest --failed\"\nc = \"clippy\"\nr = \"build --release\"\n```\n\n### `.cargo/config.toml`\n\nThis file is intentionally minimal. Global configurations for tools like `sccache`, `mold`, and sparse registry are managed in the user's global `~/.cargo/config.toml` as they are machine-level optimizations.\n\n```toml\n# Cargo configuration for local development\n# sccache is configured globally (~/.cargo/config.toml) via rustc-wrapper\n# CI uses Swatinem/rust-cache@v2 instead\n```\n\n### justfile\n\nThe `justfile` defines recipes for orchestrating multi-step development tasks, complementing `bacon`'s inner-loop watch mode.\n\n```makefile\ncheck        # fmt + clippy strict\ntest         # nextest --test-threads 2\naudit        # audit + deny + machete\ncov          # coverage report\n```\n\n### sccache Stats\n\nTo manage the build cache:\n\n```bash\n# Start the sccache server (usually auto-started)\nsccache --start-server\n\n# View cache statistics\nsccache --show-stats\n\n# Reset cache statistics\nsccache --zero-stats\n```\n\n## 📁 Project Structure\n\nA high-level overview of the project's directory layout:\n\n```\nrust_scraper/\n├── .cargo/\n│   └── config.toml          # Minimal; sccache/mold are global\n├── src/\n│   ├── application/\n│   │   └── http_client.rs   # HttpClient wrapper (Option A)\n│   ├── domain/\n│   ├── infrastructure/\n│   └── adapters/\n├── tests/\n│   ├── http_client_integration.rs  # Real site tests (ignored)\n│   └── ai_integration.rs            # AI tests (feature-gated)\n├── docs/\n├── justfile                 # Task runner recipes\n├── nextest.toml             # Test configuration\n├── bacon.toml               # Background checker configuration\n├── deny.toml                # License/dependency policy\n└── Cargo.toml\n```\n\n## 🎯 Testing Workflow\n\n### 1. Daily Development\n\nUse `bacon` in one terminal to automatically re-run checks and tests as you save files.\n\n```bash\n# Terminal 1: Start background checker\nbacon\n\n# Terminal 2: Edit code and observe results in Terminal 1\n```\n\n### 2. Before Commit\n\nEnsure code quality and correctness before committing.\n\n*   **Option A (Recommended):** Use the `just` recipe.\n    ```bash\n    just check && just test\n    ```\n*   **Option B (Manual):**\n    ```bash\n    cargo fmt\n    cargo clippy -- -D warnings\n    cargo nextest run\n    ```\n\n### 3. Coverage Check\n\nGenerate and review the code coverage report.\n\n```bash\n# Generate and open the coverage report\ncargo llvm-cov nextest --html\nopen coverage-llvm/index.html\n```\n\n## 🐛 Troubleshooting\n\n### sccache Not Working\n\nIf `sccache` is not providing expected caching benefits:\n\n```bash\n# Verify the sccache server is running and check stats\nsccache --show-stats\n\n# Stop and restart the server\nsccache --stop-server\nsccache --start-server\n```\n\n### Nextest Failures\n\nIf tests are failing unexpectedly:\n\n```bash\n# Clean previous build artifacts\ncargo clean\n\n# Re-run tests\ncargo nextest run\n```\n\n### Coverage Generation Issues\n\nIf `cargo llvm-cov` fails to generate reports:\n\n```bash\n# Clean build artifacts and coverage data\ncargo clean\n# or specifically for coverage:\ncargo llvm-cov nextest --clean\n\n# Regenerate the report\ncargo llvm-cov nextest --html\n```\n\n## ⚡ Build Performance\n\n### Initial Build Time\n\nThe first build can take approximately 7 minutes due to the compilation of computationally intensive crates, many of which involve native code compilation or complex C bindings:\n\n| Crate        | Time Estimate | Reason                               |\n|--------------|---------------|--------------------------------------|\n| `tract-onnx` | ~3 min        | ONNX runtime (C++ codegen)           |\n| `syntect`    | ~1-2 min      | Oniguruma regex engine (C bindings)  |\n| `tokenizers` | ~1 min        | NLP tokenization                     |\n| `ring`       | ~30s          | Cryptography (C bindings)            |\n\n### Speeding Up Builds with sccache\n\n`sccache` caches compilation artifacts, drastically reducing build times for subsequent compilations. Ensure it's configured as your `RUSTC_WRAPPER` globally.\n\n```bash\n# Ensure sccache server is running\nsccache --start-server\n\n# Build the project\ncargo build --release\n```\n\n**Expected Improvements:**\n\n*   **First Build:** ~7 min (unchanged, as all code must be compiled initially).\n*   **Rebuild after small change:** ~10-30 seconds (due to `sccache` hits).\n*   **Rebuild after `git pull`:** ~1-2 minutes (only changed crates need recompilation).\n\n### Building Without AI Features\n\nTo reduce build times by excluding AI-related dependencies (saving ~3 minutes):\n\n```bash\n# Standard build (excludes AI/ONNX features)\ncargo build --release\n\n# Build with all stable features (e.g., images, documents)\ncargo build --release --features full\n```\n\n### Duplicate Dependencies\n\n`cargo tree` may show duplicate versions of crates like `selectors`, `dashmap`, `lru`, and `quick-xml`. This is **expected and unavoidable** as they are required by different upstream dependencies. Refer to comments in `Cargo.toml` for detailed explanations. Do not attempt to unify these versions.\n\n## 📚 Resources\n\n*   [cargo-nextest docs](https://nexte.st/)\n*   [cargo-llvm-cov docs](https://github.com/taiki-e/cargo-llvm-cov)\n*   [sccache docs](https://github.com/mozilla/sccache)\n*   [bacon docs](https://dystroy.org/bacon/)\n*   [just docs](https://github.com/casey/just)\n*   [cargo-deny docs](https://embarkstudios.github.io/cargo-deny/)\n*   [cargo-audit docs](https://github.com/rustsec/rustsec/tree/main/cargo-audit)\n*   [cargo-machete docs](https://github.com/bnjbvr/cargo-machete)\n*   [Rust API Guidelines](https://rust-lang.github.io/api-guidelines/)\n\n---\n\n**Last updated**: 2026-04-12\n**Rust version**: 1.88\n**Stack**: sccache + mold + nextest + just + bacon + cargo-deny + cargo-audit + cargo-machete\n**Tests**: ~271 passing (nextest)","documentation-and-examples-docs":"# Documentation and Examples — docs\n\n# Documentation and Examples — docs\n\nThis module serves as the central hub for all documentation and example-related content for the rust_scraper project. It encompasses various markdown files that detail the project's architecture, features, usage, and development guidelines.\n\n## Purpose\n\nThe primary purpose of the `docs` module is to provide clear, comprehensive, and up-to-date information for developers, users, and contributors. This includes:\n\n*   **Understanding the Project:** Explaining the overall architecture and design principles.\n*   **Feature Documentation:** Detailing specific features like AI-powered cleaning, RAG export, and Obsidian integration.\n*   **Usage Guides:** Providing instructions on how to install, build, and use the CLI tool.\n*   **Development Guidelines:** Outlining best practices, testing strategies, and contribution workflows.\n*   **Changelog and Audits:** Tracking project history, bug fixes, and quality assessments.\n\n## Key Components\n\nThe `docs` module is composed of several markdown files, each focusing on a specific aspect of the project:\n\n*   **`AI-SEMANTIC-CLEANING.md`**: Details the AI-powered semantic content extraction feature, including its architecture, installation, usage, model information, performance benchmarks, and bug fixes.\n*   **`ARCHITECTURE.md`**: Provides a high-level overview of the project's Clean Architecture, detailing the layers (Domain, Application, Infrastructure, Adapters), module structure, data flow, and key design decisions.\n*   **`AUDITORIA.md`**: Contains audit reports, summarizing feature testing, bug findings, quality metrics, and recommendations for releases.\n*   **`CHANGES.md`**: A comprehensive changelog documenting the project's version history, key milestones, release notes, closed issues, merged pull requests, and contributor statistics.\n*   **`CLI.md`**: Serves as the reference guide for the Command Line Interface (CLI) tool, detailing all available arguments, options, feature flags, environment variables, and usage examples.\n*   **`OBSIDIAN.md`**: Specifically documents the integration with Obsidian, explaining features like vault auto-detection, export options, and quick-save functionality.\n\n## Integration with the Project\n\nThe `docs` module is not directly integrated into the runtime of the `rust_scraper` application. Instead, it serves as external documentation that is:\n\n1.  **Included in the Repository:** All markdown files are part of the project's source code repository, ensuring documentation stays synchronized with the code.\n2.  **Accessible via `README.md`:** The main `README.md` file typically links to these detailed documentation files, guiding users to the relevant information.\n3.  **Used for Development:** Developers refer to these documents for understanding the codebase, contributing new features, and ensuring adherence to project standards.\n\n## Usage within the Project\n\nWhile not a runtime component, the `docs` module is crucial for:\n\n*   **Onboarding New Developers:** Providing a clear entry point to understand the project's structure and features.\n*   **User Support:** Offering detailed guides for using the CLI tool and its various options.\n*   **Release Management:** Documenting changes and ensuring transparency through the changelog and audit reports.\n*   **Feature Explanation:** Detailing complex features like AI integration and Obsidian export.\n\n## Example: `AI-SEMANTIC-CLEANING.md`\n\nThis document is a prime example of the detailed technical documentation provided within the `docs` module. It covers:\n\n*   **Feature Overview:** Explains the AI-powered semantic cleaning using local SLMs.\n*   **Architecture:** Details the RAG pipeline and module structure with diagrams.\n*   **Installation:** Lists requirements and build instructions with feature flags.\n*   **Usage:** Provides CLI examples for basic cleaning, RAG export, and available options.\n*   **Model Information:** Describes the default model, caching, and manual download.\n*   **Performance:** Presents benchmarks and hardware optimizations.\n*   **Bug Fixes:** Documents critical fixes with code examples and impact analysis.\n*   **Testing:** Outlines how to run AI-specific tests.\n*   **Rust-Skills Applied:** Lists the best practices followed.\n*   **Programmatic Usage:** Shows library API examples.\n*   **Troubleshooting:** Offers solutions for common issues.\n*   **Migration Guide:** Explains how to transition to newer versions.\n*   **Future Enhancements:** Lists planned and considered improvements.\n*   **References:** Links to relevant issues, PRs, and external resources.\n*   **Verification Log:** Confirms the accuracy of the documentation against the codebase.\n\nThis level of detail is replicated across other documentation files, ensuring comprehensive coverage of the `rust_scraper` project.","documentation-and-examples-examples":"# Documentation and Examples — examples\n\n# Documentation and Examples — `examples`\n\nThe `examples` module contains standalone entry points for exercising the MCP server in two different transports:\n\n- `examples/mcp_server.rs` — HTTP-based MCP server for testing the Streamable HTTP handshake\n- `examples/mcp_server_stdio.rs` — stdio-based MCP server for MCP clients that launch a subprocess\n\nThese examples are intentionally small and are meant to validate the wiring between:\n\n- `rust_scraper::config::Config`\n- `rust_scraper::di::Container`\n- `rust_scraper::infrastructure::mcp_server::{McpState, McpHandler, server::build_mcp_router}`\n\nThey are useful for manual testing, integration checks, and for understanding how the MCP server is assembled from the application’s core services.\n\n## What these examples are for\n\nThe examples demonstrate two common MCP deployment modes:\n\n1. **Streamable HTTP**\n   - Useful for local testing with `curl`\n   - Also mirrors how remote MCP servers are often exposed\n   - Implemented in `examples/mcp_server.rs`\n\n2. **stdio transport**\n   - Required by many MCP clients that start the server as a child process\n   - Common for desktop clients such as Claude Desktop, Cursor, OpenCode, and Cline\n   - Implemented in `examples/mcp_server_stdio.rs`\n\nBoth examples create the same underlying application state from the same container, so they exercise the same business logic and MCP handlers. The only difference is how the server is exposed to the client.\n\n## Shared startup pattern\n\nBoth files follow the same high-level boot sequence:\n\n1. Initialize tracing\n2. Build a default `Config`\n3. Create the dependency injection `Container`\n4. Wrap the container in `McpState`\n5. Build the transport-specific server\n6. Start serving requests\n\nThis separation keeps transport concerns out of the application core and makes it easy to test the server in more than one runtime environment.\n\n```mermaid\nflowchart LR\n    A[Config::default()] --> B[Container::new(config)]\n    B --> C[McpState::new(container)]\n    C --> D1[build_mcp_router(state)]\n    C --> D2[McpHandler::new(state)]\n    D2 --> E1[serve(stdin, stdout)]\n    D1 --> E2[axum::serve(listener, app)]\n```\n\n## `examples/mcp_server.rs`\n\n### Purpose\n\nThis example starts an MCP server over HTTP on `127.0.0.1:8080` and mounts the MCP router at `/mcp`.\n\nIt is designed for testing the Streamable HTTP handshake manually, especially with tools like `curl`.\n\n### Entry point\n\nThe binary uses:\n\n```rust\n#[tokio::main]\nasync fn main()\n```\n\nso it runs on the Tokio async runtime.\n\n### Startup flow\n\nThe HTTP example performs the following steps:\n\n- Initializes `tracing_subscriber::fmt::init()`\n- Constructs a default `Config`\n- Builds a `Container` with `Container::new(config).await`\n- Creates `McpState::new(container)`\n- Builds the Axum router with `build_mcp_router(state)`\n- Binds a `tokio::net::TcpListener` to `127.0.0.1:8080`\n- Serves the router with `axum::serve(listener, app)`\n\n### Output and testing\n\nOn startup, it prints:\n\n- the listening URL\n- a sample `curl` request for the MCP `initialize` handshake\n\nThat sample request is important because it shows the expected JSON-RPC payload shape and headers for Streamable HTTP:\n\n- `Content-Type: application/json`\n- `Accept: application/json, text/event-stream`\n\n### Error handling\n\nThe example uses `expect(...)` at each setup step:\n\n- invalid socket address\n- container creation failure\n- listener bind failure\n- server startup failure\n\nThis is appropriate for an example binary where failures should crash loudly and directly.\n\n### Connection to the rest of the codebase\n\nThe HTTP example depends on the MCP server router implementation in:\n\n- `rust_scraper::infrastructure::mcp_server::server::build_mcp_router`\n\nThat means this example is a thin transport wrapper; it does not implement MCP protocol handling itself.\n\n## `examples/mcp_server_stdio.rs`\n\n### Purpose\n\nThis example exposes the MCP server over stdio, which is the transport expected by many MCP desktop clients that spawn the server as a subprocess.\n\nThis is the correct choice when the client protocol contract is:\n\n- requests are read from `stdin`\n- responses are written to `stdout`\n- logs must go to `stderr`\n\n### Entry point\n\nLike the HTTP example, this binary uses:\n\n```rust\n#[tokio::main]\nasync fn main()\n```\n\n### Startup flow\n\nThe stdio example performs these steps:\n\n- Initializes tracing with a writer bound to `stderr`\n- Constructs `Config::default()`\n- Builds the `Container`\n- Creates `McpState`\n- Constructs `McpHandler::new(state)`\n- Creates a stdio transport from `(tokio::io::stdin(), tokio::io::stdout())`\n- Calls `handler.serve(transport).await`\n- Waits for the server to finish with `server.waiting().await`\n\n### Why stderr matters\n\nThe file includes an explicit warning:\n\n> All logging MUST go to stderr, never stdout.\n\nThis is critical because the MCP stdio transport uses `stdout` exclusively for JSON-RPC messages. Any logs or debug output written to `stdout` will corrupt the protocol stream and can cause client disconnects or parse errors.\n\nThat is why this example configures tracing with:\n\n```rust\ntracing_subscriber::fmt()\n    .with_writer(std::io::stderr)\n    .init();\n```\n\n### Transport lifecycle\n\nThe stdio server is started through `rmcp::service::ServiceExt::serve(...)`. After startup, the example blocks on `server.waiting().await`, which keeps the process alive until the client disconnects or stdin closes.\n\n### Connection to the rest of the codebase\n\nThis example depends on:\n\n- `rust_scraper::infrastructure::mcp_server::McpHandler`\n- `rust_scraper::infrastructure::mcp_server::McpState`\n\nUnlike the HTTP example, it does not build an Axum router. It uses the rmcp service abstraction directly, which is the correct integration point for stdio MCP clients.\n\n## Transport differences\n\nThe two binaries are structurally similar, but they target different runtime environments.\n\n| Example | Transport | Intended client style | Routing layer |\n|---|---|---|---|\n| `mcp_server.rs` | HTTP | Manual testing, remote clients | Axum router via `build_mcp_router` |\n| `mcp_server_stdio.rs` | stdio | Subprocess-based MCP clients | `McpHandler::serve(...)` |\n\n### Practical implications\n\n- Use **HTTP** if you want to inspect requests with `curl` or connect over a network endpoint.\n- Use **stdio** if you are integrating with a client that launches the server locally.\n\n## Logging and protocol safety\n\nThe examples encode an important operational rule:\n\n- **HTTP example:** normal stdout logging is acceptable because the server is HTTP-based\n- **stdio example:** stdout is reserved for protocol messages, so logs must be redirected to stderr\n\nIf you add more example binaries in this module, follow the same rule:\n\n- stdio transport → never print logs to stdout\n- HTTP transport → stdout is fine for startup messages and diagnostics\n\n## Extending these examples\n\nWhen adding a new example binary, keep the same pattern:\n\n1. Build configuration first\n2. Construct the shared dependency container\n3. Convert the container into `McpState`\n4. Choose the transport layer\n5. Keep transport code thin and push behavior into `infrastructure::mcp_server`\n\nGood candidates for future examples include:\n\n- alternative ports or bind addresses\n- loading `Config` from environment instead of `Config::default()`\n- additional transport variants\n- minimal client scripts for smoke testing\n\n## Maintenance notes\n\n### Keep startup code minimal\n\nThese examples should remain focused on bootstrapping only. Avoid moving business logic into the example binaries; that logic belongs in the application modules they depend on.\n\n### Preserve transport correctness\n\nIf you modify `mcp_server_stdio.rs`, be careful not to:\n\n- write any `println!` output to stdout\n- initialize a logger that writes to stdout by default\n- accidentally mix transport bytes with diagnostic output\n\n### Keep the sample handshake current\n\nThe HTTP example includes an `initialize` request body with:\n\n- `protocolVersion: \"2024-11-05\"`\n- `capabilities: {}`\n- `clientInfo: { name: \"test\", version: \"1.0.0\" }`\n\nIf the MCP protocol version or handshake expectations change in the rest of the codebase, update the comment and sample request so the example remains accurate.","documentation-and-examples-mpsc-channel-refactor":"# Documentation and Examples — mpsc-channel-refactor\n\n# mpsc-channel-refactor Module\n\nThis module explores and proposes a refactoring of the `ResultsCollector` in `src/application/deduplicator.rs` from an `Arc<Mutex<Vec<T>>>` to an asynchronous multi-producer, single-consumer (mpsc) channel pattern. The primary motivation is to eliminate lock contention that occurs when multiple tasks concurrently write results to the collector.\n\n## Motivation and Problem Statement\n\nThe current implementation of `ResultsCollector<T>` uses `Arc<Mutex<Vec<T>>>` to store collected results. This approach suffers from significant lock contention in high-concurrency scenarios, particularly within `crawler_service.rs`.\n\n**Key areas of contention:**\n\n*   **`max_pages` check (read):** Multiple tasks might attempt to read the current count while others are writing.\n*   **`DiscoveredUrl` push (write):** Asynchronous tasks pushing results into the collector frequently contend for the mutex.\n*   **Final result collection (read/write):** Gathering all results at the end also involves locking.\n\nThe project already utilizes `tokio::sync::mpsc` for other communication needs (e.g., `ScrapeProgress` in the TUI, application events), demonstrating its suitability for asynchronous data transfer and backpressure.\n\n## Proposed Solution: mpsc Channel with Dedicated Worker\n\nThe recommended approach is to replace the `Arc<Mutex<Vec<T>>>` with an mpsc channel and a dedicated worker task.\n\n### Design Overview\n\nA new `ResultsCollectorMpsc<T>` struct will be introduced. It will hold an `mpsc::Sender<T>` to allow producers to send results and a `tokio::task::JoinHandle` to manage the worker task responsible for collecting these results.\n\n```mermaid\ngraph TD\n    Producer1[Producer Task 1] -->|\"send(result)\"| Sender\n    Producer2[Producer Task 2] -->|\"send(result)\"| Sender\n    ProducerN[Producer Task N] -->|\"send(result)\"| Sender\n    Sender[mpsc::Sender<T>] -->|\"recv()\"| WorkerTask\n    WorkerTask[Worker Task] -->|\"push(item)\"| InternalVec[Internal Vec<T>]\n    WorkerTask -->|shutdown| CollectedResults[Collected Results Vec<T>]\n    ResultsCollectorMpsc --> Sender\n    ResultsCollectorMpsc --> WorkerTask\n```\n\n### Key Components\n\n1.  **`ResultsCollectorMpsc<T>`:**\n    *   Contains `tx: mpsc::Sender<T>` for sending results.\n    *   Holds `worker_handle: tokio::task::JoinHandle<Vec<T>>` to manage the worker task.\n\n2.  **Constructor (`new(capacity: usize)`):**\n    *   Creates an mpsc channel with a specified `capacity`.\n    *   Spawns a dedicated worker task.\n    *   The worker task continuously receives items from the channel (`rx.recv().await`).\n    *   Received items are collected into an internal `Vec<T>`.\n    *   The worker task terminates when the sender (`tx`) is dropped and the channel is closed.\n    *   Returns the `ResultsCollectorMpsc` instance.\n\n3.  **`add(&self, result: T)`:**\n    *   Sends the `result` to the worker task via the `tx` sender.\n    *   Uses `self.tx.send(result).await.ok()` to handle potential send errors gracefully (e.g., if the receiver has already been dropped). This operation will naturally provide backpressure if the channel is full.\n\n4.  **`shutdown(self) -> Vec<T>`:**\n    *   Explicitly drops the `tx` sender, signaling to the worker task that no more messages will be sent.\n    *   Awaits the `worker_handle` to complete.\n    *   Returns the collected `Vec<T>` from the worker task.\n\n### Integration into `crawler_service.rs`\n\n*   **Initialization:** Replace `Arc::new(Mutex::new(Vec::new()))` with the creation of an mpsc channel and spawning of a dedicated worker task.\n*   **Sending Results:** In asynchronous tasks, use `tx.send(discovered_url_task).await.ok()` to send results to the worker.\n*   **`max_pages` Check:** This will require a separate mechanism, such as an `Arc<AtomicUsize>`, to track the count of processed items, as `mpsc::channel` does not expose a direct `.len()` method.\n*   **Shutdown:** Drop the sender (`tx`) and await the worker task's completion to retrieve the final results.\n\n### Graceful Shutdown Mechanisms\n\n*   **Channel Closure:** The worker task naturally terminates when all `Sender` instances are dropped.\n*   **Explicit Shutdown Signal:** The `shutdown` method provides a clear way to signal the end of operations.\n*   **Timeouts:** `tokio::time::timeout` can be used if there's a concern about the worker task blocking indefinitely (though this is unlikely with proper sender dropping).\n\n## Alternative Approaches Considered\n\n1.  **Mutex per Operation + Reduce Locking:**\n    *   **Description:** Keep `Arc<Mutex<Vec<T>>>` but minimize lock duration. Use `try_lock()` and local batching.\n    *   **Pros:** Incremental change, backward compatible API.\n    *   **Cons:** Does not eliminate contention entirely, still has potential for blocking.\n    *   **Effort:** Low.\n\n2.  **`lockfree::flavors` (e.g., `crossbeam::queue::SegQueue`):**\n    *   **Description:** Utilize lock-free data structures.\n    *   **Pros:** High performance, no lock contention.\n    *   **Cons:** Adds an external dependency, might be overkill.\n    *   **Effort:** Medium.\n\n## Risks and Mitigations\n\n*   **Memory Pressure:** If producers are much faster than the worker and the channel capacity is large, memory usage could increase.\n    *   **Mitigation:** Use a reasonable channel `capacity` (e.g., 100-1000).\n*   **Deadlock on Shutdown:** If the `Sender` is not dropped before awaiting the worker, the worker might never terminate.\n    *   **Mitigation:** Ensure `tx` is dropped before `worker_handle.await`.\n*   **Producer Blocking:** `send()` can block producers if the channel is full.\n    *   **Mitigation:** Consider using `try_send()` with a fallback (e.g., logging a warning) if immediate sending is critical and blocking is unacceptable.\n*   **`max_pages` Count:** The `.len()` method is unavailable on mpsc channels.\n    *   **Mitigation:** Use a separate `Arc<AtomicUsize>` for counting.\n*   **API Change:** The original `ResultsCollector` is `Clone`, while the proposed `ResultsCollectorMpsc` might not be directly cloneable in the same way.\n    *   **Mitigation:** Consider making `ResultsCollectorMpsc` cloneable by wrapping its `tx` in an `Arc`, or maintain both implementations temporarily.\n\n## Affected Files\n\n*   `src/application/deduplicator.rs`: Introduction of `ResultsCollectorMpsc<T>`.\n*   `src/application/crawler_service.rs`: Replacement of `Arc<Mutex<Vec<T>>>` with the mpsc channel pattern.\n*   `src/domain/result/crawl_result.rs`: Likely no direct changes needed.\n\n## Conclusion\n\nThe refactoring to use an mpsc channel with a dedicated worker is the recommended approach. It effectively addresses the lock contention issue, aligns with existing patterns in the project, and provides natural backpressure. Careful implementation of the shutdown sequence and the handling of the `max_pages` count are crucial for a successful migration.","documentation-and-examples-readme-md":"# Documentation and Examples — README.md\n\n# README.md — Documentación y ejemplos\n\n`README.md` es la entrada principal de documentación del proyecto **Rust Scraper**. Describe qué hace la herramienta, cómo instalarla, cómo ejecutar los flujos más comunes y dónde encontrar la documentación especializada del resto del códigobase.\n\nAunque no contiene lógica ejecutable, este archivo es importante para la experiencia de usuario y para la mantenibilidad del proyecto: define el contrato de uso público del binario `rust_scraper`, resume las capacidades disponibles por features y enlaza a la documentación modular en `docs/`.\n\n## Propósito del proyecto\n\nRust Scraper es una herramienta de línea de comandos para extraer contenido de sitios web y exportarlo en distintos formatos.\n\nLos objetivos que comunica este README son:\n\n- descargar páginas web con contenido limpio\n- facilitar un flujo interactivo para seleccionar URLs\n- guardar notas directamente en Obsidian\n- usar limpieza semántica con IA para filtrar ruido\n- descubrir URLs automáticamente mediante sitemaps\n- descargar recursos asociados como imágenes y documentos\n- exportar contenido para uso humano o pipelines de datos\n\n## Capacidades principales\n\nEl README organiza la propuesta funcional alrededor de estos modos:\n\n### Modo interactivo\nPermite explorar URLs, seleccionar cuáles descargar y confirmar la operación antes de iniciar el scraping.\n\n### Exportación a Obsidian\nGuarda el contenido directamente en un vault, usando wiki-links y metadatos cuando se activa la integración correspondiente.\n\n### Limpieza con IA\nDescribe una etapa de filtrado semántico que conserva el contenido relevante e ignora elementos típicamente descartables como menús o publicidad.\n\n### Descubrimiento automático con sitemap\nUsa el sitemap del sitio como fuente de URLs para evitar tener que proporcionar manualmente una lista de páginas.\n\n### Descarga de recursos\nIncluye soporte para imágenes y documentos como PDFs, DOCX o XLSX.\n\n### Exportación múltiple\nExpone los formatos `markdown`, `json`, `jsonl` y `vector`, con usos distintos según si el destino es lectura humana, integración con otras apps o flujos RAG.\n\n## Instalación\n\nEl README documenta dos rutas de instalación:\n\n### `cargo install --path . --features \"ai,full\"`\nEsta es la vía recomendada para desarrolladores o usuarios que compilan desde el repositorio.\n\nPuntos importantes documentados aquí:\n\n- compila en modo release\n- instala el binario en `~/.cargo/bin/`\n- habilita las features `ai` y `full`\n- deja disponible el comando `rust_scraper --help`\n\n### Compilación manual\nLa alternativa manual usa:\n\n```bash\ncargo build --release\n```\n\ny luego copia el binario desde `target/release/rust_scraper` a un directorio en el `PATH`.\n\n## Dependencias y requisitos operativos\n\nEl archivo también fija expectativas de entorno:\n\n- **Rust 1.88 o superior**\n- **Linux, macOS o Windows**\n\nAdemás, documenta un comportamiento importante del modo IA:\n\n- el modelo ONNX local se descarga y cachea automáticamente\n- el cache se guarda en `~/.cache/rust_scraper/models/`\n- la primera compilación puede tardar varios minutos\n\n## Flujo de uso documentado\n\nEl README está pensado como guía de inicio rápido. El flujo central que presenta es:\n\n1. instalar el binario\n2. ejecutar `rust_scraper --url https://example.com`\n3. obtener resultados en `output/`\n\nTambién muestra variantes habituales:\n\n- `--use-sitemap` para descubrimiento automático\n- ejecución sin `--url` en terminal interactiva\n- ejecución con `--interactive` para abrir el TUI\n- `--obsidian-wiki-links --quick-save` para exportar a Obsidian\n- `--clean-ai --export-format jsonl` para filtrado semántico y exportación orientada a RAG\n\n## Comportamiento de entrada de URL\n\nUna parte importante del README es la documentación del comportamiento automático de entrada:\n\n- en un terminal interactivo, `rust_scraper` puede pedir la URL\n- en un pipe, falla con un error que indica que `--url` es obligatorio\n- en CI, falla con un error específico para ese modo\n\nEste detalle define una expectativa clave de UX: el binario intenta ser amigable en consola interactiva, pero estricto en contextos no interactivos.\n\n## Interfaz interactiva\n\nEl README describe el TUI como una experiencia de selección previa al scraping, con dos fases principales:\n\n- **Selección de URLs**\n- **Scraping con progreso y errores en vivo**\n\nTambién documenta controles de teclado:\n\n- flechas arriba/abajo para navegar\n- espacio para alternar selección\n- `A` para seleccionar todo\n- `D` para deseleccionar todo\n- `Enter` para confirmar\n- `j` / `k` para scrollear errores\n- `q` para salir\n\nEsto es útil para entender que el modo interactivo no es un simple flag, sino un flujo de trabajo completo de revisión antes de ejecutar descargas.\n\n## Formatos de exportación\n\nEl README actúa como contrato de salida al enumerar los formatos soportados:\n\n| Formato | Uso principal |\n|---|---|\n| `markdown` | Lectura humana y documentación |\n| `json` | Integración con otras aplicaciones |\n| `jsonl` | Pipelines RAG e IA |\n| `vector` | Bases de datos vectoriales con embeddings |\n\nEsto orienta a los consumidores del CLI sobre qué formato elegir según su caso de uso.\n\n## Configuración por archivo\n\nSe documenta la existencia de un archivo de configuración en:\n\n```text\n~/.config/rust_scraper/config.toml\n```\n\nCon ejemplos de valores por defecto como:\n\n```toml\nformat = \"markdown\"\nmax_pages = 50\ndelay_ms = 500\nuse_sitemap = true\n```\n\nEl README deja claro que:\n\n- el archivo sirve para establecer defaults persistentes\n- los argumentos de línea de comandos tienen prioridad sobre esa configuración\n\n## Relación con el resto del proyecto\n\nEste archivo funciona como índice de navegación hacia la documentación especializada del repositorio. En particular enlaza a:\n\n- `docs/CLI.md` — referencia completa de opciones\n- `docs/TUI.md` — guía del selector interactivo\n- `docs/USAGE.md` — ejemplos y troubleshooting\n- `docs/OBSIDIAN.md` — integración con Obsidian\n- `docs/AI-SEMANTIC-CLEANING.md` — pipeline de limpieza con IA\n- `docs/RAG-EXPORT.md` — exportación para RAG y embeddings\n- `docs/ARCHITECTURE.md` — diseño interno\n- `DEVELOPMENT.md` — guía de contribución\n- `CHANGELOG.md` — historial de versiones\n\nEn otras palabras, `README.md` es el “front door” del proyecto: presenta la visión general y delega los detalles al resto de la documentación.\n\n## Testing y estado del proyecto\n\nEl README también comunica estado de calidad y cobertura:\n\n- 613 tests unitarios pasando\n- 18 tests de integración omitidos por depender de red externa\n- recomendación de usar `cargo nextest run`\n- nota sobre una mejora pendiente: introducir `wiremock` para estabilizar tests de integración\n\nEsto ayuda a quienes contribuyen a entender que la suite principal es estable, pero que parte de la integración todavía depende de infraestructura externa.\n\n## Estructura conceptual\n\n```mermaid\nflowchart TD\n  A[README.md] --> B[Instalación]\n  A --> C[Uso rápido]\n  A --> D[Configuración]\n  A --> E[Documentación enlazada]\n  A --> F[Testing]\n\n  C --> G[rust_scraper CLI]\n  D --> H[~/.config/rust_scraper/config.toml]\n  E --> I[docs/CLI.md]\n  E --> J[docs/TUI.md]\n  E --> K[docs/OBSIDIAN.md]\n```\n\n## Consideraciones para contribuir\n\nAl modificar `README.md`, conviene mantener consistencia con:\n\n- los flags reales del CLI\n- los nombres exactos del binario y rutas documentadas\n- las features activables durante instalación\n- la terminología usada en `docs/`\n- el comportamiento real de errores, modo interactivo y exportación\n\nDado que este archivo es la primera referencia para usuarios nuevos, cualquier cambio en el CLI o en las capacidades principales debería reflejarse aquí rápidamente para evitar documentación desalineada.","documentation-and-examples-research":"# Documentation and Examples — research\n\n# Documentation and Examples — research\n\nThis module contains research findings, competitive analysis, and technical proposals related to enhancing the scraper's capabilities, particularly for exporting data in formats compatible with knowledge management systems like Obsidian.\n\n## 1. Obsidian-Compatible Markdown Export Research\n\nThis research report details the specifications and conventions for exporting scraped web content into a format that is directly usable and well-integrated within Obsidian, a popular personal knowledge management (PKM) tool.\n\n### 1.1 Obsidian Markdown Specification\n\n\"Obsidian-Compatible\" primarily refers to adherence to specific Markdown extensions and file structure conventions that Obsidian natively supports or commonly uses.\n\n#### 1.1.1 YAML Frontmatter (Properties)\n\nObsidian utilizes YAML frontmatter at the beginning of `.md` files, referred to as \"Properties.\" This is a critical component for metadata.\n\n```yaml\n---\ntitle: \"Article Title\"\ntags:\n  - web-clip\n  - technology\naliases:\n  - \"Alternative Title\"\ncreated: 2026-04-03T17:00:00\nmodified: 2026-04-03T17:00:00\nsource: \"https://example.com/article\"\nauthor: \"John Doe\"\ndescription: \"Page excerpt or meta description\"\nimage: \"https://example.com/og-image.jpg\"\nlanguage: en\n---\n```\n\n**Supported Property Types:**\n- Text (`key: value`)\n- List (`key: [a, b]`)\n- Number (`key: 42`)\n- Checkbox (`key: true`)\n- Date (`key: YYYY-MM-DD`)\n- Date & Time (`key: YYYY-MM-DDTHH:MM:SS`)\n- Tags (`key: [#tag1, #tag2]`)\n\n**Standard Fields for Web Clippings:**\n`title`, `tags`, `aliases`, `created`, `source`/`url`, `author`, `description`, `image`, `published`, `domain`.\n\n#### 1.1.2 Wikilinks (`[[Like This]]`)\n\nObsidian's native linking syntax:\n- `[[Note Title]]`: Links to another note.\n- `[[Note Title|Display Text]]`: Links with custom display text.\n- `[[Note Title#Heading]]`: Links to a specific heading.\n- `[[Note Title#^block-id]]`: Links to a specific block.\n- `![[image.png]]`: Embeds an image or other file.\n\nFor scrapers, wikilinks are useful for cross-referencing clips from the same domain or linking to author notes.\n\n#### 1.1.3 Callouts (Admonitions)\n\nSpecial blockquote syntax for visually distinct content blocks:\n\n```markdown\n> [!note]\n> This is a note callout.\n\n> [!warning]\n> This is a warning.\n```\n\nFoldable callouts are also supported:\n```markdown\n> [!note]- This is a foldable callout\n> Content is hidden until expanded.\n```\n\nCallouts can be used to flag issues like WAF detection or content quality notes.\n\n#### 1.1.4 Other Obsidian Flavored Markdown Extensions\n\nBeyond standard CommonMark and GitHub Flavored Markdown (GFM), Obsidian supports:\n- Embeds (`![[...]]`)\n- Tags (`#tag-name`)\n- MathJax/LaTeX (`$...$`, `$$...$$`)\n- Footnotes (`[^1]`)\n- Highlight (`==highlighted text==`)\n- Strikethrough (`~~deleted~~`)\n- Comments (`%% hidden comment %%`)\n- Task lists (`- [ ]`, `- [x]`)\n\n#### 1.1.5 Attachment Handling\n\nImages and other assets are typically stored in a dedicated folder within the Obsidian vault (e.g., `_attachments/`, `assets/`). The Obsidian Web Clipper (v1.8.0+) supports saving images locally. Wikilink embed syntax (`![[filename.png]]`) is preferred for local assets.\n\n#### 1.1.6 Folder Structure Conventions\n\nCommon Obsidian vault structures for web clippings include:\n- `Vault/webclips/YYYY-MM-DD-title.md`\n- `Vault/sources/domain.com/page-title.md`\n- `Vault/webclips/_attachments/`\n\n### 1.2 Competitor Matrix\n\nAnalysis of existing browser extensions and services reveals common features and approaches:\n\n*   **Browser Extensions:** MarkDownload, Obsidian Web Clipper (Official), SingleFile. Key features include frontmatter support, local image handling, and templating.\n*   **Read-it-Later Services:** Readwise Reader, Omnivore. Offer Obsidian export via integrations or plugins, with customizable frontmatter and highlight support.\n*   **API-Based Scrapers:** Firecrawl, Jina Reader, Crawlee/Apify. Primarily focus on raw content extraction (Markdown, HTML, JSON) but often lack Obsidian-specific features like frontmatter.\n*   **Notion → Obsidian Exporters:** Tools like `notion2obsidian` convert Notion content to Markdown, demonstrating successful conversion strategies.\n\n#### 1.2.1 Key Insight: Defuddle\n\n`Defuddle`, the content extraction engine used by the official Obsidian Web Clipper, is a significant benchmark. It produces clean Markdown with YAML frontmatter and handles various content types effectively. Its open-source nature and Rust implementation (via crates like `readability` and `html2md`) make it a strong candidate for adoption or inspiration.\n\n## 2. User Research Report: Obsidian Web Scraping/Clipping\n\nThis report synthesizes user demand and pain points from Obsidian forums, GitHub issues, and Reddit communities to inform feature prioritization for Obsidian-compatible export.\n\n### 2.1 Top User-Requested Features\n\nUsers consistently prioritize features that enhance workflow efficiency, content quality, and integration with Obsidian's ecosystem.\n\n1.  **Duplicate Detection:** Warning or preventing the clipping of already-saved URLs.\n2.  **PDF Clipping:** Extracting text and metadata from PDF documents.\n3.  **Save Images Locally:** Downloading images to the vault and using local links.\n4.  **Incremental Clipping:** Appending new highlights or content to existing notes.\n5.  **Quick Save:** One-click saving to a default location without dialogs.\n6.  **Mobile/iOS Workflow:** Streamlined clipping from mobile devices via share sheets and Shortcuts.\n7.  **Template Logic:** Conditional statements and loops within templates.\n8.  **Auto-Detect Content Type/Smart Templates:** Applying templates based on content or URL patterns.\n9.  **Dataview-Compatible Properties:** Rich YAML frontmatter for querying.\n10. **Background Processing:** Asynchronous clipping operations.\n11. **Notification on Success/Failure:** User feedback on clipping status.\n12. **Batch Clip All Open Tabs:** Saving multiple open tabs simultaneously.\n13. **Code Block Preservation:** Accurate extraction of code snippets with syntax highlighting.\n14. **LaTeX/Math Preservation:** Retaining mathematical formulas.\n15. **Social Media/Platform-Specific Extraction:** Improved parsing for sites like X/Twitter, LinkedIn.\n\n### 2.2 Pain Points Analysis\n\nThe most frequent user frustrations include:\n- Duplicate clipping.\n- Manual folder path selection.\n- High friction in mobile clipping workflows.\n- Broken image links due to lack of local saving.\n- Failure to extract content from social media platforms.\n- Loss of formatting for code blocks and mathematical content.\n\n### 2.3 Feature Categories & Prioritization\n\nFeatures are categorized into Workflow & UX, Content Quality, Obsidian Integration, AI/Smart Features, and Advanced Obsidian Features. A tiered approach (Tier 1: Quick Wins, Tier 2: Next Sprint) is recommended for phased implementation.\n\n### 2.4 Unique Differentiators\n\nThe scraper's existing strengths offer unique advantages over competitors:\n- **CLI-First Architecture:** Enables headless, server-side, and automated clipping workflows.\n- **WAF/CAPTCHA Bypass:** Ability to handle protected sites, unlike most browser extensions.\n- **Semantic Duplicate Detection:** Advanced detection using embeddings, beyond simple URL matching.\n- **Streaming & Constant RAM Usage:** Efficiently handles large pages.\n- **Sitemap-to-Vault Pipeline:** Batch processing of entire sites.\n- **Auto-Generated MOCs:** Automatic creation of index pages for related content.\n- **Git-Aware Sync:** Integration with Git-based vault workflows.\n- **Content Type Auto-Detection:** Smarter template selection than basic URL regex.\n\n## 3. Technical Design Suggestions for Obsidian Export\n\nThis section outlines a technical approach for implementing Obsidian-compatible Markdown export.\n\n### 3.1 Architecture\n\nThe existing Clean Architecture pattern can be extended:\n\n```mermaid\ngraph TD\n    A[Domain Layer] --> B_Entities[\"B(Entities:\"] OutputFormat::Markdown)\n    A --> C_Exporter[\"C(Exporter\"] Trait)\n    A --> D_MarkdownDocument[\"D(MarkdownDocument\"] Entity)\n    E[Infrastructure Layer] --> F_Export[\"F(Export:\"] MarkdownExporter)\n    E --> G_HTML[\"G(HTML\"] to Markdown Converter)\n    H[Export Factory] --> I_Create_Exporter[\"I(Create_Exporter:\"] Markdown Case)\n```\n\n### 3.2 Proposed `OutputFormat` Enum\n\nA new enum to distinguish between RAG pipeline formats and file-per-URL formats:\n\n```rust\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Hash)]\npub enum OutputFormat {\n    /// One JSONL file (for RAG pipelines)\n    Jsonl,\n    /// One markdown file per URL (Obsidian-compatible)\n    Markdown,\n}\n```\n\n### 3.3 `MarkdownExporter` Design\n\n```rust\npub struct MarkdownExporter {\n    config: MarkdownExporterConfig,\n}\n\npub struct MarkdownExporterConfig {\n    pub output_dir: PathBuf,\n    pub attachments_dir: String,        // e.g., \"_attachments\"\n    pub filename_strategy: FilenameStrategy,\n    pub download_images: bool,\n    pub use_wikilinks: bool,\n}\n\npub enum FilenameStrategy {\n    SlugifiedTitle,          // \"article-title.md\"\n    DatePrefixed,            // \"2026-04-03-article-title.md\"\n    DomainPath,              // \"domain.com/path/to/page.md\"\n}\n```\n\n### 3.4 HTML → Markdown Conversion Strategy\n\n**Recommended Stack:**\n1.  **Content Extraction:** `readability` crate (Rust port of Mozilla Readability).\n2.  **HTML → Markdown:** `html2md` or `mdka` crate.\n3.  **Post-processing:** Fix links, handle images, add frontmatter.\n\n### 3.5 Proposed Markdown Output Structure\n\n```markdown\n---\ntitle: \"Article Title\"\nsource: \"https://example.com/article\"\ncreated: 2026-04-03T17:00:00+00:00\nauthor: \"John Doe\"\ndescription: \"Page excerpt or meta description\"\ntags:\n  - web-clip\n  - technology\ndomain: \"example.com\"\n---\n\n# Article Title\n\nMain content converted to clean markdown...\n\n## Section Heading\n\nMore content with proper formatting.\n\n![Image description](_attachments/article-title-hero.png)\n\n> [!warning] WAF Detected\n> This page had Cloudflare protection. Content may be incomplete.\n\n---\n*Clipped from [example.com](https://example.com/article) on 2026-04-03*\n```\n\n### 3.6 Image Handling\n\nImages will be downloaded asynchronously to a configurable `attachments_dir` (e.g., `_attachments/`) within the output directory. Markdown references will be updated to point to these local files using relative paths.\n\n### 3.7 Integration with Existing Code\n\nThe `MarkdownExporter` will consume `ScrapedContent` (which already contains `title`, `content`, `url`, `excerpt`, `author`, `date`, `assets`). It will generate frontmatter, convert HTML to Markdown, download assets, and write the `.md` file. Integration with `StateStore` for incremental support is also planned.\n\n## 4. Proposed GitHub Issue for Feature Implementation\n\nA detailed GitHub issue outlines the problem, proposed solution, technical approach, and acceptance criteria for adding Obsidian-compatible Markdown export. This serves as a roadmap for development.\n\n## 5. Appendix: Key Libraries & Tools Reference\n\nA reference list of relevant libraries and tools used in the research and proposed implementation:\n\n| Tool                  | Language   | Purpose                                     | License      |\n| :-------------------- | :--------- | :------------------------------------------ | :----------- |\n| **Defuddle**          | TypeScript | Content extraction → Markdown (Obsidian official) | MIT          |\n| **Readability.js**    | JavaScript | Content extraction (Mozilla)                | Apache 2.0   |\n| **Turndown**          | JavaScript | HTML → Markdown                             | MIT          |\n| **readability**       | Rust       | Content extraction (Rust port)              | MIT          |\n| **html2md**           | Rust       | HTML → Markdown                             | MIT          |\n| **mdka**              | Rust       | HTML → Markdown (alternative)               | MIT          |\n| **slug**              | Rust       | URL/filename slugification                  | MPL 2.0      |\n| **serde_yaml**        | Rust       | YAML serialization                          | MIT/Apache   |\n| **whatlang**          | Rust       | Language detection                          | MIT          |","documentation-and-examples-specs":"# Documentation and Examples — specs\n\n# Documentation and Examples — specs\n\nThe `specs/` directory contains product and implementation specifications that define intended behavior before or alongside code changes. These documents are part of the project’s developer workflow, not runtime code. In this module, the primary specification is `specs/async-reactive-tui.md`, which describes the async progress UI for scraping in the TUI.\n\n## Purpose\n\n`specs/async-reactive-tui.md` captures the requirements for extending the terminal UI from a URL-selection workflow to a live scraping progress workflow. It defines:\n\n- what the user should see while scraping runs\n- h
