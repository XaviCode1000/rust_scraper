logic as possible to a lower-level service/helper.\n6. Return `CallToolResult` with clear text or JSON output.\n7. If the tool is expensive, ensure its category limit is appropriate in `CategoryLimits`.\n8. Add a test that covers either:\n   - router registration, or\n   - the lower-level logic used by the tool\n\nIf you split tools into the `handlers/*` submodules later, keep the `build_tool_router()` aggregation contract intact so `McpHandler::new` continues to register the full set of tools.\n\n---\n\n## Cross-module connections\n\nThis module is a transport/orchestration layer that depends on several other parts of the codebase:\n\n- `src/config.rs` — `Config::default()` is used in tests and server assembly\n- `src/di.rs` — `Container` provides the shared application services\n- `src/application/*` — scraper and crawler workflows\n- `src/infrastructure/converter/*` — HTML/Markdown/text transformations\n- `src/infrastructure/http/waf_engine.rs` — WAF detection and integrity checks\n- `src/infrastructure/obsidian/*` — vault detection, URI generation, metadata\n- `src/adapters/url_path.rs` — URL-to-file-path mapping\n- `src/domain/*` — URL/crawler/export domain types\n\nThe server module’s role is to connect these pieces to the MCP protocol, not to duplicate their logic.\n\n---\n\n## Summary of runtime behavior\n\nAt runtime, this module:\n\n- starts an Axum server on `/mcp`\n- creates an `McpHandler` per MCP session\n- dispatches tool calls through a generated tool router\n- protects resource-heavy categories with semaphores\n- transforms internal results into MCP text content\n- shuts down gracefully on `Ctrl+C`\n\nIt is the codebase’s AI-facing integration surface for scraping, content processing, export, URL analysis, security diagnostics, and Obsidian-related workflows.","observability":"# Observability\n\n# Observability Module\n\nThe Observability module provides essential infrastructure for monitoring and debugging the application. It encompasses structured logging, metrics collection, and a stub for distributed tracing.\n\n## Purpose\n\nThis module aims to provide production-grade observability by:\n\n*   **Structured Logging:** Enabling detailed, machine-readable logs (JSON) with file rotation for long-term storage and analysis.\n*   **Metrics Collection:** Gathering key performance indicators (KPIs) related to HTTP requests, crawler operations, and bandwidth usage.\n*   **Runtime Debugging:** Offering tools like Tokio Console for real-time inspection of the application's asynchronous runtime.\n*   **Future Extensibility:** Including a placeholder for OpenTelemetry integration, allowing for future distributed tracing capabilities.\n\n## Key Components\n\nThe Observability module is composed of three sub-modules:\n\n### 1. Async Logging (`async_logging.rs`)\n\nThis component implements a non-blocking, asynchronous logging mechanism using `tokio::sync::mpsc`. It replaces the potentially blocking `RollingFileAppender` from `tracing-appender` for file writes, ensuring that log entries do not stall the main application threads.\n\n*   **`WriterConfig`**: Defines configuration parameters for the async writer, including buffer capacity, flush capacity in bytes, and flush interval.\n*   **`AsyncLogWriter`**: The main struct that holds the `mpsc::Sender` for queuing log entries and the configuration.\n    *   **`new()`**: Asynchronously creates a new `AsyncLogWriter`, spawning a background task (`run_writer_task`) to handle actual log writing.\n    *   **`write()`**: A non-blocking method to send a log entry to the background writer task. It handles buffer overflow by dropping entries and printing a warning.\n    *   **`flush()`**: An asynchronous method to flush pending logs. (Note: The current implementation is a stub and does not perform actual flushing).\n*   **`run_writer_task()`**: The background task responsible for receiving log entries from the channel and writing them to disk. The current implementation is a simplified stub.\n*   **`init_async_logging()`**: An alias function for initializing the `AsyncLogWriter`.\n\n**Note:** The `flush()` method in `AsyncLogWriter` is currently a stub. The `LogGuard` in `logging.rs` relies on `tracing_appender::non_blocking::WorkerGuard` for flushing, which is a separate mechanism.\n\n### 2. JSON Logging (`logging.rs`)\n\nThis sub-module handles the initialization and configuration of structured JSON logging, primarily using the `tracing-subscriber` crate.\n\n*   **`LogGuard`**: A RAII guard that ensures all pending log writes are flushed to disk when the guard is dropped. This is crucial for preventing log data loss on application exit. It wraps a `tracing_appender::non_blocking::WorkerGuard`.\n*   **`LogFormat`**: An enum to specify log output format (Text or Json).\n*   **`init_json_logging()`**: Initializes logging with JSON format, file rotation, and a specified log level. It configures logs to be written to both `stderr` (in text format) and a rotating file (in JSON format) if a `log_dir` is provided.\n*   **`init_json_logging_dual()`**: An extended version allowing for `quiet` mode and `no_color` options.\n*   **`init_otel_tracing()`**: A stub function for initializing OpenTelemetry tracing. Full integration is deferred.\n\n**Logging Flow:**\n\n1.  `init_json_logging` or `init_json_logging_dual` is called.\n2.  An `EnvFilter` is created based on the provided level and quiet settings.\n3.  A `tracing_subscriber::registry` is initialized with the filter.\n4.  A `fmt::layer` is configured for `stderr` output (text format).\n5.  If `log_dir` is provided:\n    *   A `RollingFileAppender` is created for daily rotation.\n    *   `tracing_appender::non_blocking` is used to create a non-blocking writer and a `WorkerGuard`.\n    *   A `fmt::layer` is configured for JSON output to the non-blocking writer.\n    *   The `LogGuard` is created, holding the `WorkerGuard`.\n6.  The subscriber is initialized with the configured layers.\n7.  The `LogGuard` is returned. When dropped, its `WorkerGuard` flushes logs.\n\n### 3. Metrics Collection (`metrics.rs`)\n\nThis component provides an in-memory, thread-safe metrics collector for various application activities.\n\n*   **`MetricsCollector`**: A struct that holds atomic counters and `DashMap`s for thread-safe metric aggregation.\n    *   **`http_requests`, `http_errors`, `pages_scraped`, `urls_discovered`**: Atomic counters for overall request and crawler statistics.\n    *   **`bandwidth_per_domain`, `latency_sum_per_domain`, `requests_per_domain`**: `DashMap`s to store per-domain metrics, allowing concurrent access from multiple threads.\n    *   **`start_time`**: Records the initialization time for calculating runtime duration.\n    *   **`new()`**: Creates a new `MetricsCollector` and records the start time.\n    *   **`record_request()`**: Records an HTTP request, updating total requests, per-domain stats, and error counts if applicable.\n    *   **`record_error()`**: Records an HTTP error, incrementing error counts.\n    *   **`record_page_scraped()`**: Increments the count of successfully scraped pages.\n    *   **`record_url_discovered()`**: Increments the count of discovered URLs.\n    *   **`record_bandwidth()`**: Records bandwidth usage for a specific domain.\n    *   **`export()`**: Serializes all collected metrics into a `serde_json::Value` for output.\n\n## Integration with the Codebase\n\n*   **Initialization:** Logging is typically initialized once at the start of the application, often in `main.rs` or a dedicated initialization function. The `LogGuard` returned by `init_json_logging` must be kept alive for the duration of the application.\n*   **Logging Usage:** Application code uses the `tracing` crate macros (`info!`, `warn!`, `error!`, `debug!`, `trace!`) to emit log messages. These messages are then processed by the configured `tracing-subscriber`.\n*   **Metrics Usage:** Instances of `MetricsCollector` are created and passed around (often via `Arc`) to various parts of the application that perform operations to be measured. Methods like `record_request`, `record_page_scraped`, etc., are called to update the metrics.\n*   **Tokio Console:** If the `console` feature is enabled, `init_console()` can be called to enable real-time runtime debugging via `tokio-console`. This requires compiling with `RUSTFLAGS=\"--cfg tokio_unstable\"`.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    A[Application Code] --> B_tracing[\"B(tracing\"] Macros);\n    B --> C{tracing-subscriber};\n    C --> D[Stderr Layer (Text)];\n    C --> E{File Layer (JSON)};\n    E --> F[AsyncLogWriter];\n    F --> G[mpsc Channel];\n    G --> H_Background[\"H(Background\"] Writer Task);\n    H --> I[File I/O];\n    F --> J[WorkerGuard];\n    J --> K_LogGuard[\"K(LogGuard)\"];\n    K -- RAII --> L[Flush on Drop];\n\n    M[Application Code] --> N_MetricsCollector[\"N(MetricsCollector)\"];\n    N --> O[Atomic Counters];\n    N --> P[DashMap];\n    N -- export --> Q_JSON[\"Q(JSON\"] Output);\n\n    R{Console Feature Enabled} --> S_init_console[\"S(init_console)\"];\n    S --> T[console-subscriber];\n\n    subgraph Async Logging\n        F\n        G\n        H\n        I\n        J\n        K\n        L\n    end\n\n    subgraph JSON Logging\n        C\n        D\n        E\n        J\n        K\n        L\n    end\n\n    subgraph Metrics Collection\n        N\n        O\n        P\n        Q\n    end\n\n    subgraph Tokio Console\n        R\n        S\n        T\n    end\n```","obsidian-integration":"# Obsidian Integration\n\n# Obsidian Integration\n\nThis module provides functionality for integrating with Obsidian, a popular knowledge management application. It enables the generation of rich metadata suitable for Obsidian's frontmatter, facilitates the opening of notes directly within Obsidian via its URI scheme, and includes utilities for automatically detecting Obsidian vault locations.\n\n## Key Features\n\n*   **Rich Metadata Generation:** Enhances scraped content with Obsidian-specific metadata like word count, estimated reading time, detected language, and content type.\n*   **Obsidian URI Support:** Allows for programmatic opening of notes within an Obsidian vault using the `obsidian://` protocol.\n*   **Vault Detection:** Automatically discovers Obsidian vault locations through various methods, simplifying configuration.\n\n## Components\n\nThe Obsidian integration is composed of three main sub-modules:\n\n### 1. Metadata Generation (`metadata.rs`)\n\nThis sub-module focuses on enriching scraped content with metadata that is particularly useful within Obsidian.\n\n#### `ObsidianRichMetadata` Struct\n\nThis struct holds the generated metadata:\n\n*   `word_count`: Total number of words in the content.\n*   `reading_time`: Estimated reading time in minutes, calculated at an average of 200 words per minute.\n*   `language`: The detected language of the content (ISO 639-1 code), if reliably detected.\n*   `content_type`: An inferred type of the content (e.g., \"article\", \"documentation\").\n*   `scrape_date`: The timestamp when the content was scraped, in ISO 8601 format.\n*   `source`: The original URL of the scraped content.\n*   `status`: A status field, defaulting to \"unread\", useful for Obsidian workflows.\n\n#### Core Functions\n\n*   `ObsidianRichMetadata::from_content(scraped: &ScrapedContent) -> Self`: The primary constructor for `ObsidianRichMetadata`. It takes a `ScrapedContent` object and computes all the necessary metadata fields.\n*   `compute_word_count(content: &str) -> usize`: Calculates the word count by splitting the input string by whitespace.\n*   `compute_reading_time(word_count: usize) -> usize`: Estimates reading time based on word count, rounding up to the nearest minute.\n*   `detect_language(content: &str) -> Option<String>`: Uses the `whatlang` crate to detect the language of the text. It samples the beginning of the content for performance and only returns a result if the detection is considered reliable.\n*   `detect_content_type(content: &ScrapedContent) -> ContentType`: Infers the type of content based on URL patterns (e.g., `/docs`, `/forum`) and content heuristics (e.g., word count for articles).\n\n#### `ContentType` Enum\n\nAn enum to categorize content types: `Article`, `Documentation`, `Forum`, `Product`, and `Other`. It implements `Display` for easy conversion to string representations.\n\n### 2. URI Support (`uri.rs`)\n\nThis sub-module handles the creation and opening of Obsidian URIs, allowing direct interaction with the Obsidian application.\n\n#### Core Functions\n\n*   `build_obsidian_uri(vault_name: &str, file_path: &str) -> String`: Constructs a valid `obsidian://open` URI. It uses a custom `encode_obsidian_param` function to ensure that characters critical for URI parsing are encoded, while preserving characters like `/` that Obsidian expects unencoded in file paths.\n*   `open_in_obsidian(uri: &str) -> Result<(), String>`: Spawns an external process to open the provided Obsidian URI. It uses platform-specific commands (`xdg-open` on Linux, `open` on macOS, `start` on Windows) and operates in a fire-and-forget manner.\n*   `extract_vault_name(vault_path: &Path) -> String`: Extracts the name of the vault from its full path by taking the last directory component.\n*   `open_note(vault_path: &Path, file_path: &Path) -> Result<(), String>`: A convenience function that orchestrates the process of opening a note. It combines `extract_vault_name`, `build_obsidian_uri`, and `open_in_obsidian`. It also handles path normalization, including converting Windows path separators and removing the `.md` extension.\n\n#### `encode_obsidian_param` Function\n\nA specialized encoding function that percent-encodes only characters that would break URI parsing (`&`, `=`, `#`, `?`, `%`, `+`, space, and non-ASCII characters), while allowing characters like `/` to remain unencoded, as required by Obsidian URIs.\n\n### 3. Vault Detection (`vault_detector.rs`)\n\nThis sub-module provides mechanisms to automatically locate Obsidian vault directories on the user's system.\n\n#### `detect_vault` Function\n\nThe main entry point for vault detection. It employs a prioritized search strategy:\n\n1.  **Explicit CLI Path:** Checks if a vault path was provided via a command-line argument (`--vault`).\n2.  **Environment Variable:** Looks for a vault path in a configurable environment variable (defaults to `OBSIDIAN_VAULT`).\n3.  **Configuration File:** Reads a vault path from a TOML configuration file (`vault_path` field).\n4.  **Obsidian Registry:** Parses the official Obsidian registry file (`obsidian.json`) to find the most recently opened vault.\n5.  **Auto-Scan:** Scans common locations and the current directory hierarchy for directories containing the `.obsidian/` marker.\n\n#### Helper Functions\n\n*   `is_valid_vault(path: &Path) -> bool`: Determines if a given path points to a valid Obsidian vault by checking for the existence of the `.obsidian/` subdirectory.\n*   `scan_common_locations() -> Option<PathBuf>`: Scans the current working directory (up to 3 levels) and common user directories (`~/Obsidian`, `~/Documents/Obsidian`) for vaults.\n*   `get_registry_path() -> Option<PathBuf>`: Returns the platform-specific path to the Obsidian registry file (`obsidian.json`).\n*   `get_vault_from_registry() -> Option<PathBuf>`: Reads the `obsidian.json` file, parses it, and returns the path to the most recently accessed vault based on its timestamp.\n\n## Module Structure\n\n```mermaid\ngraph TD\n    A[Obsidian Integration Module] --> B_metadata_rs[\"B(metadata.rs)\"];\n    A --> C_uri_rs[\"C(uri.rs)\"];\n    A --> D_vault_detector_rs[\"D(vault_detector.rs)\"];\n\n    B --> E{ScrapedContent};\n    B --> F[whatlang crate];\n    B --> G[chrono crate];\n\n    C --> H[std::process::Command];\n    C --> I[Path];\n\n    D --> J[dirs crate];\n    D --> K[serde_json crate];\n    D --> L[std::env];\n    D --> M[Path];\n    D --> N[fs];\n\n    E --> O[ValidUrl];\n```\n\n## Usage Examples\n\n### Generating Metadata\n\n```rust\nuse your_crate::infrastructure::obsidian::metadata::ObsidianRichMetadata;\nuse your_crate::domain::ScrapedContent;\nuse your_crate::domain::ValidUrl;\n\nlet scraped_data = ScrapedContent {\n    title: \"Example Article\".to_string(),\n    content: \"This is the content of the article...\".to_string(),\n    url: ValidUrl::parse(\"https://example.com/article\").unwrap(),\n    // ... other fields\n    ..Default::default()\n};\n\nlet obsidian_metadata = ObsidianRichMetadata::from_content(&scraped_data);\n\nprintln!(\"Word Count: {}\", obsidian_metadata.word_count);\nprintln!(\"Reading Time: {} minutes\", obsidian_metadata.reading_time);\nprintln!(\"Language: {:?}\", obsidian_metadata.language);\nprintln!(\"Content Type: {}\", obsidian_metadata.content_type);\n```\n\n### Opening a Note in Obsidian\n\n```rust\nuse your_crate::infrastructure::obsidian::uri::{open_note, build_obsidian_uri};\nuse std::path::Path;\n\n// Assuming you have detected your vault path\nlet vault_path = Path::new(\"/path/to/your/Obsidian/Vault\");\nlet note_relative_path = Path::new(\"Notes/MyImportantNote\"); // .md extension is optional\n\n// Using the convenience function\nmatch your_crate::infrastructure::obsidian::uri::open_note(vault_path, note_relative_path) {\n    Ok(_) => println!(\"Attempted to open note in Obsidian.\"),\n    Err(e) => eprintln!(\"Error opening note: {}\", e),\n}\n\n// Or building the URI manually\nlet vault_name = \"MyVault\"; // Extracted from vault_path\nlet file_path_str = \"Notes/MyImportantNote\"; // Normalized path\nlet obsidian_uri = build_obsidian_uri(vault_name, file_path_str);\nprintln!(\"Obsidian URI: {}\", obsidian_uri);\n// Then use open_in_obsidian(&obsidian_uri)\n```\n\n### Detecting an Obsidian Vault\n\n```rust\nuse your_crate::infrastructure::obsidian::vault_detector::detect_vault;\nuse std::path::Path;\n\n// Example: Prioritize CLI flag, then environment variable, then config file\nlet cli_vault_path = Some(Path::new(\"/mnt/data/MyObsidianVault\"));\nlet env_var_name = Some(\"OBSIDIAN_VAULT_PATH\");\nlet config_vault_path = Some(\"./config/vault.toml\"); // Placeholder\n\nlet detected_vault = detect_vault(\n    cli_vault_path,\n    env_var_name,\n    config_vault_path,\n);\n\nmatch detected_vault {\n    Some(path) => println!(\"Detected Obsidian vault at: {}\", path.display()),\n    None => println!(\"Obsidian vault not found.\"),\n}\n```","other":"# Other\n\n# Other Module\n\nThis documentation covers various aspects of the `rust-scraper` project that don't fit neatly into a single, cohesive module. It includes refactoring logs, module descriptions, and details about the main entry point of the application.\n\n## Refactoring Log (Fase 5: Limpieza Final)\n\nThis section details the final cleanup phase of the project, focusing on dependency management, code splitting, and security.\n\n### Dependencias\n\n*   **Removed:** 10 unused dependencies were removed: `flate2`, `md5`, `memmap2`, `ndarray`, `ort`, `pulldown-cmark-to-cmark`, `slug`, `tokio-util`, `tracing-appender`, `urlencoding`.\n*   **Verification:** `cargo machete` confirmed 0 unused dependencies remain.\n\n### File Splits\n\nSeveral large files were split into smaller, more manageable modules to improve organization and maintainability:\n\n*   `obsidian.rs` (678 lines) was split into `obsidian.rs` (190 lines) and `wikilinks.rs` (428 lines).\n*   `sitemap_parser.rs` (753 lines) was split into `sitemap_parser.rs` (581 lines) and `sitemap_config.rs` (148 lines).\n*   `model_cache.rs` (649 lines) was split into `model_cache.rs` (254 lines) and `cache_config.rs` (137 lines).\n\nThe following files were *not* split due to minimal refactoring needs:\n\n*   `crawler_service.rs`: Only 2 deprecated functions were identified.\n*   `client.rs`: Only 33 lines related to retries were present.\n\n### Seguridad\n\n*   **RUSTSEC-2026-0009 (time):** Blocked due to `tract-linalg`'s upper bound on the `time` crate (`<0.3.42`). The fix requires `time >=0.3.47`. This is pending an upstream update in `tract-onnx`.\n*   **RUSTSEC-2026-0097 (rand):** A warning was noted upstream. This is being monitored.\n\n### Métricas Finales\n\n*   **Tests Passing:** 440/440 tests are passing.\n*   **Large Files:** 5 files exceed 600 lines, but these are considered justified.\n*   **Clippy:** The codebase is clean, with 0 errors and 0 warnings.\n*   **Unused Dependencies:** 0 unused dependencies.\n*   **GitNexus Index:** 3064 nodes, 6314 edges.\n\n## Module Descriptions\n\nThis section provides a brief overview of key modules within the `rust-scraper` project.\n\n### `src/application/crawler/mod.rs`\n\nThis module is the entry point for the crawler functionality, refactored from `crawler_service.rs`. It organizes the crawler's components into sub-modules:\n\n*   **`discovery`:** Handles URL discovery and sitemap parsing.\n*   **`engine`:** Manages the asynchronous crawl engine and orchestration logic.\n*   **`state`:** Contains types for tracking crawl progress and state.\n\nIt also re-exports key functions for backward compatibility and convenience.\n\n### `src/application/mod.rs`\n\nThe **Application Layer** serves as the core of the use cases and orchestration logic. It depends on both the Domain and Infrastructure layers. This module exposes:\n\n*   **Container:** Application dependency injection.\n*   **Crawl Result Repository:** Interface for storing crawl results.\n*   **Crawler Service:** Orchestration of crawling tasks.\n*   **Deduplicator:** Logic for removing duplicate URLs.\n*   **Export Factory/Utils:** Utilities for exporting data.\n*   **HTTP Client:** Creation of HTTP clients.\n*   **Rate Limiter:** Configuration and shared instances of rate limiters.\n*   **Results Channel:** Mechanisms for communicating crawl results.\n*   **Scraper Service:** Logic for web scraping, including SPA detection.\n*   **URL Filter:** Utilities for filtering and validating URLs.\n\n### `src/cli/mod.rs`\n\nThe **CLI Module** acts as an adapter for command-line interface interactions. It handles argument parsing, error reporting, shell completions, and configuration management. Key sub-modules include:\n\n*   **`args`:** Defines the command-line arguments and subcommands.\n*   **`commands`:** Specific command implementations.\n*   **`completions`:** Generates shell completion scripts.\n*   **`config`:** Manages application configuration.\n*   **`error`:** Handles CLI-specific error types and exit codes.\n*   **`export_flow`:** Orchestrates the export process.\n*   **`orchestrator`:** The main entry point for running the CLI application.\n*   **`preflight`:** Performs initial checks and configuration merging.\n*   **`scrape_flow`:** Orchestrates the scraping process.\n*   **`summary`:** Displays a summary of the crawl/scrape operation.\n*   **`url_discovery`:** Handles URL discovery from the CLI.\n*   **`wizard`:** Interactive configuration wizard.\n\nIt also defines the `SelectedUrls` enum to represent the outcome of URL selection.\n\n### `src/domain/repositories.rs`\n\nThis module defines the **Repository Interfaces** for domain data persistence. It outlines the contracts that the Infrastructure layer must implement for storing and retrieving domain entities, such as `ScrapedContent`.\n\nThe `CrawlResultRepository` trait includes methods for:\n\n*   `save`: Persisting scraped content.\n*   `find_by_url`: Retrieving content by its URL.\n*   `get_all_urls`: Fetching a list of all crawled URLs.\n\nA mock implementation (`MockRepo`) is provided for testing purposes.\n\n### `src/infrastructure/http/mod.rs`\n\nThis module provides the **HTTP Client Infrastructure**. It primarily re-exports the `create_http_client` function from the application layer, maintaining architectural consistency. It also contains the `waf_engine` sub-module.\n\n### `src/infrastructure/mod.rs`\n\nThe **Infrastructure Layer** contains the concrete implementations of external concerns. It depends on the Domain layer but not vice versa, adhering to Clean Architecture principles. This layer includes:\n\n*   **`config`:** Infrastructure-specific configuration.\n*   **`converter`:** Content conversion utilities (e.g., HTML to Markdown).\n*   **`crawler`:** Concrete implementation of the crawler.\n*   **`export`:** Concrete implementations for data export.\n*   **`http`:** HTTP client implementation details.\n*   **`mcp_server`:** (Likely related to a specific service or protocol).\n*   **`observability`:** Logging and tracing implementations.\n*   **`obsidian`:** Integration with Obsidian (e.g., for note-taking).\n*   **`output`:** Handling of output formats.\n*   **`scraper`:** Concrete web scraping implementations (e.g., using Readability).\n*   **`user_agent`:** User-agent management.\n*   **`ai`:** (Feature-gated) AI-powered semantic cleaning functionalities.\n\n## Main Application Entry Point (`src/main.rs`)\n\nThe `main.rs` file serves as the **thin entry point** for the `rust-scraper` application. It orchestrates the initial setup and then delegates the core logic to the `orchestrator::run()` function.\n\nThe execution flow is as follows:\n\n1.  **Parse CLI Arguments:** Uses `clap::Parser` to parse command-line arguments into an `Args` struct.\n2.  **Handle Subcommands:** Processes specific subcommands like `Completions`.\n3.  **Config TUI:** If the `--config-tui` flag is present, it launches an interactive configuration wizard using `ratatui` and `crossterm`. The results from the TUI can override CLI arguments.\n4.  **URL Handling:** If no URL is provided via arguments, it prompts the user interactively (if running in a TTY) or returns an error (in CI environments or non-interactive shells).\n5.  **Load Config File:** Loads configuration from a default TOML file (`~/.config/rust_scraper/config.toml`).\n6.  **Apply Config Defaults:** Merges configuration from the file with CLI arguments, prioritizing CLI arguments.\n7.  **Initialize Logging:** Sets up dual logging (stderr and potentially a file) using `tracing`, respecting verbosity and quiet flags.\n8.  **Delegate to Orchestrator:** Calls `orchestrator::run(args).await` to execute the main application logic.\n\nThe `main` function is marked with `#[tokio::main]` to enable asynchronous execution. Helper functions like `is_ci`, `stdin_is_tty`, and `run_config_tui` manage environment checks and TUI interactions.","output-and-exporting":"# Output and Exporting\n\n# Output and Exporting Module\n\nThis module provides the concrete implementations for exporting scraped data into various formats. It acts as the infrastructure layer for the `Exporter` trait defined in the domain, allowing the application to persist scraped content in a structured and usable way.\n\nThe primary goals of this module are:\n\n*   **Format Variety**: Support for multiple output formats including JSON Lines (JSONL), structured JSON, Markdown, and plain Text.\n*   **Efficiency**: Optimized for large datasets, especially with JSONL and Vector exporters, supporting streaming and append modes.\n*   **State Management**: Integration with `StateStore` to manage export progress and enable resume functionality.\n*   **Data Integrity**: Ensuring exported data is correctly formatted and, where applicable, includes necessary metadata.\n\n## Components\n\nThe module is composed of several distinct exporters, each tailored for a specific output format or use case:\n\n### `FileExporter`\n\nThe `FileExporter` handles exporting `DocumentChunkValidated` entities to the local file system. It supports Markdown, Text, and JSON formats, organizing output into a directory structure based on the domain of the URL.\n\n*   **Functionality**:\n    *   Creates directories based on the URL's domain.\n    *   Generates filenames derived from the URL, sanitizing special characters.\n    *   Formats content for Markdown (with YAML frontmatter), Text (structured with headers), and JSON (pretty-printed).\n    *   Supports `ExportFormat::Jsonl` for appending JSON objects to a file, one per line.\n    *   Supports `ExportFormat::Vector` by delegating to `save_json`.\n    *   Defaults to `ExportFormat::Auto` by using `save_json`.\n*   **Key Methods**:\n    *   `new(config: ExporterConfig)`: Creates an exporter with a given configuration.\n    *   `new_with_path(output_dir: PathBuf, format: OutputFormat, filename: impl Into<String>)`: Convenience constructor.\n    *   `export(document: DocumentChunkValidated)`: Exports a single document based on the exporter's configured format.\n    *   `export_batch(documents: &[DocumentChunkValidated])`: Exports a slice of documents.\n    *   `save_md`, `save_txt`, `save_json`: Internal methods for specific format generation.\n    *   `output_path(doc: &DocumentChunkValidated, ext: &str)`: Generates the output file path.\n\n### `JsonlExporter`\n\nThe `JsonlExporter` is specifically designed for exporting data in the JSON Lines (JSONL) format. This format is highly efficient for large datasets as it writes one JSON object per line, allowing for streaming and easy parsing with tools like `jq` or `pandas`.\n\n*   **Functionality**:\n    *   Appends JSON objects to a file, with each object on a new line.\n    *   Optimized for streaming writes, avoiding large in-memory buffers.\n    *   Acquires an exclusive file lock (`.jsonl.lock`) to prevent concurrent writes.\n    *   Handles directory creation and file opening in append or create/truncate modes.\n*   **Key Methods**:\n    *   `new(config: ExporterConfig)`: Creates an exporter with a given configuration.\n    *   `new_with_path(output_dir: PathBuf, filename: impl Into<String>)`: Convenience constructor.\n    *   `export(document: DocumentChunkValidated)`: Exports a single document as a JSON line.\n    *   `export_batch(documents: &[DocumentChunkValidated])`: Exports multiple documents as JSON lines.\n    *   `writer()`: Manages file handle, locking, and directory creation.\n    *   `serialize_line(doc: &DocumentChunkValidated)`: Serializes a single document to a JSON string.\n\n### `StateStore`\n\nThe `StateStore` is crucial for implementing resume functionality in the export process. It persists the state of exported items (specifically, processed URLs) to disk, typically in the user's cache directory.\n\n*   **Functionality**:\n    *   Manages state for a specific domain.\n    *   Stores processed URLs in a JSON file (`<domain>.json`).\n    *   Uses file locking (`.json.lock`) to ensure atomic read/write operations.\n    *   Supports loading existing state or creating a new one if none exists (`load_or_default`).\n    *   Provides methods to mark URLs as processed and check their status.\n    *   Handles directory creation for the cache.\n*   **Key Methods**:\n    *   `new(domain: &str)`: Creates a `StateStore` for a given domain.\n    *   `set_cache_dir(cache_dir: PathBuf)`: Allows specifying a custom cache directory.\n    *   `get_state_path()`: Returns the path to the state file.\n    *   `load()`: Loads the state from disk.\n    *   `save(state: &ExportState)`: Saves the current state to disk.\n    *   `mark_processed(state: &mut ExportState, url: &str)`: Marks a URL as processed within the `ExportState`.\n    *   `is_processed(state: &ExportState, url: &str)`: Checks if a URL has been processed.\n    *   `load_or_default()`: Loads state or returns a new, empty state.\n\n### `VectorExporter`\n\nThe `VectorExporter` is designed for exporting data, particularly embeddings, for use in vector databases or similarity search applications. It outputs data in a structured JSON format with a metadata header.\n\n*   **Functionality**:\n    *   Exports documents as a JSON array within a JSON object.\n    *   Includes a metadata header with `format_version`, `model_name`, `dimensions`, `total_documents`, and `created_at`.\n    *   Supports embedding dimensions validation: it records the dimension of the first embedding encountered and rejects subsequent documents with different embedding dimensions, serializing them without embeddings.\n    *   Rejects embeddings containing `NaN` or `Infinity` values.\n    *   Supports append mode, where it intelligently truncates the file at the closing `]` of the `documents` array to allow for seamless appending.\n    *   Acquires an exclusive file lock.\n*   **Key Methods**:\n    *   `new(config: ExporterConfig)`: Creates an exporter with a given configuration.\n    *   `new_with_path(config: ExporterConfig, output_dir: impl Into<PathBuf>)`: Convenience constructor.\n    *   `export(document: DocumentChunkValidated)`: Exports a single document.\n    *   `export_batch(documents: &[DocumentChunkValidated])`: Exports a slice of documents.\n    *   `writer()`: Manages file handle, locking, directory creation, and truncation for append mode.\n    *   `write_metadata_header(...)`: Writes or updates the metadata header.\n    *   `serialize_document(doc: &DocumentChunkValidated)`: Serializes a document, performing embedding dimension checks.\n    *   `close_json(...)`: Writes the closing `]` and `}` to complete the JSON structure.\n    *   `cosine_similarity(a: &[f32], b: &[f32])`: A utility function (defined within this module) to calculate cosine similarity between two vectors.\n\n## Architecture and Integration\n\nThis module resides in the `infrastructure` layer, depending on the `domain` layer (specifically `domain::exporter` and `domain::entities`).\n\n```mermaid\ngraph TD\n    subgraph Infrastructure\n        A[FileExporter] --> B_Exporter[\"B(Exporter\"] Trait);\n        A --> C_ExporterConfig[\"C(ExporterConfig)\"];\n        A --> D_DocumentChunkValidated[\"D(DocumentChunkValidated)\"];\n        E[JsonlExporter] --> B;\n        E --> C;\n        E --> D;\n        F[StateStore] --> G_ExportState[\"G(ExportState)\"];\n        F --> H_ScraperError[\"H(ScraperError)\"];\n        I[VectorExporter] --> B;\n        I --> C;\n        I --> D;\n        I --> J_cosine_similarity[\"J(cosine_similarity)\"];\n    end\n\n    subgraph Domain\n        B; C; D; G; H; J;\n    end\n\n    subgraph Application\n        K[ExportFactory] --> B;\n        K --> F;\n        L[ScrapeFlow] --> F;\n    end\n\n    K --> A;\n    K --> E;\n    K --> I;\n    L --> M[StateStore];\n```\n\n*   **`Exporter` Trait**: The `FileExporter`, `JsonlExporter`, and `VectorExporter` all implement the `Exporter` trait defined in `src/domain/exporter.rs`. This allows for dependency injection and polymorphism, where the application layer can use any `Exporter` implementation interchangeably.\n*   **`ExporterConfig`**: This struct, defined in the domain, is used by all exporters to configure their behavior (output directory, format, filename, append mode).\n*   **`DocumentChunkValidated`**: The core data structure being exported, defined in `src/domain/entities.rs`.\n*   **`ExportState`**: Used by `StateStore` to track processed items.\n*   **`StateStore` Integration**: The `StateStore` is used by the application layer (e.g., `ExportFactory`, `ScrapeFlow`) to manage resume capabilities. It's instantiated per domain and used to check if a URL has already been processed before attempting to export it.\n*   **Error Handling**: Exporters return `ExportResult<()>`, which is an alias for `Result<(), ExporterError>`. `ExporterError` is an enum defined in the domain, covering various export-related issues like I/O errors, serialization problems, and dimension mismatches. `StateStore` uses `ScraperError` for its operations.\n\n## Usage Patterns\n\n### Basic Export\n\nTo export a single document:\n\n```rust\nuse rust_scraper::domain::entities::DocumentChunkValidated;\nuse rust_scraper::domain::exporter::Exporter;\nuse rust_scraper::infrastructure::export::{FileExporter, ExporterConfig, OutputFormat};\nuse std::path::PathBuf;\n\n// Assume 'validated_document' is a DocumentChunkValidated instance\nlet config = ExporterConfig::new(PathBuf::from(\"./output\"), OutputFormat::Json, \"my_export\");\nlet exporter = FileExporter::new(config);\n\nmatch exporter.export(validated_document) {\n    Ok(_) => println!(\"Document exported successfully!\"),\n    Err(e) => eprintln!(\"Error exporting document: {:?}\", e),\n}\n```\n\n### JSONL Export\n\nFor efficient, line-by-line JSON export:\n\n```rust\nuse rust_scraper::domain::entities::DocumentChunkValidated;\nuse rust_scraper::domain::exporter::Exporter;\nuse rust_scraper::infrastructure::export::{JsonlExporter, ExporterConfig};\nuse std::path::PathBuf;\n\n// Assume 'validated_document' is a DocumentChunkValidated instance\nlet config = ExporterConfig::new(PathBuf::from(\"./output\"), rust_scraper::domain::ExportFormat::Jsonl, \"my_export.jsonl\");\nlet exporter = JsonlExporter::new(config);\n\nmatch exporter.export(validated_document) {\n    Ok(_) => println!(\"Document exported to JSONL successfully!\"),\n    Err(e) => eprintln!(\"Error exporting document to JSONL: {:?}\", e),\n}\n```\n\n### State Management and Resume\n\nTo enable resuming exports:\n\n```rust\nuse rust_scraper::infrastructure::export::StateStore;\nuse rust_scraper::domain::ExportState;\n\nlet domain = \"example.com\";\nlet store = StateStore::new(domain);\n\n// Load existing state or create a new one\nlet mut state: ExportState = match store.load_or_default() {\n    Ok(s) => s,\n    Err(e) => {\n        eprintln!(\"Failed to load or create state: {:?}\", e);\n        return;\n    }\n};\n\nlet url_to_process = \"https://example.com/new_page\";\n\nif !store.is_processed(&state, url_to_process) {\n    // ... perform scraping and export ...\n    // If export is successful:\n    store.mark_processed(&mut state, url_to_process);\n    if let Err(e) = store.save(&state) {\n        eprintln!(\"Failed to save state: {:?}\", e);\n    }\n} else {\n    println!(\"URL already processed: {}\", url_to_process);\n}\n```","overview":"# rust_scraper — Wiki\n\n# 🕷️ Rust Scraper\n\nWelcome to the `rust_scraper` repository! This project provides a production-ready web scraping tool built with Clean Architecture principles. It's designed to extract, clean, and export web content efficiently, offering features like an interactive TUI selector, sitemap support, and AI-powered content cleaning.\n\n## What it Does\n\nRust Scraper is a command-line utility that allows you to:\n\n*   **Interactively explore and select URLs** from a website before scraping.\n*   **Extract relevant content**, intelligently ignoring boilerplate like menus and ads.\n*   **Export scraped data** into various formats, including Markdown, JSON, JSONL (ideal for RAG), and Vector embeddings.\n*   **Integrate seamlessly with Obsidian**, saving articles directly into your vault with wiki-links and metadata.\n*   **Download associated assets** like images and documents (e.g., PDFs).\n*   **Leverage sitemaps** to discover all pages on a site automatically.\n\n## Architecture Overview\n\nThe project adheres to Clean Architecture, separating concerns into distinct layers. The core business logic resides in the `domain` and `application` layers, while infrastructure concerns like HTTP clients, file system access, and the CLI are handled in the `infrastructure` and `cli` layers, respectively.\n\n```mermaid\ngraph TD\n    CLI[CLI Interface] --> App[Core Application Logic]\n    App --> Domain[Domain Models and Entities]\n    App --> Crawl[Crawling Engine]\n    App --> Extract[Data Extraction and Detection]\n    App --> Export[Output and Exporting]\n    App --> Config[Configuration]\n    App --> Obs[Observability]\n    Crawl --> HTTP[HTTP Client]\n    Extract --> HTTP\n    Extract --> Detect[Infrastructure Adapters]\n    Export --> Detect\n    CLI --> TUI[Terminal User Interface (TUI)]\n    CLI --> Config\n    App --> AI[AI and Machine Learning]\n    Extract --> AI\n    Export --> Obsidian[Obsidian Integration]\n    WAF[WAF (Web Application Firewall)] --> HTTP\n```\n\n### Key Modules\n\n*   **[CLI Interface](cli-interface.md)**: The entry point for users, handling argument parsing and orchestrating the scraping workflow.\n*   **[Core Application Logic](core-application-logic.md)**: Orchestrates high-level use cases like crawling and scraping, managing services and repositories.\n*   **[Domain Models and Entities](domain-models-and-entities.md)**: Defines the fundamental business types and data structures, independent of any infrastructure.\n*   **[Crawling Engine](crawling-engine.md)**: Manages the discovery and fetching of web pages, handling concurrency and URL queues.\n*   **[HTTP Client](http-client.md)**: Provides a robust HTTP client with features like retries, user-agent rotation, and WAF detection.\n*   **[Data Extraction and Detection](data-extraction-and-detection.md)**: Focuses on extracting relevant data and identifying assets like images and documents.\n*   **[Text Conversion](text-conversion.md)**: Transforms raw HTML into clean Markdown, preserving structure and removing boilerplate.\n*   **[Output and Exporting](output-and-exporting.md)**: Implements concrete logic for exporting data into various formats.\n*   **[Terminal User Interface (TUI)](terminal-user-interface-tui.md)**: Provides an interactive command-line experience for configuration and monitoring.\n*   **[AI and Machine Learning](ai-and-machine-learning.md)**: Powers advanced features like semantic chunking and text embedding generation for RAG.\n*   **[Obsidian Integration](obsidian-integration.md)**: Facilitates saving scraped content directly into Obsidian vaults.\n*   **[Configuration](configuration.md)**: Manages application settings and validation.\n*   **[Observability](observability.md)**: Handles logging, metrics, and tracing for monitoring.\n*   **[WAF (Web Application Firewall)](waf-web-application-firewall.md)**: Detects and mitigates against WAFs.\n*   **[Infrastructure Adapters](infrastructure-adapters.md)**: Contains infrastructure-facing implementations like asset downloading and URL path translation.\n\n## Installation\n\nThe recommended way to install is using Cargo:\n\n```bash\ncd rust-scraper\ncargo install --path .\n```\n\nThis will build and install the `rust_scraper` binary on your system. For more detailed installation instructions and feature flags, please refer to the [README](README.md).\n\n## Key End-to-End Flows\n\n1.  **Basic Scraping**: The **[CLI Interface](cli-interface.md)** parses arguments, the **[Core Application Logic](core-application-logic.md)** orchestrates a scraping task, the **[Crawling Engine](crawling-engine.md)** discovers URLs, the **[HTTP Client](http-client.md)** fetches pages, **[Data Extraction and Detection](data-extraction-and-detection.md)** pulls out content, **[Text Conversion](text-conversion.md)** cleans it, and **[Output and Exporting](output-and-exporting.md)** saves it.\n2.  **Interactive Scraping**: The **[CLI Interface](cli-interface.md)** launches the **[Terminal User Interface (TUI)](terminal-user-interface-tui.md)**. The TUI interacts with the **[Core Application Logic](core-application-logic.md)** to display site structure and allow user selection. Once selections are made, the workflow proceeds as in basic scraping.\n3.  **Asset Downloading**: During scraping, if enabled, the **[Data Extraction and Detection](data-extraction-and-detection.md)** module identifies assets. The **[Infrastructure Adapters](infrastructure-adapters.md)**, specifically the downloader, uses the **[HTTP Client](http-client.md)** to fetch these assets, saving them to disk.\n4.  **Obsidian Export**: After scraping and content processing, the **[Output and Exporting](output-and-exporting.md)** module utilizes the **[Obsidian Integration](obsidian-integration.md)** module to format and save the content, including metadata and wiki-links, into the user's Obsidian vault.\n5.  **AI-Powered Cleaning**: For advanced cleaning, the **[Core Application Logic](core-application-logic.md)** can invoke services from the **[AI and Machine Learning](ai-and-machine-learning.md)** module. This might involve semantic chunking or embedding generation, influencing the final extracted content or its export format.\n\nThis overview provides a starting point for understanding the `rust_scraper` project. Please explore the individual module documentation for more in-depth information.","terminal-user-interface-tui":"# Terminal User Interface (TUI)\n\n# Terminal User Interface (TUI) Module\n\nThe TUI module provides an interactive command-line interface for the scraper application. It allows users to configure scraping settings, select URLs for scraping, and monitor the scraping process in real-time. This module acts as a delivery mechanism, translating application data into a user-friendly visual format and capturing user input.\n\n## Key Components\n\nThe TUI module is composed of several sub-modules, each responsible for a specific aspect of the user interface:\n\n*   **`config_form`**: Manages an interactive form for configuring scraper settings.\n*   **`error_log_widget`**: Displays a scrollable list of errors encountered during scraping, with color-coded severity.\n*   **`event_loop`**: Implements a robust asynchronous event loop that handles terminal input, application events, and periodic ticks for UI updates.\n*   **`progress_types`**: Defines the data structures and enums used for tracking scraping progress and application events.\n*   **`progress_view`**: Orchestrates the main progress display, integrating the progress widget and error log.\n*   **`progress_widget`**: Renders the real-time scraping progress, including progress bars, ETA, and URL status.\n*   **`terminal`**: Handles the setup and teardown of the terminal environment for TUI operation, including raw mode and alternate screen management.\n*   **`url_selector`**: Provides an interactive interface for selecting specific URLs from a discovered list.\n\n## Core Functionality\n\n### Configuration Form (`config_form`)\n\nThe `config_form` module allows users to configure various scraping parameters through an interactive form.\n\n*   **`ConfigFormState`**: Manages the state of the form, including the underlying `ratatui-form` instance, and flags for submission or cancellation.\n*   **`build_form()`**: Constructs the configuration form with predefined fields for output settings, discovery options, download preferences, and Obsidian integration. The AI cleaning option is feature-gated by the `ai` feature flag.\n*   **`handle_input()`**: Processes keyboard events to update the form's state and detect submission or cancellation.\n*   **`render()`**: Renders the form to the terminal.\n*   **`data()`**: Returns the current form data as a JSON `Value`.\n\n### Event Handling (`event_loop`)\n\nThe `event_loop` module is central to the TUI's reactivity. It uses `tokio::select!` to concurrently listen to multiple event sources:\n\n*   **Terminal Input**: Captures keyboard events using `crossterm`.\n*   **Application Events**: Receives events from other parts of the application via an MPSC channel (`AppEventSender`/`AppEventReceiver`).\n*   **Periodic Ticks**: Triggers UI updates at a configurable interval.\n\nThe `run_event_loop` function takes a configuration, an event receiver, and a handler function. The handler processes each event and returns `true` to continue the loop or `false` to exit. `run_event_loop_until_quit` is a convenience function that exits the loop upon receiving an `AppEvent::Quit`.\n\n### Progress Tracking (`progress_types`, `progress_widget`, `error_log_widget`)\n\nThese modules work together to provide real-time feedback on the scraping process:\n\n*   **`progress_types`**: Defines enums like `ScrapeProgress`, `ScrapeStatus`, and `ScrapeError` to represent the state and outcomes of scraping tasks. `ProgressState` aggregates the status of all URLs, including counts, errors, and ETA calculations.\n*   **`progress_widget`**: Renders the main progress display. It shows an overall progress bar, ETA, current URL, and a summary of completed/failed tasks. It utilizes `ProgressIcons` for animated feedback.\n*   **`error_log_widget`**: Displays detailed errors from `ProgressState.errors`. It supports color-coding based on `ErrorType` and provides scrolling capabilities.\n\nThe `run_progress_view` function orchestrates the display of this information, setting up the terminal, managing the event loop for progress updates, and rendering the UI.\n\n### URL Selection (`url_selector`)\n\nThe `url_selector` module enables users to choose specific URLs from a list of discovered ones before scraping begins.\n\n*   **`UrlSelectorState`**: Manages the state of the selection process, including the list of URLs, selection status, cursor position, and scroll offset. It's designed to be testable independently of the UI.\n*   **`UrlSelector`**: Handles the rendering of the URL selection interface, displaying checkboxes, cursor indicators, and status messages.\n*   **`run_selector()`**: The main function that sets up the terminal, runs the event loop for user input, and renders the `UrlSelector`. It returns the list of selected URLs or an error if the user quits without selection.\n\n### Terminal Management (`terminal`)\n\nThe `terminal` module provides essential functions for initializing and cleaning up the terminal environment:\n\n*   **`setup_terminal()`**: Enables raw mode, enters the alternate screen, hides the cursor, and sets up a panic hook to ensure the terminal is restored even if the application panics.\n*   **`restore_terminal()`**: Disables raw mode, leaves the alternate screen, and shows the cursor, returning the terminal to its normal state.\n\n## Integration with the Application\n\n*   **Configuration**: The `run_config_tui` function (likely in `src/main.rs` or a similar entry point) uses `ConfigFormState` to present the configuration options to the user. The resulting configuration is then used by the application core.\n*   **URL Selection**: Before scraping begins, `run_selector` is called with the discovered URLs. The returned list of selected URLs dictates which targets the scraper will process.\n*   **Progress Monitoring**: The application's core scraping logic sends `ScrapeProgress` events to a `mpsc::Sender` channel. `run_progress_view` receives these events and updates the `ProgressState`, which is then rendered by the `ProgressWidget` and `ErrorLogWidget`.\n*   **Event Loop**: The `event_loop` module provides the foundation for the TUI's responsiveness, integrating terminal input with application-level events.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph TUI Module\n        A[config_form] --> B_ratatui-form[\"B(ratatui-form)\"]\n        C[error_log_widget]\n        D[event_loop] --> E_tokio__select[\"E(tokio::select\"]!)\n        D --> F_crossterm__event[\"F(crossterm::event)\"]\n        D --> G_tokio__sync__mpsc[\"G(tokio::sync::mpsc)\"]\n        H[progress_types]\n        I[progress_view] --> J_Terminal[\"J(Terminal)\"]\n        I --> K_ProgressWidget[\"K(ProgressWidget)\"]\n        I --> C\n        I --> D\n        I --> H\n        K --> H\n        K --> L_ProgressIcons[\"L(ProgressIcons)\"]\n        C --> H\n        M[progress_widget] --> H\n        M --> L\n        N[terminal] --> O_crossterm[\"O(crossterm)\"]\n        P[url_selector] --> J\n        P --> Q_ratatui[\"Q(ratatui)\"]\n        P --> H\n        R[TuiError]\n    end\n\n    subgraph Application Layer\n        S[Scraper Core] --> G\n        S --> H\n        T[URL Discovery] --> P\n        U[Configuration] --> A\n        V[Main Entrypoint] --> I\n        V --> P\n        V --> A\n        V --> N\n    end\n\n    J --> N\n    G --> I\n    G --> D\n\n    style TUI Module fill:#f9f,stroke:#333,stroke-width:2px\n```\n\nThis diagram illustrates the TUI module's internal structure and its primary connections to the rest of the application. The `event_loop` is central to handling asynchronous events, while `progress_types` defines the shared data structures. Specific widgets like `config_form`, `url_selector`, `progress_widget`, and `error_log_widget` handle distinct UI responsibilities, all managed by functions like `run_config_tui`, `run_selector`, and `run_progress_view`. The `terminal` module provides the low-level interface to the terminal.","tests-common":"# Tests — common\n\n# Tests — common\n\nShared test fixtures and helpers for integration tests. This module provides utilities for setting up mock HTTP servers, loading HTML fixtures, and generating mock scraped content, ensuring deterministic and isolated testing environments.\n\n## Key Components\n\n### `TestHttpServer`\n\nAn RAII wrapper around `wiremock::MockServer` for deterministic HTTP mocking in integration tests. Each instance provides an isolated server, preventing interference between tests.\n\n#### Usage\n\n```rust\n#[tokio::test]\nasync fn test_http_client() {\n    let server = common::TestHttpServer::new().await;\n    let base_url = server.uri();\n\n    // Register a mock response for a GET request to \"/api/test\"\n    server.mock_response(\n        wiremock::matchers::method(\"GET\"),\n        \"/api/test\",\n        200,\n        r#\"{\"status\":\"ok\"}\"#\n    ).await;\n\n    // Use the mock server's base URL with your HTTP client\n    // let client = HttpClient::new(&base_url);\n    // let response = client.get(\"test\").await;\n    // assert!(response.is_ok());\n}\n```\n\n#### Methods\n\n*   `new()`: Creates and starts a new `MockServer` on an available port.\n*   `uri()`: Returns the base URL of the mock server.\n*   `mock_response<M>(matcher, path, status, body)`: Registers a custom mock response. `M` must implement `wiremock::matcher::Matcher`.\n*   `mock_rate_limit(path)`: Registers a mock that returns a 429 Too Many Requests status.\n*   `mock_server_error(path)`: Registers a mock that returns a 500 Internal Server Error status.\n*   `mock_not_found(path)`: Registers a mock that returns a 404 Not Found status.\n\n### Fixture Loading\n\nUtilities for accessing test fixture files.\n\n*   `load_fixture(name: &str)`: Loads the content of a file from the `tests/fixtures/` directory. Panics if the file cannot be read.\n*   `fixtures_dir()`: Returns the absolute path to the `tests/fixtures/` directory.\n\n### Mock Content Generation\n\nFunctions to create mock `rust_scraper::ScrapedContent` objects for testing.\n\n*   `mock_scraped_content(url, title, content)`: Creates a minimal `ScrapedContent` with essential fields.\n*   `mock_scraped_content_with_html(url, title, content, html)`: Creates a `ScrapedContent` including the raw HTML.\n\n## Integration with the Codebase\n\nThis module is primarily used in integration tests (`tests/`) to simulate external HTTP services and provide realistic data for testing various components, especially the `HttpClient`.\n\nThe `TestHttpServer` is crucial for testing scenarios involving API interactions, rate limiting, and error handling without relying on actual external services. Functions like `mock_rate_limit`, `mock_server_error`, and `mock_not_found` directly support testing the resilience and error-handling capabilities of the `HttpClient`.\n\nThe fixture loading utilities (`load_fixture`, `fixtures_dir`) are used to provide static HTML content for testing parsing and scraping logic.\n\nThe mock content generation functions (`mock_scraped_content`, `mock_scraped_content_with_html`) are used to create test data for components that consume or process scraped web content.\n\n## Call Graph\n\n```mermaid\ngraph TD\n    subgraph \"Tests - common\"\n        A[TestHttpServer] --> B_wiremock__MockServer[\"B(wiremock::MockServer)\"];\n        A --> C_uri[\"C(uri)\"];\n        A --> D_mock_response[\"D(mock_response)\"];\n        A --> E_mock_rate_limit[\"E(mock_rate_limit)\"];\n        A --> F_mock_server_error[\"F(mock_server_error)\"];\n        A --> G_mock_not_found[\"G(mock_not_found)\"];\n        H[load_fixture] --> I_std__fs__read_to_string[\"I(std::fs::read_to_string)\"];\n        J[fixtures_dir] --> K_Path__new[\"K(Path::new)\"];\n        L[mock_scraped_content] --> M_rust_scraper__ValidUrl__parse[\"M(rust_scraper::ValidUrl::parse)\"];\n        N[mock_scraped_content_with_html] --> M;\n        O[tests] --> H;\n        O --> J;\n        O --> L;\n    end\n    B --> P_wiremock__MockServer__start[\"P(wiremock::MockServer::start)\"];\n    D --> Q_wiremock__ResponseTemplate__new[\"Q(wiremock::ResponseTemplate::new)\"];\n    D --> R_wiremock__Mock__given[\"R(wiremock::Mock::given)\"];\n    R --> S_wiremock__matchers__path[\"S(wiremock::matchers::path)\"];\n    E --> D;\n    F --> D;\n    G --> D;\n    M --> T_parse[\"T(parse)\"];\n```","tests-tests":"# Tests — tests\n\n# Tests — tests\n\nThis module contains all the integration and unit tests for the `rust_scraper` crate. It is organized into several sub-modules, each focusing on a specific area of the application:\n\n- `ai_integration.rs`: Tests for AI-powered semantic cleaning features.\n- `cli_binary_test.rs`: Integration tests for the `rust_scraper` binary using `assert_cmd`.\n- `cli_tests.rs`: Unit tests for the CLI argument parsing logic.\n- `concurrency_tests.rs`: Tests for concurrent operations and race conditions.\n- `crawler_integration.rs`: Integration tests for the web crawler functionality.\n- `exporter_integration_test.rs`: Integration tests for the `FileExporter`, focusing on data integrity.\n- `http_client_integration.rs`: Integration tests for the `HttpClient` using `wiremock`.\n- `integration_test.rs`: High-level integration tests for the full scraping pipeline.\n- `mcp_proptest.rs`: Proptest and feature-gating tests for the MCP server.\n\n## Purpose\n\nThe primary purpose of this module is to ensure the correctness, reliability, and robustness of the `rust_scraper` application. It covers:\n\n- **Functionality**: Verifying that core features like crawling, scraping, data extraction, and exporting work as expected.\n- **Integration**: Testing how different components interact with each other.\n- **Edge Cases**: Identifying and handling potential issues with invalid inputs, network errors, concurrency, and resource constraints.\n- **Performance**: Ensuring that operations are efficient and do not lead to excessive resource consumption.\n- **API Stability**: Validating that public APIs and CLI behavior remain consistent.\n\n## Key Components and Testing Strategies\n\nThis section details the testing strategies employed for different parts of the `rust_scraper` codebase.\n\n### AI Integration Tests (`ai_integration.rs`)\n\nThese tests are feature-gated behind the `ai` feature flag. They verify the functionality of AI-powered semantic cleaning, including:\n\n- **Model Cache**: Ensuring the model cache directory is created and managed correctly.\n- **Model Download**: Testing the structure and error handling of the model downloader.\n- **Model Configuration**: Validating default values and builder patterns for `ModelConfig`.\n- **Inference Engine**: Checking thread-safety (`Send + Sync`) and cloning capabilities.\n- **Chunking and Tokenization**: Testing `ChunkId`, `SentenceSplitter`, and `HtmlChunker`.\n- **Embedding Operations**: Verifying cosine similarity, dot product, normalization, and Euclidean distance.\n- **Relevance Scoring**: Testing `RelevanceScorer` and `ThresholdConfig`.\n- **Full Pipeline**: Integrating and testing the entire RAG pipeline from HTML parsing to relevance filtering.\n- **Error Handling**: Testing scenarios like `ChunkTooLarge` and `OfflineMode`.\n\n**Example Test:** `test_semantic_cleaner_full_pipeline` verifies the end-to-end RAG pipeline by cleaning HTML, tokenizing, embedding, scoring, and filtering.\n\n### CLI Binary Tests (`cli_binary_test.rs`)\n\nThese tests use `assert_cmd` to execute the compiled `rust_scraper` binary and assert its behavior. They focus on:\n\n- **Error Handling**: Testing error messages for missing arguments (`--url`), invalid URLs, and other command-line errors.\n- **Help and Version**: Verifying that `--help` displays the correct information and `--version` outputs the expected version string.\n- **Dry-Run Mode**: Checking that the `--dry-run` flag is accepted.\n- **Flag Acceptance**: Ensuring various flags like `--quiet` are parsed correctly.\n\n**Example Test:** `test_no_url_shows_error` asserts that running the binary without the required `--url` argument produces a specific error message on stderr.\n\n### CLI Argument Parsing Tests (`cli_tests.rs`)\n\nThese tests focus on the `clap` integration for command-line argument parsing. They use `Args::parse_from` to simulate command-line inputs and verify:\n\n- **Default Values**: Ensuring all arguments have correct default values when not specified.\n- **Argument Parsing**: Testing short (`-u`) and long (`--url`) flags, including complex values like URLs with query parameters and complex CSS selectors.\n- **Output Formats**: Validating parsing for `OutputFormat` (Markdown, Text, Json) and `ExportFormat` (Jsonl, Vector).\n- **Boolean Flags**: Checking that flags like `--dry-run`, `--quiet`, `--obsidian-wiki-links` are parsed correctly.\n- **Subcommands**: Verifying the parsing of subcommands like `completions` for different shells.\n- **Combined Arguments**: Testing scenarios where multiple arguments are provided.\n\n**Example Test:** `test_args_combined_flags` parses a complex set of arguments to ensure all are correctly interpreted.\n\n### Concurrency Tests (`concurrency_tests.rs`)\n\nThese tests are crucial for ensuring thread safety and preventing data corruption in concurrent operations. They cover:\n\n- **Concurrent JSONL Exports**: Verifying that multiple tasks exporting to the same JSONL file do not lose data or introduce corruption.\n- **StateStore Concurrency**: Testing that `mark_processed` operations on `ExportState` are thread-safe and do not lead to duplicate entries.\n- **Concurrent Vector Exports**: Ensuring that batch exports to the Vector format are safe and do not corrupt the output file.\n- **Append Mode Preservation**: Validating that concurrent appends to a JSONL file preserve existing content.\n\n**Example Test:** `concurrent_jsonl_exports_no_data_loss` spawns multiple tasks that write to a shared `JsonlExporter`, then verifies the output file for correctness and completeness.\n\n### Crawler Integration Tests (`crawler_integration.rs`)\n\nThese tests focus on the web crawler's functionality and require network access. They are typically ignored by default.\n\n- **Pattern Matching**: Testing `matches_pattern`, `is_excluded`, and `is_internal_link` with various URL patterns and exclusion rules.\n- **Crawling**: Verifying `crawl_site` against small, real websites.\n- **URL Discovery**: Testing `discover_urls_for_tui`.\n- **Sitemap Fetching**: Testing `crawl_with_sitemap`.\n- **Configuration**: Testing the `CrawlerConfig` builder and default values.\n\n**Example Test:** `test_is_allowed_complex` verifies that the `is_allowed` function correctly applies include and exclude patterns defined in `CrawlerConfig`.\n\n### Exporter Integration Tests (`exporter_integration_test.rs`)\n\nThese tests focus on the `FileExporter` and ensure data integrity during file exports.\n\n- **Markdown Structure**: Verifying the correct structure of exported Markdown files (though the primary export format tested here is JSONL).\n- **JSON Export**: Ensuring exported data is valid JSON.\n- **Validation**: Testing `DocumentChunk` validation rules, including empty content and titles.\n- **Batch Export**: Verifying that exporting multiple documents at once works correctly.\n- **Content Preservation**: Testing that special characters and markdown syntax are handled correctly during export.\n- **Edge Cases**: Testing scenarios like empty content, special characters in URLs, and memory pressure.\n\n**Example Test:** `test_file_exporter_markdown_structure` checks that a single document is exported correctly into a JSONL file with the expected fields.\n\n### HTTP Client Integration Tests (`http_client_integration.rs`)\n\nThese tests use `wiremock` to mock HTTP responses, allowing for deterministic testing of the `HttpClient`.\n\n- **Mock Server Responses**: Testing successful responses (200 OK) and various error codes (404, 500, 429, 503).\n- **Rate Limiting**: Verifying that the client handles `429 Too Many Requests` responses, including retries and backoff strategies.\n- **Service Unavailable**: Testing `503 Service Unavailable` responses and the effect of the `Retry-After` header.\n- **Latency Simulation**: Testing how the client handles slow responses and timeouts.\n- **Empty Responses**: Ensuring the client correctly processes empty response bodies.\n\n**Example Test:** `test_mock_server_429_exhausts_retries` simulates a rate-limited endpoint and verifies that the client exhausts its retries and returns an error after appropriate backoff.\n\n### Integration Tests (`integration_test.rs`)\n\nThis module contains high-level integration tests that cover the end-to-end scraping pipeline.\n\n- **Simple Fetching**: Testing the ability to fetch content from a real website (`example.com`).\n- **Error Handling**: Verifying graceful handling of `404` errors and invalid URLs.\n- **Result Saving**: Testing `save_results` with nested directories, special characters in content, and markdown syntax.\n- **Asset Downloading**: (Feature-gated with `images` and `documents`) Testing the download of images and documents from real websites.\n- **AI Semantic Filtering**: (Feature-gated with `ai`) Testing the preservation of embeddings after AI semantic cleaning.\n\n**Example Test:** `test_ai_embedding_preservation` (when `ai` feature is enabled) verifies that embeddings are correctly generated and retained in the output chunks after AI processing, fixing a known bug.\n\n### Proptest and Feature-Gating Tests (`mcp_proptest.rs`)\n\nThis module combines property-based testing (`proptest`) with feature-gating tests.\n\n- **URL Utilities**: Property-based tests for URL parsing, normalization, and internal link checking, covering various edge cases and invariants.\n- **Pattern Matching**: Property-based tests for `matches_pattern`.\n- **AI Feature Gating**: Tests that verify the AI module's router is correctly built (or empty) based on the presence or absence of the `ai` feature flag.\n\n**Example Test:** `prop_validate_url_valid_schemes` uses proptest to generate valid HTTP/HTTPS URLs and asserts that they always parse successfully.\n\n## Running Tests\n\n- **All Tests**: `cargo test`\n- **Specific Module**: `cargo test --test <module_name>` (e.g., `cargo test --test ai_integration`)\n- **With Features**: `cargo test --features <feature_name>` (e.g., `cargo test --features ai --test ai_integration`)\n- **Network Tests**: Many integration tests require network access and are marked with `#[ignore]`. Run them with: `cargo test -- --ignored` or `cargo test --test <module_name> -- --ignored`.\n- **Binary Tests**: `cargo test --test cli_binary_test`\n- **Proptests**: `cargo test --test mcp_proptest`\n\n## Directory Structure\n\nThe tests are organized within the `tests/` directory, with each file corresponding to a specific testing focus:\n\n```\ntests/\n├── ai_integration.rs\n├── cli_binary_test.rs\n├── cli_tests.rs\n├── concurrency_tests.rs\n├── crawler_integration.rs\n├── exporter_integration_test.rs\n├── http_client_integration.rs\n├── integration_test.rs\n├── mcp_proptest.rs\n└── progress_tui_integration.rs # (Implied by call graph, not explicitly listed in provided snippets)\n```","tests":"# Tests\n\n# Tests\n\nThis module houses all integration and unit tests for the `rust_scraper` crate, ensuring the reliability and correctness of its various components. It is organized into several sub-modules, each targeting specific functionalities and employing different testing strategies.\n\nThe `common` sub-module provides essential test fixtures and utilities, such as `TestHttpServer` for mocking HTTP responses and functions for loading HTML fixtures. These are crucial for creating isolated and deterministic testing environments, particularly for integration tests that interact with external services or complex data structures.\n\nThe other sub-modules focus on testing distinct aspects of the `rust_scraper` application:\n\n*   **AI Integration:** `ai_integration.rs` verifies the AI-powered semantic cleaning features.\n*   **CLI Functionality:** `cli_binary_test.rs` and `cli_tests.rs` test the command-line interface, covering argument parsing and overall binary behavior using `assert_cmd`.\n*   **Concurrency:** `concurrency_tests.rs` specifically targets concurrent operations and potential race conditions, ensuring data integrity during parallel processing.\n*   **Crawling and HTTP:** `crawler_integration.rs` and `http_client_integration.rs` test the web crawling capabilities and the `HttpClient`'s interaction with external resources, often leveraging `wiremock` for mocking.\n*   **Exporting:** `exporter_integration_test.rs` focuses on the `FileExporter`, verifying data integrity and structure across different output formats.\n\nThese sub-modules work in concert, with `common` providing the foundational tools for many of the integration tests. Key workflows that span multiple sub-modules include testing the CLI's interaction with the core scraping logic, verifying the `HttpClient`'s behavior under various network conditions (e.g., rate limiting), and ensuring that data is correctly exported after being processed by the crawler and AI features.\n\n```mermaid\ngraph TD\n    A[Tests Module] --> B_common[\"B(common)\"];\n    A --> C_ai_integration[\"C(ai_integration)\"];\n    A --> D_cli_binary_test[\"D(cli_binary_test)\"];\n    A --> E_cli_tests[\"E(cli_tests)\"];\n    A --> F_concurrency_tests[\"F(concurrency_tests)\"];\n    A --> G_crawler_integration[\"G(crawler_integration)\"];\n    A --> H_exporter_integration_test[\"H(exporter_integration_test)\"];\n    A --> I_http_client_integration[\"I(http_client_integration)\"];\n    B --> C;\n    B --> D;\n    B --> G;\n    B --> H;\n    B --> I;\n```","text-conversion":"# Text Conversion\n\n# Text Conversion Module\n\nThe Text Conversion module provides a suite of tools for transforming raw HTML content into more usable formats, primarily Markdown, with a focus on preserving structure and removing boilerplate. It also includes utilities for enhancing Markdown output, such as syntax highlighting and Obsidian-compatible wiki-link conversion.\n\n## Overview\n\nThis module acts as a post-processing layer for scraped HTML content. It aims to clean up HTML by removing navigational elements, scripts, and other non-content-related tags before converting the remaining structure into Markdown. This process is crucial for generating clean, readable, and easily manageable Markdown files, especially for use in knowledge bases like Obsidian.\n\nThe core components are:\n\n1.  **HTML Cleaning (`html_cleaner`)**: Removes boilerplate HTML elements and attributes.\n2.  **HTML to Markdown Conversion (`html_to_markdown`)**: Converts cleaned HTML into Markdown.\n3.  **Obsidian Compatibility (`obsidian`)**: Enhances Markdown for Obsidian, including relative asset path resolution and wiki-link conversion.\n4.  **Syntax Highlighting (`syntax_highlight`)**: Applies syntax highlighting to code blocks within Markdown.\n5.  **Wiki-link Conversion (`wikilinks`)**: A utility module for converting standard Markdown links to Obsidian's wiki-link format.\n\n## Components\n\n### 1. HTML Cleaner (`html_cleaner`)\n\n**Purpose**: To strip away non-essential HTML elements and attributes that constitute boilerplate, navigation, scripts, styles, and media, leaving behind the core content.\n\n**How it Works**:\nThis module utilizes the `lol_html` crate, a streaming HTML rewriter. It defines lists of HTML tags (`TAGS_TO_REMOVE`) and CSS selectors (`SELECTORS_TO_REMOVE`) that should be entirely removed along with their content. It also specifies a list of attributes (`PRESERVED_ATTRS`) that should be kept on elements.\n\nThe process involves:\n*   Iterating through the input HTML string.\n*   Applying handlers for each tag and selector to remove matching elements.\n*   Applying a general handler to strip all attributes from every element except those in `PRESERVED_ATTRS`.\n*   Normalizing whitespace in the resulting HTML to prevent excessive spacing.\n\n**Key Functions**:\n*   `clean_html(html: &str) -> String`: The main function that takes raw HTML and returns cleaned HTML.\n\n**Dependencies**:\n*   `lol_html`: For efficient, streaming HTML rewriting.\n*   `tracing`: For logging errors during the rewriting process.\n\n### 2. HTML to Markdown Conversion (`html_to_markdown`)\n\n**Purpose**: To convert cleaned HTML into well-structured Markdown.\n\n**How it Works**:\nThis module orchestrates the conversion process by first calling `html_cleaner::clean_html` to prepare the HTML. Then, it uses the `html-to-markdown-rs` crate to perform the actual conversion. Specific conversion options are set to ensure ATX-style headings and fenced code blocks (using backticks).\n\nIf the HTML-to-Markdown conversion fails, it falls back to a simpler text extraction method provided by `rust_scraper::infrastructure::scraper::fallback::extract_text`.\n\n**Key Functions**:\n*   `convert_to_markdown(html: &str) -> String`: The primary function that takes raw HTML, cleans it, converts it to Markdown, and handles potential errors.\n\n**Dependencies**:\n*   `html_to_markdown_rs`: For the core HTML to Markdown conversion.\n*   `tracing::warn`: For logging conversion errors.\n*   `crate::infrastructure::converter::html_cleaner::clean_html`: To clean the HTML before conversion.\n*   `crate::infrastructure::scraper::fallback::extract_text`: For fallback text extraction.\n\n### 3. Obsidian Compatibility (`obsidian`)\n\n**Purpose**: To adapt the generated Markdown for compatibility with Obsidian, focusing on asset path resolution and wiki-link conversion.\n\n**How it Works**:\nThis module has two main responsibilities:\n\n*   **Relative Asset Paths (`resolve_asset_paths`)**: It takes Markdown content, the intended directory for the output `.md` file, and a list of downloaded assets. It constructs a mapping from original asset URLs to their relative paths from the `.md` file's location. It then uses `pulldown_cmark` to parse the Markdown and rewrite image (`![]()`) and other asset references to use these relative paths. This ensures that images and other linked assets are correctly referenced when the Markdown file is moved within an Obsidian vault.\n*   **Wiki-link Conversion**: It re-exports functions from the `wikilinks` module (`convert_wiki_links`, `slug_from_url`) to facilitate the transformation of standard Markdown links (`[text](url)`) into Obsidian's wiki-link syntax (`[[slug|text]]`) for same-domain URLs.\n\n**Key Functions**:\n*   `resolve_asset_paths(content: &str, md_file_dir: &Path, assets: &[DownloadedAsset]) -> String`: Rewrites asset paths in Markdown to be relative.\n*   Re-exports `convert_wiki_links` and `slug_from_url`.\n\n**Dependencies**:\n*   `pulldown_cmark`: For parsing Markdown events.\n*   `pathdiff`: To calculate relative paths between directories.\n*   `std::path::Path`: For path manipulation.\n*   `crate::domain::DownloadedAsset`: Represents downloaded assets with their URLs and local paths.\n*   `crate::infrastructure::converter::wikilinks`: For wiki-link conversion logic.\n\n### 4. Syntax Highlighting (`syntax_highlight`)\n\n**Purpose**: To apply syntax highlighting to code blocks within Markdown content, converting them into HTML with appropriate `<span>` tags for styling.\n\n**How it Works**:\nThis module uses the `syntect` crate for syntax highlighting.\n*   It pre-loads `SyntaxSet` and `ThemeSet` using `LazyLock` for performance, as these are computationally expensive to initialize. The `base16-ocean.dark` theme is used.\n*   A regular expression (`CODE_BLOCK_RE`) is defined to find fenced code blocks (```language\\ncode\\n```).\n*   The `replace_all` method of the regex is used with a closure. For each matched code block:\n    *   It identifies the language and the code content.\n    *   It attempts to find the corresponding syntax definition in `SYNTAX_SET`.\n    *   If found, it generates HTML-highlighted code using `highlighted_html_for_string`.\n    *   If the language is unknown or highlighting fails, the original Markdown code block is retained as a fallback.\n\n**Key Functions**:\n*   `highlight_code_blocks(markdown: &str) -> String`: Takes Markdown text and returns HTML with highlighted code blocks.\n\n**Dependencies**:\n*   `regex`: For pattern matching code blocks.\n*   `syntect`: For syntax highlighting logic.\n*   `std::sync::LazyLock`: For efficient, one-time initialization of `SyntaxSet` and `ThemeSet`.\n\n### 5. Wiki-link Conversion (`wikilinks`)\n\n**Purpose**: To convert standard Markdown links to Obsidian's wiki-link format (`[[slug|text]]`) for links pointing to the same domain.\n\n**How it Works**:\nThis module parses Markdown using `pulldown_cmark` and identifies link tags.\n*   `slug_from_url`: A helper function that takes a URL path and generates a URL-safe slug by stripping query strings, fragments, trailing slashes, file extensions, and converting the last path segment to lowercase kebab-case. It also handles basic URL decoding.\n*   `should_convert_wikilink`: Determines if a given URL should be converted. It checks if the URL is not an anchor, not a relative path, and if its host matches the provided `base_domain`. If these conditions are met, it returns `Some(slug)`; otherwise, `None`.\n*   `convert_wiki_links`: The main function that orchestrates the parsing and transformation. It iterates through Markdown events, and when a link is encountered, it calls `should_convert_wikilink`. If a conversion is possible, it formats the output as `[[slug|link_text]]`. Otherwise, it preserves the original Markdown link format.\n\n**Key Functions**:\n*   `slug_from_url(url_path: &str) -> String`: Generates a slug from a URL path.\n*   `convert_wiki_links(content: &str, base_domain: &str) -> String`: Converts same-domain Markdown links to wiki-links.\n\n**Dependencies**:\n*   `pulldown_cmark`: For parsing Markdown events.\n*   `url::Url`: For robust URL parsing.\n\n## Module Structure\n\n```mermaid\ngraph TD\n    A[Converter Module] --> B_html_cleaner[\"B(html_cleaner)\"];\n    A --> C_html_to_markdown[\"C(html_to_markdown)\"];\n    A --> D_obsidian[\"D(obsidian)\"];\n    A --> E_syntax_highlight[\"E(syntax_highlight)\"];\n    A --> F_wikilinks[\"F(wikilinks)\"];\n\n    C --> B;\n    D --> F;\n    D --> G_DownloadedAsset[\"G(DownloadedAsset)\"];\n    D --> H_Path[\"H(Path)\"];\n    D --> I_pathdiff[\"I(pathdiff)\"];\n    C --> J_html-to-markdown-rs[\"J(html-to-markdown-rs)\"];\n    C --> K_fallback__extract_text[\"K(fallback::extract_text)\"];\n    E --> L_syntect[\"L(syntect)\"];\n    E --> M_regex[\"M(regex)\"];\n    F --> N_pulldown_cmark[\"N(pulldown_cmark)\"];\n    F --> O_url__Url[\"O(url::Url)\"];\n    D --> N;\n```\n\n## Integration with Codebase\n\n*   **`html_cleaner`**: Used by `html_to_markdown` to preprocess HTML.\n*   **`html_to_markdown`**: The primary entry point for converting raw HTML scraped from web pages into Markdown. It relies on `html_cleaner`.\n*   **`obsidian`**: Used in the final stages of content processing when preparing Markdown files for export to an Obsidian vault. It utilizes `wikilinks` and handles asset path resolution.\n*   **`syntax_highlight`**: Applied to Markdown content after it has been generated, typically before final output or saving.\n*   **`wikilinks`**: A utility module, primarily used by `obsidian` for its wiki-link conversion feature.\n\nThis module forms a critical part of the content processing pipeline, transforming unstructured web data into a structured, usable format.","utilities":"# Utilities\n\n# Utilities Module\n
