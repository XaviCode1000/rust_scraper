# This is a configuration file for the bacon tool
#
# Complete help on configuration: https://dystroy.org/bacon/config/

default_job = "clippy"
env.CARGO_TERM_COLOR = "always"

# Summary mode reduces terminal I/O on HDD
summary = true

# Keybindings for efficient workflow
[keybindings]
c = "job:clippy"
t = "job:nextest"
n = "job:nextest"
d = "job:doc"
r = "job:run"

# Jobs
[jobs.clippy]
command = ["cargo", "clippy", "--all-targets", "--all-features", "--", "-D", "warnings"]
need_stdout = false

[jobs.nextest]
command = ["cargo", "nextest", "run", "--hide-progress-bar", "--failure-output", "final"]
need_stdout = true
analyzer = "nextest"

[jobs.test]
command = ["cargo", "test"]
need_stdout = true

[jobs.doc]
command = ["cargo", "doc", "--no-deps"]
need_stdout = false

[jobs.doc-open]
command = ["cargo", "doc", "--no-deps", "--open"]
need_stdout = false
on_success = "back"

[jobs.run]
command = ["cargo", "run"]
need_stdout = true
allow_warnings = true
background = true
show_command_error_code = true

[jobs.check]
command = ["cargo", "check"]
need_stdout = false

[jobs.check-all]
command = ["cargo", "check", "--all-targets"]
need_stdout = false
