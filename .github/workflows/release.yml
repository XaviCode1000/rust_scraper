name: Release

"on":
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    outputs:
      has_token: ${{ steps.verify.outputs.has_token }}
    steps:
      - id: verify
        env:
          TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "has_token=true" >> $GITHUB_OUTPUT
          else
            echo "has_token=false" >> $GITHUB_OUTPUT
          fi

  build-release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rust_scraper
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: rust_scraper
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: rust_scraper
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: rust_scraper.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y liblz4-dev

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }} --locked --features full

      - name: Compress artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Compress artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.artifact }}" -DestinationPath "${{ matrix.artifact }}-${{ matrix.target }}.zip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust_scraper-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          cd artifacts
          mv rust_scraper-x86_64-unknown-linux-gnu/rust_scraper-x86_64-unknown-linux-gnu.tar.gz rust_scraper-linux-x86_64.tar.gz
          mv rust_scraper-aarch64-apple-darwin/rust_scraper-aarch64-apple-darwin.tar.gz rust_scraper-macos-aarch64.tar.gz
          mv rust_scraper-x86_64-apple-darwin/rust_scraper-x86_64-apple-darwin.tar.gz rust_scraper-macos-x86_64.tar.gz
          mv rust_scraper-x86_64-pc-windows-msvc/rust_scraper-x86_64-pc-windows-msvc.zip rust_scraper-windows-x86_64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/rust_scraper-windows-x86_64.zip
            artifacts/rust_scraper-linux-x86_64.tar.gz
            artifacts/rust_scraper-macos-aarch64.tar.gz
            artifacts/rust_scraper-macos-x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [release, check-secrets]
    if: needs.check-secrets.outputs.has_token == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
