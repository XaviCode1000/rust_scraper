# CI/CD Pipeline for rust_scraper — Tiered Feedback
#
# Strategy: 3-tier pipeline with needs gates.
# Each tier only runs if the previous tier PASSED.
# Developer gets feedback in <60s (fmt), <3min (clippy), <8min (full).
#
# Pipeline flow:
#   fmt (30s) → clippy (2min) → test-core (3min) → test-full (5min)
#   security runs in parallel with tests (no Rust compile)
#   mcp smoke runs after test-full
#   release runs after all gates pass (main only)
#   miri runs on schedule/dispatch only

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: "0 0 * * 1"  # Weekly Miri on Monday 00:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # CI optimizations: disable debuginfo + incremental for faster builds
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_DEV_INCREMENTAL: "false"

jobs:
  # ============================================================================
  # TIER 1: FORMAT GATE (30-60 seconds)
  # No compilation needed — instant feedback on style.
  # If this fails, NOTHING else runs.
  # ============================================================================
  fmt:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ============================================================================
  # TIER 2: CLIPPY GATE (2-3 minutes)
  # Compiles once + lints. If this fails, tests don't run.
  # Uses sccache for artifact caching across runs.
  # ============================================================================
  clippy:
    name: Clippy (strict)
    needs: [fmt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  # ============================================================================
  # TIER 3: TEST CORE (2-3 minutes)
  # Fast tests without heavy features (ai, otel).
  # Gate: must pass before full suite.
  # ============================================================================
  test-core:
    name: Tests (core)
    needs: [clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --test-threads 4 --retries 2

  # ============================================================================
  # TIER 3: TEST FULL (4-6 minutes)
  # All features enabled. Gate: must pass before MCP + release.
  # ============================================================================
  test-full:
    name: Tests (all features)
    needs: [test-core]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --all-features --test-threads 4 --retries 2

  # ============================================================================
  # SECURITY: No Rust compile — runs in PARALLEL with tests
  # Only needs fmt gate (doesn't depend on compilation).
  # ============================================================================
  security:
    name: Security Audit
    needs: [fmt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check

  # ============================================================================
  # MCP SMOKE: After full tests pass
  # Separate job so MCP failure doesn't block test results.
  # ============================================================================
  mcp:
    name: MCP handshake
    needs: [test-full]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build MCP server
        run: cargo build --example mcp_server --all-features
      - name: Validate MCP handshake
        timeout-minutes: 2
        run: |
          ./target/debug/examples/mcp_server &
          MCP_PID=$!
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:8080/mcp -X POST \
              -H "Content-Type: application/json" \
              -H "Accept: application/json, text/event-stream" \
              -d '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}},"id":1}' \
              | grep -q "protocolVersion"; then
              echo "MCP server ready"
              kill $MCP_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          kill $MCP_PID 2>/dev/null || true
          echo "MCP server failed to respond after 15 attempts"
          exit 1

  # ============================================================================
  # RELEASE: After ALL gates pass (main only)
  # ============================================================================
  release:
    name: Build Release
    needs: [test-full, security, mcp]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Build optimized binary
        run: cargo build --release --locked --features ai
      - name: Strip binary
        run: |
          strip target/release/rust_scraper
          ls -lh target/release/rust_scraper
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust_scraper-linux-x86_64
          path: target/release/rust_scraper
          retention-days: 7

  # ============================================================================
  # MIRI: UB detection (schedule/dispatch only)
  # Separate workflow — doesn't block PR pipeline.
  # ============================================================================
  miri:
    name: Miri (${{ matrix.group }})
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        group: [core, domain, infra]
        include:
          - group: core
            filter: "-- adapters:: application:: cli:: config:: di:: error::"
          - group: domain
            filter: "-- domain::"
          - group: infra
            filter: "-- infrastructure::"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Cache Miri sysroot
        uses: actions/cache@v4
        with:
          path: ~/.cache/miri
          key: miri-sysroot-${{ runner.os }}-2026-07-01
          restore-keys: |
            miri-sysroot-${{ runner.os }}-
      - name: Setup & Run Miri (${{ matrix.group }})
        env:
          MIRIFLAGS: -Zmiri-disable-isolation -Zmiri-ignore-leaks -Zmiri-seed=42 -Zmiri-permissive-provenance -Zmiri-disable-stacked-borrows
        run: |
          cargo miri setup
          cargo miri test --lib -- --skip downloader ${{ matrix.filter }}

  # ============================================================================
  # COVERAGE: Manual trigger only
  # ============================================================================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: [test-full]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info -- --skip test_mcp
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
