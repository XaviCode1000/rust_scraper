# CI/CD Pipeline for rust_scraper — Tiered Feedback
#
# Strategy: Tiered pipeline with needs gates.
# Each tier only runs if the previous tier PASSED.
# Developer gets feedback in <30s (toolchain), <60s (fmt), <3min (clippy), <8min (full).
#
# Pipeline flow:
#   toolchain (15s) → fmt (30s) → clippy (2min) → test-core (3min) → test-full (5min)
#   test-core runs: unit tests (--lib) then integration/behavioral tests (--test '*')
#   security runs in parallel with tests (no Rust compile)
#   mcp smoke runs after test-full
#   release runs after all gates pass (main only)
#   miri runs on schedule/dispatch only
#
# Key optimization: single runner = single compilation, single cache.
# Swatinem/rust-cache restores ~300MB of compiled deps on warm runs.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: "0 0 * * 1"  # Weekly Miri on Monday 00:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Forces v4 actions (checkout, cache, upload-artifact, codecov) to run on Node 24
  # instead of deprecated Node 20. Remove when all actions migrate to v5+.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # CI optimizations: disable debuginfo + incremental for faster builds
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_DEV_INCREMENTAL: "false"

jobs:
  # ============================================================================
  # TIER 0: TOOLCHAIN GATE (< 30 seconds)
  # Verify the installed Rust version matches rust-version in Cargo.toml.
  # Runs first — catches version drift before any compilation.
  # ============================================================================
  toolchain:
    name: Toolchain Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify rust-version >= Cargo.toml minimum
        run: |
          REQUIRED=$(grep '^rust-version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          INSTALLED=$(rustc --version | grep -oP '\d+\.\d+\.\d+')
          echo "Minimum required: $REQUIRED"
          echo "Installed: $INSTALLED"
          REQUIRED_M=$(echo "$REQUIRED" | cut -d. -f1)
          REQUIRED_m=$(echo "$REQUIRED" | cut -d. -f2)
          INSTALLED_M=$(echo "$INSTALLED" | cut -d. -f1)
          INSTALLED_m=$(echo "$INSTALLED" | cut -d. -f2)
          if [ "$INSTALLED_M" -gt "$REQUIRED_M" ] || { [ "$INSTALLED_M" -eq "$REQUIRED_M" ] && [ "$INSTALLED_m" -ge "$REQUIRED_m" ]; }; then
            echo "OK: Rust $INSTALLED >= minimum $REQUIRED"
          else
            echo "ERROR: Rust $INSTALLED is below minimum $REQUIRED"
            exit 1
          fi

  # ============================================================================
  # TIER 1: FORMAT GATE (30-60 seconds)
  # No compilation needed — instant feedback on style.
  # ============================================================================
  fmt:
    name: Check Formatting
    needs: [toolchain]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          docker rmi $(docker images -q) 2>/dev/null || true
          sudo apt-get clean
          df -h /

      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ============================================================================
  # TIER 2: CLIPPY GATE (2-3 minutes)
  # Compiles once + lints. If this fails, tests don't run.
  # ============================================================================
  clippy:
    name: Clippy (strict)
    needs: [fmt]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  # ============================================================================
  # TIER 3: TEST CORE — Unit + Integration (parallelizable)
  # ============================================================================
  test-core:
    name: Test Core (unit + integration)
    needs: [clippy]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Unit tests (lib)
        run: cargo nextest run --lib --test-threads 4 --retries 2
      - name: Integration tests
        run: cargo nextest run --test '*' --test-threads 4 --retries 2

  # ============================================================================
  # TIER 4: TEST FULL — All features enabled
  # ============================================================================
  test-full:
    name: Test Full (all features)
    needs: [test-core]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --all-features --test-threads 4 --retries 2

  # ============================================================================
  # SECURITY: Parallel with tests (no compilation needed)
  # ============================================================================
  security:
    name: Security Audit
    needs: [fmt]  # Only needs fmt gate, runs in parallel with tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-deny
      - uses: taiki-e/install-action@cargo-audit
      - name: Advisories + licenses + bans + sources
        run: cargo deny check
      - name: Audit (RustSec, redundant with cargo-deny)
        run: |
          cargo audit \
            --ignore RUSTSEC-2025-0141 \
            --ignore RUSTSEC-2025-0119 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2024-0320 \
            --ignore RUSTSEC-2026-0183 \
            --ignore RUSTSEC-2026-0184 \
            --ignore RUSTSEC-2026-0186 \
            --ignore RUSTSEC-2026-0002 \
            --ignore RUSTSEC-2026-0194 \
            --ignore RUSTSEC-2026-0195

  # ============================================================================
  # MCP SMOKE: After full tests pass
  # ============================================================================
  mcp:
    name: MCP Handshake
    needs: [test-full]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build MCP server
        run: cargo build --example mcp_server --all-features
      - name: Validate MCP handshake
        timeout-minutes: 2
        run: |
          ./target/debug/examples/mcp_server &
          MCP_PID=$!
          for i in $(seq 1 15); do
            if curl -sf --max-time 2 http://127.0.0.1:8080/mcp -X POST \
              -H "Content-Type: application/json" \
              -H "Accept: application/json, text/event-stream" \
              -d '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}},"id":1}' \
              | grep -q "protocolVersion"; then
              echo "MCP server ready"
              kill $MCP_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          kill $MCP_PID 2>/dev/null || true
          echo "MCP server failed to respond after 15 attempts"
          exit 1

  # ============================================================================
  # RELEASE: After ALL gates pass (main only)
  # ============================================================================
  release:
    name: Build Release
    needs: [test-full, security, mcp]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Build optimized binary
        run: cargo build --release --locked --features ai
      - name: Strip binary
        run: |
          strip target/release/rust_scraper
          ls -lh target/release/rust_scraper
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust_scraper-linux-x86_64
          path: target/release/rust_scraper
          retention-days: 7

  # ============================================================================
  # SCHEDULED: Miri (UB detection on nightly)
  # ============================================================================
  miri:
    name: Miri (${{ matrix.group }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        group: [core, domain, infra]
        include:
          - group: core
            filter: "-- adapters:: application:: cli:: config:: di:: error::"
          - group: domain
            filter: "-- domain::"
          - group: infra
            filter: "-- infrastructure::"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Cache Miri sysroot
        uses: actions/cache@v4
        with:
          path: ~/.cache/miri
          key: miri-sysroot-${{ runner.os }}-2026-07-01
          restore-keys: |
            miri-sysroot-${{ runner.os }}-
      - name: Setup & Run Miri (${{ matrix.group }})
        env:
          MIRIFLAGS: -Zmiri-tree-borrows -Zmiri-disable-isolation -Zmiri-ignore-leaks -Zmiri-seed=42 -Zmiri-permissive-provenance
        run: |
          cargo miri setup
          cargo miri test --lib -- --skip downloader ${{ matrix.filter }}

  # ============================================================================
  # COVERAGE: Manual trigger only
  # ============================================================================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch'
    needs: [test-full]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info -- --skip test_mcp
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
